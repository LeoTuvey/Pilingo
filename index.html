<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owl-Lingo</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
  text-align:center;
}

/* HEADER */
.header{
  background:#58cc02;
  color:white;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* BUTTON */
button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#58cc02;
  color:white;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>🦉 Owl-Lingo</h1>
  <div>Learn daily. Build streaks. Stay consistent.</div>
</div>

<div class="card">
  <h2>📊 Your Progress</h2>

  <div class="stats">
    <div>XP: <span id="xp">0</span></div>
    <div>🔥 Streak: <span id="streak">0</span></div>
  </div>

  <button onclick="goLearn()">▶ Continue Learning</button>
</div>

<div class="card">
  <h2>🎯 Daily Quest</h2>
  <p id="questText">Loading...</p>
</div>

<!-- =========================
     CORE SCRIPTS
========================= -->
<script src="engine-core.js"></script>
<script src="app-ui.js"></script>
<script src="app-state.js"></script>

<script>

/* =========================
   SAFE LOAD
========================= */

let xp = window.Engine ? Engine.getXP() : 0;
document.getElementById("xp").innerText = xp;

/* =========================
   SAFE STREAK FIX
========================= */

let streak = 0;
if(window.Engine && typeof Engine.updateStreak === "function"){
  streak = Engine.updateStreak();
}
document.getElementById("streak").innerText = streak;

/* =========================
   UI LAYER
========================= */

// 🦉 OWL UPDATE
if(window.AppUI){
  AppUI.updateOwl();
}

// 🎯 DAILY QUEST
let quest = window.AppUI ? AppUI.getDailyQuest() : {goal:20,progress:0};

document.getElementById("questText").innerText =
"Complete " + quest.goal + " XP (Today: " + quest.progress + ")";

/* =========================
   NAVIGATION (STEP 18)
========================= */

function goLearn(){

  if(window.AppState){
    AppState.go("engine.html");
  } else {
    window.location.href = "engine.html";
  }
}

</script>

</body>
</html>
