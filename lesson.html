<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Lesson</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Inter,Arial,sans-serif;
  text-align: center;
  padding: 28px 16px;
  margin:0;
  background:#f7fbff;
  color:#253044;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.lesson-card{
  width:min(520px, 100%);
  background:white;
  border:2px solid #e5edf5;
  border-radius:8px;
  box-shadow:0 8px 0 #e5edf5;
  padding:26px 20px;
}

h1{
  margin:0 0 10px;
  font-size:30px;
  letter-spacing:0;
}

p{
  margin:0 0 18px;
  color:#65748b;
  font-weight:800;
}

button{
  width:100%;
  padding: 15px 20px;
  font-size: 18px;
  background: #58cc02;
  color: white;
  border: 2px solid #46a302;
  border-radius: 8px;
  cursor: pointer;
  font-weight:900;
  box-shadow:0 4px 0 #46a302;
  transition:transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
}

button:hover{
  background:#61d80a;
  transform:translateY(-1px);
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #46a302;
}
</style>
</head>

<body>
<script src="pilingo-auth.js"></script>
<script>PilingoAuth.requireAccount();</script>

<div class="lesson-card">
  <h1>🐯 Lesson Page</h1>

  <p>Click below to finish lesson</p>

  <button id="finishBtn">
    Finish Lesson (+10 XP)
  </button>
</div>

<!-- ENGINE -->
<script src="engine-core.js"></script>
<script src="pwa.js"></script>

<script>
console.log("🧪 Lesson loaded");

const lessonParams = new URLSearchParams(window.location.search);

if (lessonParams.get("s") === "0") {
  window.location.replace("game1.html?v=6");
}

// =========================
// SAFETY CHECK
// =========================
if (!window.Engine) {
  console.error("❌ Engine not loaded");
  alert("Engine failed to load. Check engine-core.js path");
}

// =========================
// MAIN FUNCTION
// =========================
window.runFinishLogic = function () {

  console.log("🔥 runFinishLogic triggered");

  const engine = window.Engine;

  if (!engine) {
    alert("Engine missing");
    return;
  }

  const oldLevel = engine.getLevel();
  const xpReward = 10;
  const skillIndex = Number(lessonParams.get("s")) || 0;

  if (typeof engine.completeSkill === "function") {
    engine.completeSkill(skillIndex, xpReward);
  } else {
    engine.addXP(xpReward);
    engine.updateStreak();
    engine.resetHearts();
    engine.unlockLevel(skillIndex + 1);
  }

  const newLevel = engine.getLevel();

  console.log("XP:", engine.getXP());
  console.log("Old Level:", oldLevel);
  console.log("New Level:", newLevel);

  if (newLevel > oldLevel) {
    alert("🏆 LEVEL UP!");
  } else {
    alert("+10 XP!");
  }

  window.location.href = "engine.html";
};

// =========================
// BUTTON CLICK
// =========================
document.getElementById("finishBtn").addEventListener("click", function () {
  console.log("button clicked");
  window.runFinishLogic();
});

</script>

</body>
</html>
