<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>🐯 Pilingo</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#f7fbff;
  color:#253044;
  text-align:center;
  min-height:100vh;
}

.header{
  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,0.28), transparent 28%),
    linear-gradient(135deg,#58cc02,#7ddb18);
  color:white;
  padding:26px 18px 30px;
  border-bottom:4px solid #46a302;
}

.header h1{
  margin:0;
  font-size:34px;
  letter-spacing:0;
}

.card{
  background:white;
  width:min(620px, calc(100% - 28px));
  margin:16px auto;
  padding:20px;
  border:2px solid #e5edf5;
  border-radius:8px;
  box-shadow:0 8px 0 #e5edf5;
  text-align:left;
}

.card h2{
  margin:0 0 14px;
  color:#253044;
  font-size:21px;
  letter-spacing:0;
}

button{
  padding:14px 16px;
  width:100%;
  border:2px solid #46a302;
  border-radius:8px;
  background:#58cc02;
  color:white;
  font-size:16px;
  font-weight:900;
  margin-top:12px;
  cursor:pointer;
  box-shadow:0 4px 0 #46a302;
  transition:transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
}

button:hover{
  background:#61d80a;
  transform:translateY(-1px);
}

button:active{
  transform:translateY(2px);
  box-shadow:0 2px 0 #46a302;
}

button:nth-of-type(2),
button:nth-of-type(3){
  background:white;
  color:#1cb0f6;
  border-color:#b9d9f2;
  box-shadow:0 4px 0 #b9d9f2;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:10px;
  margin:4px 0 16px;
  font-weight:900;
}

.stats div,
.profileStat{
  background:#f7fbff;
  border:2px solid #e5edf5;
  border-radius:8px;
  padding:12px;
  text-align:center;
}

.profileStat{
  margin-top:10px;
  font-size:18px;
  font-weight:900;
}

#owlHome{
  font-size:56px;
  margin:10px auto 8px;
  width:86px;
  height:86px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  border-radius:50%;
  box-shadow:0 5px 0 rgba(0,0,0,0.12);
}

select{
  width:100%;
  padding:12px;
  border:2px solid #58cc02;
  border-radius:10px;
  background:white;
  font-size:16px;
}

.course-label{
  padding:14px;
  border:2px solid #e5edf5;
  border-radius:8px;
  background:#f7fbff;
  font-size:16px;
  font-weight:900;
  text-align:center;
}

#questText{
  margin:0;
  padding:14px;
  background:#fff8df;
  border:2px solid #ffe08a;
  border-radius:8px;
  font-weight:800;
}

@media (max-width:520px){
  .header h1{font-size:30px;}
  .card{padding:18px 14px;}
  .stats{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">

  <h1>🐯 Pilingo</h1>

  <div id="owlHome">🐯</div>

  <div>Learn daily. Build streaks. Stay consistent.</div>

</div>

<!-- PROGRESS -->
<div class="card">

  <h2>📊 Your Progress</h2>

  <div class="stats">
    <div>XP: <span id="xp">0</span></div>
    <div>🔥 Streak: <span id="streak">0</span></div>
  </div>

  <button onclick="goLearn()">▶ Continue Learning</button>
  <button onclick="window.location.href='voice.html'">Choose voice</button>
  <button id="installApp" onclick="installPilingo()" hidden>Install app</button>

</div>

<!-- COURSE -->
<div class="card">

  <h2>🌍 Course</h2>

  <div class="course-label">Kurmanji to English</div>

</div>

<!-- DAILY QUEST -->
<div class="card">

  <h2>🎯 Daily Quest</h2>

  <p id="questText">Loading...</p>

</div>

<!-- PROFILE -->
<div class="card">

  <h2>🏆 Profile</h2>

  <div class="profileStat">
    Level: <span id="level">0</span>
  </div>

  <div class="profileStat">
    Badges: <span id="badgeCount">0</span>
  </div>

</div>

<!-- SCRIPTS -->
<script src="engine-core.js"></script>
<script src="app-ui.js"></script>
<script src="app-state.js"></script>
<script src="app-polish.js"></script>
<script src="pwa.js"></script>

<script>

/* =========================
   SAFE ENGINE LOAD
========================= */

let xp = 0;

if(window.Engine && typeof Engine.getXP === "function"){
  xp = Engine.getXP();
}

document.getElementById("xp").innerText = xp;

if(window.Engine?.setCourse){
  Engine.setCourse("en-ku");
} else {
  localStorage.setItem("course", "en-ku");
}

/* =========================
   STREAK (SAFE - NO SIDE EFFECT BUG)
========================= */

let streak = 0;

if(window.Engine && typeof Engine.getHearts === "function"){
  streak = Engine.updateStreak();
}

document.getElementById("streak").innerText = streak;

/* =========================
   LEVEL (ENGINE-BASED, NOT MANUAL)
========================= */

let level = 0;

if(window.Engine && typeof Engine.getLevel === "function"){
  level = Engine.getLevel();
}
else{
  if(xp >= 50) level = 1;
  if(xp >= 120) level = 2;
  if(xp >= 220) level = 3;
  if(xp >= 350) level = 4;
  if(xp >= 500) level = 5;
}

document.getElementById("level").innerText = level;

/* =========================
   BADGES
========================= */

let badges = JSON.parse(localStorage.getItem("badges") || "[]");

document.getElementById("badgeCount").innerText = badges.length;

/* =========================
   DAILY QUEST
========================= */

let quest = { goal:20, progress:0 };

if(window.AppUI && typeof AppUI.getDailyQuest === "function"){
  quest = AppUI.getDailyQuest();
}

document.getElementById("questText").innerText =
  "Complete " + quest.goal + " XP (Today: " + quest.progress + ")";

/* =========================
   OWL UI (SAFE)
========================= */

if(window.AppUI && typeof AppUI.updateOwl === "function"){
  AppUI.updateOwl();
}

/* =========================
   NAVIGATION (STEP 18+ SAFE)
========================= */

function goLearn(){

  if(window.AppState && typeof AppState.go === "function"){
    AppState.go("engine.html");
  } else {
    window.location.href = "engine.html";
  }
}

</script>

</body>
</html>
