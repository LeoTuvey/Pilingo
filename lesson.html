<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Lesson</title>

<style>
body{
  font-family:Arial;
  background:#f5f9ff;
  text-align:center;
  margin:0;
  padding:20px;
}

#owl{ font-size:60px; }

.card{
  background:white;
  max-width:550px;
  margin:auto;
  padding:20px;
  border-radius:15px;
}

button{
  width:90%;
  padding:14px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:white;
  font-size:16px;
}

button:active{ transform:scale(0.98); }

#bar{
  height:10px;
  background:#4caf50;
  width:0%;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="owl">🦉</div>

<div class="card">

<h2 id="question"></h2>

<div id="options"></div>

<div id="bar"></div>

</div>

<script src="engine-core.js"></script>
<script src="vocab_a1.js"></script>

<script>

const SKILL_MAP = [
  "animals",
  "verbs",
  "people",
  "food",
  "objects",
  "places",
  "adjectives"
];

let course = Engine.getCourse();

let hearts = Engine.getHearts();

let params = new URLSearchParams(location.search);
let skillIndex = parseInt(params.get("s") || 0);

let skillKey = SKILL_MAP[skillIndex];
let pool = VOCAB_A1[skillKey];

let questions = [];
let current = 0;

// --------------------
// BUILD QUESTIONS
// --------------------
function generate(){

  for(let i=0;i<5;i++){

    let correct = pool[Math.floor(Math.random()*pool.length)];

    let options = [correct];

    while(options.length < 3){
      let r = pool[Math.floor(Math.random()*pool.length)];
      if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    questions.push({correct, options});
  }
}

// --------------------
// LOAD QUESTION
// --------------------
function load(){

  let q = questions[current];

  document.getElementById("question").innerText =
    "Translate: " + q.correct.en;

  let html = "";

  q.options.forEach((opt,i)=>{
    html += `<button onclick="check(${i})">${opt.en}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  updateBar();
}

// --------------------
// CHECK
// --------------------
function check(i){

  let q = questions[current];

  if(q.options[i] === q.correct){

    current++;

    if(current < questions.length){
      load();
    } else {
      finish();
    }

  } else {

    hearts = Engine.loseHeart();

    if(hearts <= 0){
      alert("Game Over");
      location.reload();
    }
  }
}

// --------------------
// PROGRESS BAR
// --------------------
function updateBar(){
  document.getElementById("bar").style.width =
    (current / questions.length) * 100 + "%";
}

// --------------------
// FINISH
// --------------------
function finish(){

  Engine.addXP(10);
  Engine.resetHearts();
  Engine.updateStreak();

  // unlock next skill
  let unlocked = Engine.getUnlocked();
  unlocked[skillIndex + 1] = true;
  Engine.saveUnlocked(unlocked);

  window.location.href = "index.html";
}

// --------------------
// START
// --------------------
generate();
load();

</script>

</body>
</html>
