<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

button{
  padding: 15px;
  font-size: 18px;
  background: #58cc02;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🦉 Lesson Page</h1>

<!-- OPTION 2 BUTTON (SIMPLE CLICK) -->
<button id="finishBtn">
  Finish Lesson (+10 XP)
</button>

<script src="engine-core.js"></script>

<script>
/* =========================
   CORE FUNCTION (SAFE)
========================= */

window.runFinishLogic = function(){

  console.log("🏆 runFinishLogic triggered");

  const engine = window.Engine;

  if(!engine){
    alert("Engine not loaded");
    console.error("Engine missing - check engine-core.js");
    return;
  }

  const oldLevel = engine.getLevel();
  const xpReward = 10;

  engine.addXP(xpReward);
  engine.updateStreak();
  engine.resetHearts();

  const newLevel = engine.getLevel();

  console.log("OLD:", oldLevel);
  console.log("NEW:", newLevel);
  console.log("XP:", engine.getXP());

  if(newLevel > oldLevel){
    alert("🏆 LEVEL UP!");
  } else {
    alert("+10 XP!");
  }
};

/* =========================
   OPTION 2: BUTTON CLICK
========================= */

document.getElementById("finishBtn").addEventListener("click", () => {
  console.log("button clicked");
  window.runFinishLogic();
});

/* =========================
   OPTION 3: AUTO RUN TEST (IMPORTANT)
   - this proves system works even if clicks fail
========================= */

setTimeout(() => {
  console.log("AUTO RUN TEST TRIGGERED");
  window.runFinishLogic();
}, 1000);

</script>

</body>
</html>
