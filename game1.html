<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game 1</title>
</head>
<body>

<h2 id="q"></h2>
<div id="opt"></div>
<div id="fb"></div>

<script>

let course = localStorage.getItem("course") || "en-ku";

function t(en,ku,sv){
    if(course==="en-ku") return ku;
    if(course==="en-sv") return sv;
    return en;
}

function playSound(type){
    let audio=new Audio();
    audio.src = type==="correct"
        ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
        : "https://actions.google.com/sounds/v1/cartoon/boing.ogg";
    audio.play();
}

let q=[
{
q:t("Cat","Pisîk","Katt"),
opt:[t("Cat","Pisîk","Katt"),t("Dog","Kûçik","Hund"),t("Bird","Teyr","Fågel")],
a:0
}
];

let i=0;

function load(){
let x=q[i];
document.getElementById("q").innerText=x.q;

document.getElementById("opt").innerHTML =
x.opt.map((o,idx)=>`<button onclick="check(${idx})">${o}</button>`).join("");
}

function check(ans){
if(ans===q[i].a){
playSound("correct");
finish();
}else{
playSound("wrong");
document.getElementById("fb").innerText="Try again";
}
}

function finish(){
let xpKey=course+"_xp";
let unlockKey=course+"_unlocked";

let xp=parseInt(localStorage.getItem(xpKey)||"0");
localStorage.setItem(xpKey,xp+10);

let u=JSON.parse(localStorage.getItem(unlockKey)||"[true,false,false,false,false,false,false]");
u[1]=true;
localStorage.setItem(unlockKey,JSON.stringify(u));

window.location.href="engine.html";
}

load();

</script>

</body>
</html>
