<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Lesson Engine</title>

<style>
body{
  font-family: Arial;
  background:#f5f9ff;
  text-align:center;
  margin:0;
  padding:20px;
}

#owl{
  font-size:60px;
  margin:10px;
  transition:0.3s;
}

.card{
  background:white;
  max-width:550px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
  display:block;
  width:90%;
  margin:10px auto;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:white;
  font-size:16px;
  cursor:pointer;
}

#hearts{
  font-size:22px;
  margin:10px;
}

#streak{
  font-size:16px;
  color:#ff9800;
  font-weight:bold;
}

#progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
  margin:10px 0;
}

#bar{
  height:100%;
  width:0%;
  background:#4caf50;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="owl">🦉</div>
<div id="streak">🔥 Streak: 0</div>
<div id="hearts">❤️❤️❤️❤️❤️</div>

<div class="card">

<h2 id="question">Loading...</h2>

<div id="progress">
  <div id="bar"></div>
</div>

<div id="options"></div>

</div>

<script src="vocab_a1.js"></script>

<script>

let params = new URLSearchParams(location.search);
let skillIndex = parseInt(params.get("s") || "0");

const skills = Object.keys(VOCAB_A1).filter(k => k !== "meta");
let skill = skills[skillIndex];

let pool = VOCAB_A1[skill];

let hearts = 5;
let xp = 0;
let current = 0;
let questions = [];

// ----------------------
// STREAK
// ----------------------
function updateStreak(){
  let today = new Date().toDateString();
  let last = localStorage.getItem("lastDay");
  let streak = parseInt(localStorage.getItem("streak") || "0");

  if(last !== today){
    if(last){
      let diff = (new Date(today) - new Date(last)) / 86400000;
      streak = diff === 1 ? streak + 1 : 1;
    } else {
      streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDay", today);
  }

  document.getElementById("streak").innerText =
    "🔥 Streak: " + streak;
}

// ----------------------
// HEARTS
// ----------------------
function renderHearts(){
  document.getElementById("hearts").innerText =
    "❤️".repeat(hearts) + "🖤".repeat(5 - hearts);
}

// ----------------------
// GENERATE QUESTIONS
// ----------------------
function generate(){

  for(let i=0;i<5;i++){

    let correct = pool[Math.floor(Math.random()*pool.length)];

    let options = [correct];

    while(options.length < 3){
      let r = pool[Math.floor(Math.random()*pool.length)];
      if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    questions.push({correct, options});
  }
}

// ----------------------
// LOAD QUESTION
// ----------------------
function load(){

  let q = questions[current];

  document.getElementById("question").innerText =
    "Select: " + q.correct.en;

  let html = "";

  q.options.forEach((opt,i)=>{
    html += `<button onclick="check(${i})">${opt.en}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  updateBar();
}

// ----------------------
// PROGRESS BAR
// ----------------------
function updateBar(){
  document.getElementById("bar").style.width =
    (current / questions.length) * 100 + "%";
}

// ----------------------
// CHECK ANSWER
// ----------------------
function check(i){

  let q = questions[current];

  if(q.options[i] === q.correct){

    xp += 10;
    current++;

    if(current < questions.length){
      load();
    } else {
      finish();
    }

  } else {

    hearts--;

    renderHearts();

    if(hearts <= 0){
      alert("Game Over");
      location.reload();
    }
  }
}

// ----------------------
// FINISH
// ----------------------
function finish(){

  localStorage.setItem("xp", xp);

  let unlocked = JSON.parse(
    localStorage.getItem("unlocked") ||
    "[true,false,false,false,false,false,false]"
  );

  unlocked[skillIndex + 1] = true;

  localStorage.setItem("unlocked", JSON.stringify(unlocked));

  updateStreak();

  setTimeout(()=>{
    window.location.href = "index.html";
  },1000);
}

// ----------------------
// START
// ----------------------
generate();
renderHearts();
updateStreak();
load();

</script>

</body>
</html>
