<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 1: Animals</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f9ff;
    text-align:center;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    max-width:550px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#hearts{
    font-size:28px;
    margin-bottom:10px;
}

#progress{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}

#bar{
    height:100%;
    width:0%;
    background:#4caf50;
}

img{
    width:120px;
    height:120px;
    object-fit:contain;
    margin:15px 0;
}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#1976d2;
    color:white;
    cursor:pointer;
}

#feedback{
    min-height:25px;
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div id="hearts"></div>

<div id="progress"><div id="bar"></div></div>

<h2 id="question">Loading...</h2>

<img id="image">

<div id="options"></div>

<div id="feedback"></div>

</div>

<script src="engine-core.js"></script>

<script>

let course = Engine.getCourse();

function t(en, ku, sv){
    if(course === "en-ku") return ku;
    if(course === "en-sv") return sv;
    return en;
}

// HEARTS
let hearts = Engine.getHearts();

function renderHearts(){
    let html = "";
    for(let i=0;i<hearts;i++) html += "❤️ ";
    for(let i=hearts;i<5;i++) html += "🖤 ";
    document.getElementById("hearts").innerHTML = html;
}

// SOUND
function playSound(type){
    let audio = new Audio();
    audio.src = type === "correct"
        ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
        : "https://actions.google.com/sounds/v1/cartoon/boing.ogg";
    audio.play();
}

// QUESTIONS
let questions = [
{
q:t("What is this?","Ev çi ye?","Vad är detta?"),
img:"https://cdn-icons-png.flaticon.com/512/616/616430.png",
options:[
t("Dog","Kûçik","Hund"),
t("Cat","Pisîk","Katt"),
t("Bird","Teyr","Fågel")
],
answer:1
},
{
q:t("What is this?","Ev çi ye?","Vad är detta?"),
img:"https://cdn-icons-png.flaticon.com/512/616/616408.png",
options:[
t("Cat","Pisîk","Katt"),
t("Dog","Kûçik","Hund"),
t("Apple","Sêv","Äpple")
],
answer:1
},
{
q:t("What is this?","Ev çi ye?","Vad är detta?"),
img:"https://cdn-icons-png.flaticon.com/512/415/415733.png",
options:[
t("Apple","Sêv","Äpple"),
t("Bird","Teyr","Fågel"),
t("Cat","Pisîk","Katt")
],
answer:0
}
];

let current = 0;

function updateProgress(){
    document.getElementById("bar").style.width =
    (current / questions.length) * 100 + "%";
}

function load(){
    renderHearts();
    updateProgress();

    let q = questions[current];

    document.getElementById("question").innerText = q.q;
    document.getElementById("image").src = q.img;

    let html = "";
    q.options.forEach((opt,i)=>{
        html += `<button onclick="check(${i})">${opt}</button>`;
    });

    document.getElementById("options").innerHTML = html;
    document.getElementById("feedback").innerHTML = "";
}

function check(i){
    let q = questions[current];

    if(i === q.answer){

        playSound("correct");
        document.getElementById("feedback").innerText = "✅ Correct";

        current++;

        setTimeout(()=>{
            if(current < questions.length){
                load();
            } else {
                finish();
            }
        },700);

    } else {

        hearts = Engine.loseHeart();
        renderHearts();
        playSound("wrong");

        document.getElementById("feedback").innerText = "❌ Try again";

        if(hearts <= 0){
            gameOver();
        }
    }
}

function finish(){

    Engine.addXP(10);
    Engine.unlockLevel(1);
    Engine.resetHearts();

    document.getElementById("bar").style.width = "100%";

    setTimeout(()=>{
        window.location.href = "engine.html";
    },1000);
}

function gameOver(){
    document.body.innerHTML = `
    <div class="card">
        <h1>💔</h1>
        <h2>Out of hearts</h2>
        <button onclick="location.reload()">Try again</button>
    </div>`;
}

load();

</script>

</body>
</html>
