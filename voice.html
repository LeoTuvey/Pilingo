<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Choose Voice</title>
<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#f5f9ff;
  text-align:center;
}
.card{
  max-width:620px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
button{
  display:block;
  width:92%;
  margin:10px auto;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:white;
  font-size:16px;
}
button.save{
  background:#58cc02;
}
.voice{
  background:#eef5ff;
  color:#1976d2;
  border:2px solid #cfe2ff;
}
.selected{
  background:#58cc02;
  color:white;
  border-color:#58cc02;
}
.hint{
  color:#52616f;
}
</style>
</head>
<body>
<div class="card">
  <h1>🐯 Choose voice</h1>
  <p class="hint">Tap a voice to hear it. Save the one you like.</p>
  <div id="voices">Loading voices...</div>
  <button onclick="window.location.href='index.html'">Back</button>
</div>

<script src="pwa.js"></script>
<script>
let selectedVoiceName = localStorage.getItem("pilingo_voice_name") || "";

function sampleText(){
  return "Hello, Susan! Great job! You finished this lesson.";
}

function englishVoices(){
  return speechSynthesis.getVoices().filter((voice) => {
    const lang = (voice.lang || "").toLowerCase();
    const name = (voice.name || "").toLowerCase();
    return lang.startsWith("en") && !lang.startsWith("sv") &&
      !name.includes("swedish") && !name.includes("svenska");
  });
}

function speakWith(voice){
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(sampleText());
  utterance.voice = voice;
  utterance.lang = voice.lang || "en-US";
  utterance.rate = 0.82;
  utterance.pitch = 1.22;
  speechSynthesis.speak(utterance);
}

function saveVoice(name){
  selectedVoiceName = name;
  localStorage.setItem("pilingo_voice_name", name);
  renderVoices();
}

function renderVoices(){
  const root = document.getElementById("voices");

  if(!window.speechSynthesis){
    root.innerHTML = "<p>Your browser does not support voice playback.</p>";
    return;
  }

  const voices = englishVoices();

  if(voices.length === 0){
    root.innerHTML = "<p>No English voices found. Add an English voice in your phone settings.</p>";
    return;
  }

  root.innerHTML = voices.map((voice, index) => {
    const selected = voice.name === selectedVoiceName ? " selected" : "";
    return `
      <button class="voice${selected}" onclick="previewVoice(${index})">
        ${voice.name} (${voice.lang})
      </button>
      <button class="save" onclick="saveVoiceByIndex(${index})">
        Save this voice
      </button>
    `;
  }).join("");
}

function previewVoice(index){
  const voice = englishVoices()[index];
  if(voice) speakWith(voice);
}

function saveVoiceByIndex(index){
  const voice = englishVoices()[index];
  if(voice) saveVoice(voice.name);
}

if(window.speechSynthesis){
  speechSynthesis.onvoiceschanged = renderVoices;
}

renderVoices();
setTimeout(renderVoices, 400);
</script>
</body>
</html>
