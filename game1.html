<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 1: Animals (A1 Engine)</title>

<style>
body{
font-family: Arial;
background:#f5f9ff;
margin:0;
text-align:center;
padding:20px;
}

.card{
background:white;
max-width:550px;
margin:auto;
padding:20px;
border-radius:16px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#hearts{
font-size:26px;
margin-bottom:10px;
}

#progress{
width:100%;
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:10px;
}

#bar{
height:100%;
width:0%;
background:#58cc02;
transition:0.3s;
}

#visual{
font-size:70px;
margin:10px 0;
}

button{
width:90%;
padding:14px;
margin:8px auto;
display:block;
border:none;
border-radius:12px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
transition:0.15s;
}

button:hover{
transform:scale(1.02);
background:#145ea8;
}

#feedback{
min-height:25px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<div id="hearts"></div>

<div id="progress"><div id="bar"></div></div>

<div id="visual"></div>

<h2 id="question">Loading...</h2>

<div id="options"></div>

<div id="feedback"></div>

</div>

<script>

/////////////////////////
// COURSE SYSTEM
/////////////////////////

let course = localStorage.getItem("course") || "en-ku";

function t(word){
if(course === "en-ku") return word.ku;
if(course === "en-sv") return word.sv;
return word.en;
}

/////////////////////////
// HEARTS
/////////////////////////

let hearts = parseInt(localStorage.getItem("hearts") || "5");

function renderHearts(){
document.getElementById("hearts").innerHTML =
"❤️".repeat(hearts) + "🖤".repeat(5-hearts);
}

/////////////////////////
// VOCAB (from engine)
/////////////////////////

const animals = [
{ en:"dog", ku:"kûçik", sv:"hund", emoji:"🐶" },
{ en:"cat", ku:"pisîk", sv:"katt", emoji:"🐱" },
{ en:"bird", ku:"teyr", sv:"fågel", emoji:"🐦" },
{ en:"fish", ku:"masî", sv:"fisk", emoji:"🐟" },
{ en:"cow", ku:"ga", sv:"ko", emoji:"🐄" }
];

/////////////////////////
// GAME STATE
/////////////////////////

let current = 0;
let questions = [];

/////////////////////////
// GENERATE QUESTIONS
/////////////////////////

function generateQuestions(){

questions = [];

for(let i=0;i<5;i++){

let correct = animals[Math.floor(Math.random()*animals.length)];

let options = [correct];

// add 2 random wrong answers
while(options.length < 3){
let rand = animals[Math.floor(Math.random()*animals.length)];
if(!options.includes(rand)){
options.push(rand);
}
}

// shuffle
options.sort(()=>Math.random()-0.5);

questions.push({
word: correct,
options: options
});

}

}

/////////////////////////
// LOAD
/////////////////////////

function load(){

renderHearts();

let q = questions[current];

document.getElementById("visual").innerText = q.word.emoji;

document.getElementById("question").innerText =
"What is this?";

let html = "";

q.options.forEach((opt,i)=>{
html += `<button onclick="check(${i})">${t(opt)}</button>`;
});

document.getElementById("options").innerHTML = html;

updateProgress();

}

/////////////////////////
// PROGRESS
/////////////////////////

function updateProgress(){
let percent = (current / questions.length) * 100;
document.getElementById("bar").style.width = percent + "%";
}

/////////////////////////
// CHECK ANSWER
/////////////////////////

function check(i){

let q = questions[current];

if(q.options[i] === q.word){

document.getElementById("feedback").innerText =
"✅ Correct!";

current++;

if(current < questions.length){
load();
}else{
finish();
}

}else{

hearts--;
renderHearts();

document.getElementById("feedback").innerText =
"❌ Try again";

if(hearts <= 0){
alert("Game Over");
location.reload();
}
}

}

/////////////////////////
// FINISH
/////////////////////////

function finish(){

let course = localStorage.getItem("course") || "en-ku";
let xpKey = course+"_xp";

let xp = parseInt(localStorage.getItem(xpKey) || "0");
xp += 10;

localStorage.setItem(xpKey, xp);

localStorage.setItem("hearts","5");

setTimeout(()=>{
window.location.href = "engine.html";
},1200);

}

/////////////////////////
// START
/////////////////////////

generateQuestions();
load();

</script>

</body>
</html>
