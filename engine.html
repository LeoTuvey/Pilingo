<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Engine</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f9ff;
    text-align:center;
}

header{
    background:#1976d2;
    color:white;
    padding:15px;
    font-size:20px;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    margin:15px 0;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.locked{
    opacity:0.4;
    pointer-events:none;
}

.xpBox{
    margin:15px 0;
    font-size:18px;
}
</style>
</head>

<body>

<header>
🦉 Owl-Lingo
</header>

<div class="container">

<h2>Choose your lesson</h2>

<div class="xpBox">⭐ XP: <span id="xp">0</span></div>

<div id="menu"></div>

</div>

<script>

/* =========================
   LOAD DATA
========================= */

let xp = parseInt(localStorage.getItem("xp") || "0");

let unlocked = JSON.parse(
localStorage.getItem("unlocked") ||
"[true,false,false,false,false,false,false]"
);

/* =========================
   LESSONS
========================= */

let lessons = [
"game1.html",
"game2.html",
"game3.html",
"game4.html",
"game5.html",
"game6.html",
"game7.html"
];

/* =========================
   RENDER ENGINE
========================= */

function render(){

let html = "";

lessons.forEach((g,i)=>{

if(unlocked[i]){
html += `
<div class="card" onclick="start(${i})">
Lesson ${i+1}
</div>`;
}else{
html += `
<div class="card locked">
🔒 Locked
</div>`;
}

});

document.getElementById("menu").innerHTML = html;
document.getElementById("xp").innerText = xp;

}

/* =========================
   START LESSON
========================= */

function start(i){
window.location.href = lessons[i];
}

/* =========================
   ADD XP (CALL FROM GAMES)
========================= */

function addXP(amount){

xp += amount;
localStorage.setItem("xp", xp);

render();
}

/* =========================
   UNLOCK NEXT LEVEL
========================= */

function unlockNext(level){

if(level + 1 < unlocked.length){
unlocked[level + 1] = true;
localStorage.setItem("unlocked", JSON.stringify(unlocked));
}

}

/* =========================
   INIT
========================= */

render();

</script>

</body>
</html>
