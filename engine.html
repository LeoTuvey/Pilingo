<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Engine</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f9ff;
    text-align:center;
}

header{
    background:#1976d2;
    color:white;
    padding:15px;
    font-size:20px;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    margin:15px 0;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.locked{
    opacity:0.4;
    pointer-events:none;
}

.lessonTitle{
    font-size:18px;
    font-weight:bold;
}

.small{
    font-size:13px;
    color:#666;
    margin-top:5px;
}

.xp{
    margin:15px 0;
    font-size:18px;
}
</style>
</head>

<body>

<header>
🦉 Owl-Lingo
</header>

<div class="container">

<h2>Choose your lesson</h2>

<div class="xp">⭐ XP: <span id="xp">0</span></div>

<div id="menu"></div>

</div>

<script>

/* ======================
   DATA
====================== */

let xp = parseInt(localStorage.getItem("xp") || "0");

let unlocked = JSON.parse(
localStorage.getItem("unlocked") ||
"[true,false,false,false,false,false,false]"
);

/* ======================
   LESSONS (REAL STRUCTURE)
====================== */

let lessons = [
{
name:"🐱 Lesson 1: Animals",
file:"game1.html"
},
{
name:"🐶 Lesson 2: Coming Soon",
file:"game2.html"
},
{
name:"🍎 Lesson 3: Coming Soon",
file:"game3.html"
},
{
name:"📘 Lesson 4: Coming Soon",
file:"game4.html"
},
{
name:"🎮 Lesson 5: Coming Soon",
file:"game5.html"
},
{
name:"🎤 Lesson 6: Coming Soon",
file:"game6.html"
},
{
name:"🏁 Final Lesson",
file:"game7.html"
}
];

/* ======================
   RENDER
====================== */

function render(){

let html = "";

lessons.forEach((lesson,i)=>{

if(unlocked[i]){
html += `
<div class="card" onclick="start(${i})">
<div class="lessonTitle">${lesson.name}</div>
<div class="small">Tap to start</div>
</div>`;
}else{
html += `
<div class="card locked">
🔒 Locked
</div>`;
}

});

document.getElementById("menu").innerHTML = html;
document.getElementById("xp").innerText = xp;

}

/* ======================
   START LESSON
====================== */

function start(i){
window.location.href = lessons[i].file;
}

render();

</script>

</body>
</html>
