<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 2: Actions</title>

<style>
body{
    font-family: Arial;
    background:#f5f9ff;
    text-align:center;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    max-width:500px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#1976d2;
    color:white;
    cursor:pointer;
}

button:hover{
    transform:scale(1.02);
}

#feedback{
    margin-top:15px;
    font-size:18px;
    min-height:25px;
}
</style>
</head>

<body>

<div class="card">

<h2 id="question">Loading...</h2>

<div id="options"></div>

<div id="feedback"></div>

</div>

<script>

/////////////////////////////////////
// COURSE SYSTEM
/////////////////////////////////////

let course = localStorage.getItem("course") || "en-ku";

function t(en, ku, sv){
    if(course === "en-ku") return ku;
    if(course === "en-sv") return sv;
    return en;
}

/////////////////////////////////////
// SPEECH
/////////////////////////////////////

function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    msg.rate = 0.85;
    speechSynthesis.speak(msg);
}

/////////////////////////////////////
// QUESTIONS (COURSE-AWARE)
/////////////////////////////////////

let questions = [
{
q: t("What is he doing?","Ew çi dike?","Vad gör han?"),
options:[
t("Eating","Xwarin","Äter"),
t("Sleeping","Razane","Sover"),
t("Running","Revîn","Springer")
],
answer:0
},
{
q: t("What is she doing?","Ew çi dike?","Vad gör hon?"),
options:[
t("Reading","Xwendin","Läser"),
t("Eating","Xwarin","Äter"),
t("Swimming","Avjîn","Simmar")
],
answer:0
},
{
q: t("What is the boy doing?","Kur çi dike?","Vad gör pojken?"),
options:[
t("Drinking","Vexwarin","Dricker"),
t("Writing","Nivîsandin","Skriver"),
t("Running","Revîn","Springer")
],
answer:2
}
];

let current = 0;

/////////////////////////////////////
// LOAD QUESTION
/////////////////////////////////////

function load(){

let q = questions[current];

document.getElementById("question").innerText = q.q;

speak("Question");

let html = "";

q.options.forEach((opt,i)=>{
html += `<button onclick="check(${i})">${opt}</button>`;
});

document.getElementById("options").innerHTML = html;
document.getElementById("feedback").innerHTML = "";
}

load();

/////////////////////////////////////
// CHECK ANSWER
/////////////////////////////////////

function check(i){

let q = questions[current];

if(i === q.answer){
document.getElementById("feedback").innerHTML =
t("✅ Correct!","Rast e!","Rätt!");

current++;

setTimeout(()=>{
if(current < questions.length){
load();
}else{
finish();
}
},800);

}else{
document.getElementById("feedback").innerHTML =
t("❌ Try again","Dîsa biceribîne","Försök igen");

speak("Try again");
}
}

/////////////////////////////////////
// FINISH GAME (COURSE-AWARE)
/////////////////////////////////////

function finish(){

let course = localStorage.getItem("course") || "en-ku";

let xpKey = course + "_xp";
let unlockKey = course + "_unlocked";

// XP
let xp = parseInt(localStorage.getItem(xpKey) || "0");
xp += 10;
localStorage.setItem(xpKey, xp);

// UNLOCK NEXT LEVEL (Game 3)
let unlocked = JSON.parse(localStorage.getItem(unlockKey) || "[true,false,false,false,false,false,false]");
unlocked[2] = true;
localStorage.setItem(unlockKey, JSON.stringify(unlocked));

// return to engine
setTimeout(()=>{
window.location.href = "engine.html";
},1000);
}

</script>

</body>
</html>
