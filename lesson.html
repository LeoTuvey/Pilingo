<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

button{
  padding: 15px;
  font-size: 18px;
  background: #58cc02;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🦉 Lesson Page</h1>

<button id="finishBtn">
  Finish Lesson (+10 XP)
</button>

<!-- ENGINE -->
<script src="engine-core.js"></script>

<script>
console.log("🧪 Lesson page loaded");

/* =========================
   MAIN FUNCTION
========================= */

window.runFinishLogic = function () {

  console.log("🔥 runFinishLogic triggered");

  const engine = window.Engine;

  if (!engine) {
    console.error("❌ Engine NOT loaded");
    alert("Engine not loaded - check engine-core.js path");
    return;
  }

  const oldLevel = engine.getLevel();
  const xpReward = 10;

  engine.addXP(xpReward);
  engine.updateStreak();
  engine.resetHearts();

  const newLevel = engine.getLevel();

  console.log("XP before:", engine.getXP());
  console.log("Old level:", oldLevel);
  console.log("New level:", newLevel);

  if (newLevel > oldLevel) {
    alert("🏆 LEVEL UP!");
  } else {
    alert("+10 XP!");
  }
};

/* =========================
   BUTTON CLICK
========================= */

document.getElementById("finishBtn").addEventListener("click", () => {
  console.log("button clicked");
  window.runFinishLogic();
});

/* =========================
   AUTO TEST (IMPORTANT)
========================= */

setTimeout(() => {
  console.log("⏱ AUTO TEST RUNNING...");
  window.runFinishLogic();
}, 1000);

</script>

</body>
</html>
