<script>
if (window.location.protocol === "file:") {
  const target = "http://localhost:3000/game1.html" + window.location.search + window.location.hash;
  window.location.replace(target);
} else {
  const params = new URLSearchParams(window.location.search);
  if (params.get("coursePart") === "family" && (
    params.get("v") === "lessonpath11" ||
    params.get("v") === "lessonpath12" ||
    params.get("v") === "lessonpath13" ||
    params.get("v") === "lessonpath14"
  )) {
    params.set("v", "lessonpath15");
    const nextUrl = "game1.html?" + params.toString() + window.location.hash;
    window.location.replace(nextUrl);
  }
  if (params.get("coursePart") === "greetings" && params.get("v") === "lessonpath2") {
    params.set("v", "lessonpath3");
    const nextUrl = "game1.html?" + params.toString() + window.location.hash;
    window.location.replace(nextUrl);
  }
  if (params.get("coursePart") === "greetings" && params.get("v") === "lessonpath3") {
    params.set("v", "lessonpath4");
    const nextUrl = "game1.html?" + params.toString() + window.location.hash;
    window.location.replace(nextUrl);
  }
  if (!params.get("coursePart")) {
    const target = "engine.html" + window.location.search + window.location.hash;
    window.location.replace(target);
  }
}
</script>

<style>
:root{
    --page-glow-a:rgba(255,218,69,0.26);

    --page-mid:#f7fbf2;
    --page-bottom:#fff7df;
    --card-fill:#ffffff;

*{

}

body{

    margin:0;
    padding:22px;
    color:#253044;

}

.card{
    background:linear-gradient(180deg, rgba(255,255,255,0.99) 0%, var(--card-fill) 100%);
    max-width:620px;
    margin:auto;
    padding:22px;
    border:2px solid var(--card-border);
    border-radius:34px;
    box-shadow:0 20px 40px var(--card-shadow);

    overflow:hidden;
    transition:border-color 0.35s ease, box-shadow 0.35s ease, background 0.35s ease;
}

.card::before{
    content:"";

    inset:0 0 auto;
    height:6px;
    background:linear-gradient(90deg, var(--card-topbar-start), var(--card-topbar-mid), var(--card-topbar-end));
}

.card::after{
    content:"";
    position:absolute;
    right:-42px;
    bottom:-78px;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.46), rgba(255,255,255,0));
    pointer-events:none;
}

}

.moving-demo-word{
    display:inline-block;
    text-decoration:underline;
    text-decoration-thickness:3px;
    text-underline-offset:5px;
    color:#1c80cf;
    font-weight:1000;
    animation:movingDemoWord 1.8s ease-in-out infinite;
}

.static-blue-word{
    display:inline-block;
    text-decoration:underline;
    text-decoration-thickness:3px;
    text-underline-offset:5px;
    color:#1c80cf;
    font-weight:1000;
    animation:none !important;
    transform:none !important;
    translate:none !important;
    transition:none !important;
    will-change:auto;
    pointer-events:none;
    user-select:none;
    -webkit-user-select:none;
    -webkit-user-drag:none;
    position:static !important;
    margin:0;
    padding:0;
    vertical-align:baseline;
}

body.ball-3-static-blue .moving-demo-word,
body.ball-3-static-blue .prompt-blank{
    animation:none !important;
    transform:none !important;
    translate:none !important;
    transition:none !important;
    will-change:auto;
}

.prompt-subnote{
    display:block;

}

}

.prompt-blank{

}

@keyframes movingDemoWord{
    0%, 100%{ transform:translateY(0); }
    35%{ transform:translateY(-3px); }
    65%{ transform:translateY(2px); }
}

#image{
    display:none;
    width:120px;
    height:120px;
    object-fit:contain;
    margin:12px auto;
}

#activity{
    width:100%;
}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px 16px;
    font-size:16px;
    border:2px solid #d6e3ef;
    border-radius:20px;
    background:white;
    color:#253044;
    cursor:pointer;
    font-weight:800;
    box-shadow:0 4px 0 #d6e3ef;
    transition:transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
}

button:hover{
    background:#f7fbff;
    border-color:#1cb0f6;
    transform:translateY(-1px);
}

button:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 #d6e3ef;
}

button.is-pressed{
    transform:translateY(4px) scale(0.965) !important;
    box-shadow:0 1px 0 #d6e3ef !important;
}

button:disabled{
    opacity:0.7;
    cursor:default;
}

button.secondary{
    background:#fff;
    color:#253044;
    border-color:#d6e3ef;
}

button.selected{
    background:#58cc02;
    color:white;
    border-color:#46a302;
    box-shadow:0 4px 0 #46a302;
}

button.correct{
    background:#58cc02 !important;
    color:white !important;
    border-color:#46a302 !important;
    box-shadow:0 4px 0 #46a302 !important;
}

button.wrong{
    background:#ff4b4b !important;
    color:white !important;
    border-color:#d63636 !important;
    box-shadow:0 4px 0 #d63636 !important;
}

#activity > button:first-child:last-child,
.answer-bank + .word-bank + button,
.type-answer + button{
    background:#58cc02;
    border-color:#46a302;
    color:white;
    box-shadow:0 4px 0 #46a302;
}

#activity > button:first-child:last-child:hover,
.answer-bank + .word-bank + button:hover,
.type-answer + button:hover{
    background:#61d80a;
}

.part-menu{

}

.part-path-line{

.part-menu-core{

    box-shadow:

        0 10px 0 rgba(204,156,55,0.46),

    justify-content:center;

.part-menu-core strong{
    position:relative;
    z-index:1;

}

.part-menu-core span{
    position:relative;

    letter-spacing:0.1em;
    text-transform:uppercase;
    text-shadow:none;
}

.part-list{
    display:flex;
    flex-direction:column;
    gap:18px;
    position:relative;
}

.part-choice{
    position:relative;
    width:min(330px, calc(100% - 44px));
    min-height:128px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:
        radial-gradient(circle at 24% 18%, rgba(255,255,255,0.96), rgba(255,255,255,0.22) 24%, transparent 28%),
        linear-gradient(180deg, rgba(255,252,239,0.98) 0%, rgba(255,244,217,0.98) 100%);
    border:2px solid rgba(255,255,255,0.82);
    box-shadow:
        inset 0 -10px 0 rgba(220,179,88,0.12),
        0 10px 0 rgba(204,156,55,0.46),
        0 18px 24px rgba(124,91,17,0.14);
    padding:18px 16px 18px;
    overflow:hidden;
    border-radius:44% 44% 50% 50% / 34% 34% 62% 62%;
    transition:transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
}

.part-choice:nth-child(odd){
    transform:translateX(-74px);
}

.part-choice:nth-child(even){
    transform:translateX(74px);
}

.part-choice:hover{
    filter:none;
    transform:translateY(-3px) translateX(var(--hover-offset, 0px));
}

.part-badge{
    display:inline-flex;
    position:relative;
    width:96px;
    height:96px;
    align-items:flex-start;
    justify-content:center;
    border-radius:50%;
    background:
        radial-gradient(circle at 28% 20%, rgba(255,255,255,0.98), rgba(255,255,255,0.16) 28%, transparent 32%),
        radial-gradient(circle at 52% 54%, rgba(255,243,197,0.78), rgba(255,243,197,0.06) 34%, transparent 42%),
        linear-gradient(180deg, #fff0bf 0%, #ffd15d 40%, #ffa63a 100%);
    color:#6f5840;
    font-weight:900;
    font-size:52px;
    box-shadow:
        inset 0 -10px 0 rgba(176,113,17,0.2),
        0 0 18px rgba(255,219,110,0.28),
        0 10px 0 rgba(197,119,21,0.82),
        0 18px 26px rgba(14,35,65,0.22);
    border:4px solid rgba(255,255,255,0.92);
    text-shadow:0 2px 0 rgba(255,255,255,0.35);
    overflow:hidden;
    animation:planetSpin 12s linear infinite;
}

.part-choice:nth-child(odd){
    --hover-offset:-74px;
}

.part-choice:nth-child(even){
    --hover-offset:74px;
}

.part-badge::before{
    content:"";
    position:absolute;
    inset:7px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 22%, rgba(255,255,255,0.72), transparent 38%);
    pointer-events:none;
}

.part-badge::after{
    content:"";
    position:absolute;
    inset:-16px;
    border-radius:50%;
    border:2px solid rgba(255,244,206,0.3);
    animation:orbitHalo 4.2s linear infinite;
}

.part-animal{
    position:relative;
    z-index:1;
    display:inline-block;
    margin-top:12px;
    filter:drop-shadow(0 5px 5px rgba(122,83,0,0.18));
    transform-origin:center bottom;
    animation:animalBob 2.8s ease-in-out infinite;
}

@keyframes animalBob{
    0%, 100%{ transform:translateY(0) rotate(0deg) scale(1); }
    25%{ transform:translateY(-3px) rotate(-4deg) scale(1.03); }
    55%{ transform:translateY(-7px) rotate(4deg) scale(1.06); }
    78%{ transform:translateY(-2px) rotate(-2deg) scale(1.02); }
}

@keyframes planetSpin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

function preserveMovedGreetingProgress(){
    const sourceSectionId = "a-part-2";
    const destinationSectionId = "a-part-1i-v1";
    const movedLessons = [
        { id:"a-part-2-lesson-1", start:217, end:221 },
        { id:"a-part-2-lesson-2", start:222, end:226 }
    ];
    const sourceLessonIds = Array.isArray(completedLessons[sourceSectionId])
        ? completedLessons[sourceSectionId].filter(value => typeof value === "string")
        : [];
    const sourceSectionComplete = Object.values(completedSections || {}).some(values =>
        Array.isArray(values) && values.includes(sourceSectionId)
    );
    const completedMovedIds = movedLessons
        .filter(lesson => sourceSectionComplete || sourceLessonIds.includes(lesson.id))
        .map(lesson => lesson.id);

    if(!completedMovedIds.length) return;

    const destinationLessonIds = Array.isArray(completedLessons[destinationSectionId])
        ? completedLessons[destinationSectionId].filter(value => typeof value === "string")
        : [];
    completedLessons[destinationSectionId] = [...new Set([...destinationLessonIds, ...completedMovedIds])];

    movedLessons.forEach((lesson) => {
        if(!completedMovedIds.includes(lesson.id)) return;
        completedLessonStepMap[lesson.id] = Array.from(
            { length:lesson.end - lesson.start + 1 },
            (_, offset) => lesson.start + offset
        );
    });

    saveCompletedLessons();
    saveCompletedLessonStepMap();
}

function resetFamilyBall3Progress(){
    const legacySectionIds = new Set(["a-part-1d", "a-part-1d-v2", "a-part-1d-v3"]);
    const legacyLessonPrefixes = ["a-part-1d-", "a-part-1d-v2-", "a-part-1d-v3-"];

    Object.keys(completedSections || {}).forEach((key) => {
        const values = Array.isArray(completedSections[key]) ? completedSections[key] : [];
        const filtered = values.filter((value) => !legacySectionIds.has(value));
        if(filtered.length !== values.length) {
            completedSections[key] = filtered;
        }
    });

    Object.keys(completedLessons || {}).forEach((key) => {
        if(legacySectionIds.has(key) || legacyLessonPrefixes.some((prefix) => key.startsWith(prefix))) {
            delete completedLessons[key];
        }
    });

    Object.keys(completedLessonStepMap || {}).forEach((key) => {
        if(legacyLessonPrefixes.some((prefix) => key.startsWith(prefix))) {
            delete completedLessonStepMap[key];
        }
    });

    Object.keys(lessonStatuses || {}).forEach((key) => {
        if(legacyLessonPrefixes.some((prefix) => key.startsWith(prefix))) {
            delete lessonStatuses[key];
        }
    });

    Object.keys(gradebook || {}).forEach((key) => {
        if(legacyLessonPrefixes.some((prefix) => key.startsWith(prefix)) || legacySectionIds.has(key)) {
            delete gradebook[key];
        }
    });

    saveCompletedSections();
    saveCompletedLessons();
    saveCompletedLessonStepMap();
    saveLessonStatuses();
    saveGradebook();
}

function sectionsForPart(index){
    const sections = partSections[index] || [];

    if(!activeCoursePartRoute || activeCoursePartRoute.gamePartIndex !== index) {
        return sections;
    }

    return sections.filter((section) => activeCoursePartRoute.sectionIds.includes(section.id));
}

function sectionKey(index){
    return String(index);
}

function lessonStoreKey(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    return section ? section.id : "";
}

function lessonsForSection(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    if(!section) return [];
    if(Array.isArray(section.lessons) && section.lessons.length) return section.lessons;

    return [{
        id:section.id + "-lesson-1",
        label:"Lesson 1",
        detail:section.detail,
        start:section.start,
        end:section.end
    }];
}

function lessonByIndexes(index, sectionIndex, lessonIndex){
    return lessonsForSection(index, sectionIndex)[lessonIndex] || null;
}

function gradableStepsInRange(index, start, end){
    const steps = [];
    for(let i = start; i <= end; i++) {
        if(isGradableStep(gameParts[index].steps[i])) {
            steps.push(i);
        }
    }
    return steps;
}

function gradableStepsForLesson(index, sectionIndex, lessonIndex){
    const lesson = lessonByIndexes(index, sectionIndex, lessonIndex);
    if(!lesson) return [];
    return gradableStepsInRange(index, lesson.start, lesson.end);
}

function savedCompletedStepsForLesson(lessonId){
    const saved = completedLessonStepMap[lessonId];
    if(!Array.isArray(saved)) return [];
    return [...new Set(saved.filter(value => typeof value === "number"))].sort((a, b) => a - b);
}

function lessonStepProgress(index, sectionIndex, lessonIndex){
    const lesson = lessonByIndexes(index, sectionIndex, lessonIndex);
    if(!lesson) return { completed:0, total:0, percent:0 };

    const gradableSteps = gradableStepsForLesson(index, sectionIndex, lessonIndex);
    if(!gradableSteps.length) return { completed:0, total:0, percent:0 };

    if(isLessonComplete(index, sectionIndex, lesson.id)) {
        return { completed:gradableSteps.length, total:gradableSteps.length, percent:1 };
    }

    const completed = savedCompletedStepsForLesson(lesson.id).filter(step => gradableSteps.includes(step)).length;
    const total = gradableSteps.length;
    return { completed:completed, total:total, percent:total ? completed / total : 0 };
}

function lessonPathStatus(index, sectionIndex, lessonIndex){
    const lesson = lessonByIndexes(index, sectionIndex, lessonIndex);
    if(!lesson) return "locked";
    if(isLessonComplete(index, sectionIndex, lesson.id)) return "completed";
    if(lessonStatuses[lesson.id] === "failed") return "failed";
    if(isLessonUnlocked(index, sectionIndex, lessonIndex)) return "current";
    return "locked";
}

function isLessonUnlocked(index, sectionIndex, lessonIndex){
    if(!isSectionUnlocked(index, sectionIndex)) return false;
    if(lessonIndex === 0) return true;
    const previousLesson = lessonByIndexes(index, sectionIndex, lessonIndex - 1);
    return previousLesson ? isLessonComplete(index, sectionIndex, previousLesson.id) : false;
}

function markLessonStepComplete(lessonId, stepValue){
    if(typeof stepValue !== "number") return;
    const saved = savedCompletedStepsForLesson(lessonId);
    if(saved.includes(stepValue)) return;
    completedLessonStepMap[lessonId] = [...saved, stepValue].sort((a, b) => a - b);
    saveCompletedLessonStepMap();
}

function remainingLessonStepOrder(index, sectionIndex, lessonIndex){
    const lesson = lessonByIndexes(index, sectionIndex, lessonIndex);
    if(!lesson) return [];

    const allSteps = gradableStepsInRange(index, lesson.start, lesson.end);
    if(!allSteps.length) return [];
    return [...allSteps];
}

function lessonProgressIds(index, sectionIndex){
    const lessons = lessonsForSection(index, sectionIndex);
    if(!lessons.length) return [];

    const section = sectionsForPart(index)[sectionIndex];
    const requiresCurrentLessonIds = section?.id === "a-part-1i-v1";
    if(!requiresCurrentLessonIds && isLegacySectionComplete(index, sectionIndex)) {
        return lessons.map(lesson => lesson.id);
    }

    const saved = completedLessons[lessonStoreKey(index, sectionIndex)];
    if(!Array.isArray(saved) || !saved.length) return [];

    const savedIds = saved.filter(value => typeof value === "string");
    const savedSteps = saved.filter(value => typeof value === "number");
    const lessonIds = [];

    lessons.forEach((lesson) => {
        if(savedIds.includes(lesson.id)) {
            if(requiresCurrentLessonIds) {
                const gradableSteps = gradableStepsInRange(index, lesson.start, lesson.end);
                const savedLessonSteps = savedCompletedStepsForLesson(lesson.id);
                if(!gradableSteps.length || !gradableSteps.every(step => savedLessonSteps.includes(step))) {
                    return;
                }
            }
            lessonIds.push(lesson.id);
            return;
        }

        if(savedSteps.length) {
            const gradableSteps = gradableStepsInRange(index, lesson.start, lesson.end);
            if(gradableSteps.length && gradableSteps.every(step => savedSteps.includes(step))) {
                lessonIds.push(lesson.id);
            }
        }
    });

    return lessonIds;
}

function isLegacySectionComplete(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    if(!section) return false;

    return (completedSections[sectionKey(index)] || []).includes(section.id);
}

function completedLessonSteps(index, sectionIndex){
    const lessonIds = lessonProgressIds(index, sectionIndex);
    return lessonIds;
}

function sectionLessonProgress(index, sectionIndex){
    const total = lessonsForSection(index, sectionIndex).length;
    const completed = Math.min(completedLessonSteps(index, sectionIndex).length, total);
    return { completed:completed, total:total };
}

function sectionCursorKey(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    return section ? section.id : "";
}

function reviewLessonIndexForSection(index, sectionIndex){
    const lessons = lessonsForSection(index, sectionIndex);
    if(!lessons.length) return 0;

    const key = sectionCursorKey(index, sectionIndex);
    const saved = Number(reviewLessonCursors[key]);
    if(Number.isInteger(saved) && saved >= 0 && saved < lessons.length) {
        return saved;
    }

    return 0;
}

function firstPlayableLessonIndex(index, sectionIndex, preferredIndex = 0){
    const lessons = lessonsForSection(index, sectionIndex);
    if(!lessons.length) return -1;

    const normalizedStart = Number.isInteger(preferredIndex)
        ? Math.max(0, Math.min(preferredIndex, lessons.length - 1))
        : 0;

    for(let offset = 0; offset < lessons.length; offset++) {
        const lessonIndex = (normalizedStart + offset) % lessons.length;
        if(gradableStepsForLesson(index, sectionIndex, lessonIndex).length) {
            return lessonIndex;
        }
    }

    return -1;
}

function setReviewLessonIndex(index, sectionIndex, lessonIndex){
    const lessons = lessonsForSection(index, sectionIndex);
    const key = sectionCursorKey(index, sectionIndex);
    if(!key || !lessons.length) return;

    const clampedIndex = Math.max(0, Math.min(lessonIndex, lessons.length - 1));
    reviewLessonCursors[key] = clampedIndex;
    saveReviewLessonCursors();
}

function advanceReviewLessonIndex(index, sectionIndex, currentLessonIndex){
    const lessons = lessonsForSection(index, sectionIndex);
    if(!lessons.length) return;
    const nextIndex = (currentLessonIndex + 1) % lessons.length;
    setReviewLessonIndex(index, sectionIndex, nextIndex);
}

function completeEnginePartForRoute(){
    if(!activeCoursePartRoute || !window.Engine?.completeCoursePart) return;
    Engine.completeCoursePart("section-1", activeCoursePartRoute.enginePartId, { xp:10, result:"passed" });
}

function isActiveCoursePartComplete(index){
    if(!activeCoursePartRoute) return false;
    const sections = sectionsForPart(index);
    if(!sections.length) return false;
    return sections.every((section, sectionIndex) => isSectionComplete(index, sectionIndex));
}

function syncActiveCoursePartCompletion(index){
    if(!activeCoursePartRoute) return false;
    if(activeCoursePartRoute.gamePartIndex !== index) return false;
    if(!isActiveCoursePartComplete(index)) return false;

    completeEnginePartForRoute();
    return true;
}

function isLessonComplete(index, sectionIndex, lessonId){
    return completedLessonSteps(index, sectionIndex).includes(lessonId);
}

function markLessonComplete(index, sectionIndex, lessonId){
    const key = lessonStoreKey(index, sectionIndex);
    if(!key) return;

    const saved = lessonProgressIds(index, sectionIndex);
    if(saved.includes(lessonId)) return;

    completedLessons[key] = [...saved, lessonId];
    saveCompletedLessons();
    const lessons = lessonsForSection(index, sectionIndex);
    const lessonIndex = lessons.findIndex((lesson) => lesson.id === lessonId);
    if(lessonIndex >= 0) {
        completedLessonStepMap[lessonId] = gradableStepsForLesson(index, sectionIndex, lessonIndex);
        saveCompletedLessonStepMap();
    }
    lessonStatuses[lessonId] = "passed";
    saveLessonStatuses();
}

function isSectionComplete(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    const progress = sectionLessonProgress(index, sectionIndex);
    if(section?.id === "a-part-1i-v1") {
        return progress.total > 0 && progress.completed >= progress.total;
    }

    if(isLegacySectionComplete(index, sectionIndex)) return true;
    return progress.total > 0 && progress.completed >= progress.total;
}

function isSectionUnlocked(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    if(
        activeCoursePartRoute?.slug === "family" &&
        (
            initialBallId === "a-part-1g-v1" ||
            initialBallId === "a-part-1h-v1" ||
            initialBallId === "a-part-1i-v1" ||
            initialBallId === "a-part-1j-final"
        ) &&
        section?.id === initialBallId
    ) {
        return true;
    }

    if(sectionIndex === 0) return true;
    return isSectionComplete(index, sectionIndex - 1);
}

function markSectionComplete(index, sectionIndex){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    if(!section) return;

    completedLessons[section.id] = lessonsForSection(index, sectionIndex).map(lesson => lesson.id);
    saveCompletedLessons();
    lessonsForSection(index, sectionIndex).forEach((lesson, lessonIndex) => {
        completedLessonStepMap[lesson.id] = gradableStepsForLesson(index, sectionIndex, lessonIndex);
        lessonStatuses[lesson.id] = "passed";
    });
    saveCompletedLessonStepMap();
    saveLessonStatuses();

    const key = sectionKey(index);
    const saved = completedSections[key] || [];
    if(saved.includes(section.id)) return;

    completedSections[key] = [...saved, section.id];
    saveCompletedSections();

    // Award progress the first time a section is completed so home stats move
    // immediately instead of waiting until the entire lesson is finished.
    if(window.Engine?.addXP){
        Engine.addXP(10);
    }

    if(window.AppUI?.updateQuestProgress){
        AppUI.updateQuestProgress(10);
    }

    if(window.PilingoNotify?.submitStudentStats){
        PilingoNotify.submitStudentStats(leaderboardSummary());
    }
}

function currentSectionIndex(){
    const sections = sectionsForPart(partIndex);
    const actualIndex = currentStepActualIndex();
    return sections.findIndex((section) => actualIndex >= section.start && actualIndex <= section.end);
}

function isGradableStep(step){
    return !!step && step.type !== "next";
}

function currentScope(){
    const sections = sectionsForPart(partIndex);
    const sectionIndex = currentSectionIndex();

    if(activeLesson) {
        return {
            kind:"lesson",
            id:activeLesson.id,
            label:activeLesson.scopeLabel,
            start:activeLesson.start,
            end:activeLesson.end
        };
    }

    if(sections.length && sectionIndex >= 0) {
        const section = sections[sectionIndex];
        return {
            kind:"section",
            id:section.id,
            label:displayPartTitle(partIndex) + " • " + section.label,
            start:section.start,
            end:section.end
        };
    }

    return {
        kind:"part",
        id:"game1-part-" + partIndex,
        label:displayPartTitle(partIndex),
        start:0,
        end:gameParts[partIndex].steps.length - 1
    };
}

function gradableCountForScope(scope){
    let total = 0;

    for(let i = scope.start; i <= scope.end; i++) {
        if(isGradableStep(gameParts[partIndex].steps[i])) total++;
    }

    return total;
}

function ensureGradeState(){
    const scope = currentScope();
    if(gradeState && gradeState.scopeId === scope.id) return;

    gradeState = {
        scopeId:scope.id,
        label:scope.label,
        kind:scope.kind,
        total:gradableCountForScope(scope),
        completed:0,
        earned:0,
        mistakes:0,
        stepStates:{}
    };
}

function currentStepGradeState(){
    ensureGradeState();
    const key = String(currentStepActualIndex());

    if(!gradeState.stepStates[key]) {
        gradeState.stepStates[key] = { missed:false, completed:false };
    }

    return gradeState.stepStates[key];
}

function currentGradePercent(){
    ensureGradeState();
    if(!gradeState.total) return 100;
    return Math.round((gradeState.earned / gradeState.total) * 100);
}

function gradeLetter(percent){
    if(percent >= 97) return "A+";
    if(percent >= 93) return "A";
    if(percent >= 90) return "A-";
    if(percent >= 87) return "B+";
    if(percent >= 83) return "B";
    if(percent >= 80) return "B-";
    if(percent >= 77) return "C+";
    if(percent >= 73) return "C";
    if(percent >= 70) return "C-";
    if(percent >= 67) return "D+";
    if(percent >= 63) return "D";
    if(percent >= 60) return "D-";
    return "F";
}

function updateGradeDisplay(){
    if(!document.getElementById("gradeValue")) return;
    ensureGradeState();

    const percent = currentGradePercent();
    document.getElementById("gradeValue").innerText = gradeLetter(percent) + " • " + percent + "%";
    document.getElementById("gradeScore").innerText = gradeState.earned + "/" + gradeState.total + " first-try correct";
    document.getElementById("gradeNote").innerText = gradeState.completed + " finished • " + gradeState.mistakes + " mistakes";
}

function showIdleGrade(message){
    const value = document.getElementById("gradeValue");
    const score = document.getElementById("gradeScore");
    const note = document.getElementById("gradeNote");

    if(!value || !score || !note) return;

    value.innerText = "Ready";
    score.innerText = message || "Start a section to begin grading";
    note.innerText = "Grades are saved when a lesson group is finished.";
}

function registerCorrectForGrade(){
    if(!isGradableStep(currentStep())) return;

    const state = currentStepGradeState();
    if(state.completed) return;

    state.completed = true;
    gradeState.completed++;
    if(!state.missed) gradeState.earned++;
    updateGradeDisplay();
}

function registerWrongForGrade(){
    if(!isGradableStep(currentStep())) return;

    const state = currentStepGradeState();
    if(state.completed || state.missed) return;

    state.missed = true;
    gradeState.mistakes++;
    updateGradeDisplay();
}

function saveCurrentGradeRecord(){
    ensureGradeState();
    const percent = currentGradePercent();
    const existing = gradebook[gradeState.scopeId] || {};
    const bestPercent = Math.max(existing.bestPercent || 0, percent);

    gradebook[gradeState.scopeId] = {
        id:gradeState.scopeId,
        label:gradeState.label,
        kind:gradeState.kind,
        latestPercent:percent,
        latestLetter:gradeLetter(percent),
        latestEarned:gradeState.earned,
        latestTotal:gradeState.total,
        latestMistakes:gradeState.mistakes,
        bestPercent:bestPercent,
        bestLetter:gradeLetter(bestPercent),
        attempts:(existing.attempts || 0) + 1,
        updatedAt:new Date().toISOString()
    };

    saveGradebook();

    if(window.PilingoNotify?.submitStudentStats){
        PilingoNotify.submitStudentStats(leaderboardSummary());
    }
}

function gradeSummaryText(record){
    if(!record) return "No grade yet";
    return "Latest " + record.latestLetter + " (" + record.latestPercent + "%) • Best " + record.bestLetter + " (" + record.bestPercent + "%)";
}

function starsForPercent(percent){
    const score = Number(percent) || 0;
    if(score >= 95) return "⭐️⭐️⭐️";
    if(score >= 80) return "⭐️⭐️";
    if(score >= 60) return "⭐️";
    return "";
}

function lessonCompletionBadge(lessonId){
    if(lessonStatuses[lessonId] === "failed") return "❌";
    if(lessonStatuses[lessonId] === "passed") return "✅";
    return "";
}

function lessonCompletionNote(lessonId){
    if(lessonStatuses[lessonId] === "failed") return "Failed";
    if(lessonStatuses[lessonId] === "passed") return "Completed";

    const record = gradebook[lessonId];
    if(!record) return "Start lesson";

    const stars = starsForPercent(record.bestPercent);
    const grade = `${record.bestLetter} (${record.bestPercent}%)`;
    return stars ? `${stars} • ${grade}` : grade;
}

function lessonNodeSymbol(status){
    if(status === "completed") return "✅";
    if(status === "failed") return "❌";
    if(status === "current") return "▶";
    return "🔒";
}

function lessonNodeActionLabel(status, progress){
    if(status === "completed") return "✅ Finished";
    if(status === "failed") return "❌ Try again";
    if(progress.completed > 0) return "▶ Continue";
    if(status === "current") return "▶ Start";
    return "🔒 Locked";
}

function nextLessonIndexForSection(index, sectionIndex){
    const lessons = lessonsForSection(index, sectionIndex);
    const nextIndex = lessons.findIndex((lesson) => !isLessonComplete(index, sectionIndex, lesson.id));
    return nextIndex >= 0 ? nextIndex : 0;
}

function sectionNodeStatus(index, sectionIndex){
    const progress = sectionLessonProgress(index, sectionIndex);
    if(isSectionComplete(index, sectionIndex)) return "completed";
    if(!isSectionUnlocked(index, sectionIndex)) return "locked";
    if(progress.completed > 0) return "current";
    return "current";
}

function leaderboardSummary(){
    const records = Object.values(gradebook || {});
    const count = records.length;
    const bestGrade = records.reduce((best, record) => Math.max(best, Number(record.bestPercent) || 0), 0);
    const averageGrade = count
        ? Math.round(records.reduce((sum, record) => sum + (Number(record.bestPercent) || 0), 0) / count)
        : 0;

    return {
        completedSections: count,
        averageGrade: averageGrade,
        bestGrade: bestGrade,
        lessonsFinished: completedParts.length,
        xp: typeof Engine.getXP === "function" ? Engine.getXP() : 0,
        level: typeof Engine.getLevel === "function" ? Engine.getLevel() : 0,
        streak: Number(localStorage.getItem("streak") || "0") || 0
    };
}

function markPartComplete(index){
    if(activeCoursePartRoute && activeCoursePartRoute.gamePartIndex === index) {
        return;
    }

    if(!completedParts.includes(index)) {
        completedParts.push(index);
        saveCompletedParts();
    }
}

function nextOpenPart(){
    if(activeCoursePartRoute) return -1;
    return gameParts.findIndex((part, index) => !completedParts.includes(index));
}

function allPartsComplete(){
    if(activeCoursePartRoute) return false;
    return completedParts.length >= gameParts.length;
}

function isDirectSingleBallRoute(index){
    const sections = sectionsForPart(index);
    return !!(
        activeCoursePartRoute &&
        activeCoursePartRoute.gamePartIndex === index &&
        sections.length === 1 &&
        lessonsForSection(index, 0).length === 1
    );
}

function usesDirectBallFlow(index){
    return !!(
        activeCoursePartRoute &&
        activeCoursePartRoute.gamePartIndex === index
    );
}

function startPart(index){
    activeLesson = null;
    if(sectionsForPart(index).length) {
        if(isDirectSingleBallRoute(index)) {
            startSection(index, 0);
            return;
        }
        showSectionSelect(index);
        return;
    }

    partIndex = index;
    stepIndex = 0;
    hearts = Engine.getHearts();
    gradeState = null;
    PilingoAudio.playPartAnimal(index);
    load();
}

function startSection(index, sectionIndex){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    if(!section || !isSectionUnlocked(index, sectionIndex)) return;
    const lessons = lessonsForSection(index, sectionIndex);

    if(usesDirectBallFlow(index) && isSectionComplete(index, sectionIndex) && lessons.length > 1) {
        startCompletedSectionReview(index, sectionIndex);
        return;
    }

    if(!usesDirectBallFlow(index) && isSectionComplete(index, sectionIndex) && lessons.length > 1) {
        showLessonSelect(index, sectionIndex, "Choose any lesson or quiz in this completed ball to review.");
        return;
    }

    startLesson(index, sectionIndex, nextLessonIndexForSection(index, sectionIndex));
}

function startCompletedSectionReview(index, sectionIndex){
    const lessons = lessonsForSection(index, sectionIndex);
    if(!lessons.length) {
        showSectionSelect(index, "Tap a ball to start or continue learning.");
        return;
    }

    const lessonIndex = firstPlayableLessonIndex(index, sectionIndex, 0);
    if(lessonIndex < 0) {
        showSectionSelect(index, "This ball could not load correctly. Please open it again.");
        return;
    }

    setReviewLessonIndex(index, sectionIndex, lessonIndex);
    gradeState = null;
    activeLesson = null;
    startLesson(index, sectionIndex, lessonIndex, true);
}

function startSectionById(index, sectionId){
    const sectionIndex = sectionsForPart(index).findIndex((section) => section.id === sectionId);
    if(sectionIndex < 0) {
        showSectionSelect(index, "That ball could not be found.");
        return;
    }

    if(!isSectionUnlocked(index, sectionIndex)) {
        showSectionSelect(index, "Finish the previous ball first to unlock this one.");
        return;
    }

    startSection(index, sectionIndex);
}

function startLesson(index, sectionIndex, lessonIndex, reviewMode = false){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    const lesson = lessonsForSection(index, sectionIndex)[lessonIndex];
    if(!section || !isSectionUnlocked(index, sectionIndex)) return;
    if(!lesson) return;
    if(!isLessonUnlocked(index, sectionIndex, lessonIndex)) {
        if(usesDirectBallFlow(index)) {
            showSectionSelect(index, "Finish the previous lesson in this ball first to unlock the next one.");
            return;
        }
        showLessonSelect(index, sectionIndex, "Finish the egg above first to unlock this one.");
        return;
    }

    const nextOrder = remainingLessonStepOrder(index, sectionIndex, lessonIndex);
    const fallbackOrder = buildLessonStepOrder(index, lesson.start, lesson.end);
    const lessonOrder = nextOrder.length ? nextOrder : fallbackOrder;
    if(!lessonOrder.length) {
        const retryFromStart = Boolean(reviewMode) || isSectionComplete(index, sectionIndex);
        const fallbackLessonIndex = firstPlayableLessonIndex(
            index,
            sectionIndex,
            retryFromStart ? 0 : lessonIndex + 1
        );

        if(fallbackLessonIndex >= 0 && fallbackLessonIndex !== lessonIndex) {
            startLesson(index, sectionIndex, fallbackLessonIndex, retryFromStart);
            return;
        }

        showSectionSelect(index, "This ball could not load correctly. Please open it again.");
        return;
    }

    partIndex = index;
    stepIndex = lessonOrder[0];
    activeLesson = {
        ...lesson,
        sectionIndex:sectionIndex,
        lessonIndex:lessonIndex,
        reviewMode:Boolean(reviewMode),
        scopeLabel:displayPartTitle(index) + " • " + section.label + " • " + lesson.label,
        stepOrder:lessonOrder,
        orderPosition:0
    };
    hearts = Engine.getHearts();
    gradeState = null;
    PilingoAudio.playPartAnimal(index);
    load();
}

function showLessonSelect(index, sectionIndex, message){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    if(!section) {
        showSectionSelect(index);
        return;
    }

    if(usesDirectBallFlow(index)) {
        startSection(index, sectionIndex);
        return;
    }

    const lessons = lessonsForSection(index, sectionIndex);
    const progress = sectionLessonProgress(index, sectionIndex);

    partIndex = index;
    applyPageTheme(index);
    activeLesson = null;
    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;

    renderHearts();
    setTopBackButton("← Back", () => showSectionSelect(index));
    document.getElementById("bar").style.width = progress.total ? ((progress.completed / progress.total) * 100) + "%" : "0%";
    showPartLabel("Kurmanji to English");
    document.getElementById("instruction").innerText = message || "Choose a lesson or quiz inside this ball";
    document.getElementById("question").innerText = displayPartTitle(index) + " • " + section.label;
    document.getElementById("question").classList.remove("rich-prompt");
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";
    showIdleGrade(`${progress.completed}/${progress.total} eggs completed in this section`);
    document.getElementById("activity").innerHTML = `
        <div class="lesson-path-shell">
            <div class="lesson-path-banner">
                <strong>${escapeHtml(section.label)}</strong>
                <span>${escapeHtml(section.detail)}</span>
                <span class="section-grade">${progress.completed}/${progress.total} eggs completed</span>
            </div>
            <div class="lesson-path">
                ${lessons.map((lesson, lessonIndex) => {
                    const unlocked = isLessonUnlocked(index, sectionIndex, lessonIndex);
                    const completed = isLessonComplete(index, sectionIndex, lesson.id);
                    const status = lessonPathStatus(index, sectionIndex, lessonIndex);
                    const lessonProgress = lessonStepProgress(index, sectionIndex, lessonIndex);
                    const progressDeg = Math.round(Math.max(0, Math.min(lessonProgress.percent, 1)) * 360);
                    const progressText = completed
                        ? "Finished"
                        : `${lessonProgress.completed}/${lessonProgress.total} done`;

                    return `
                        <div class="lesson-path-node ${lessonIndex % 2 === 0 ? "left" : "right"}">
                            <button
                                class="lesson-egg-button ${completed ? "completed" : ""} ${status === "current" ? "current" : ""} ${unlocked ? "" : "locked"}"
                                type="button"
                                onclick="${unlocked ? `startLesson(${index}, ${sectionIndex}, ${lessonIndex})` : ""}"
                                ${unlocked ? "" : "disabled"}
                            >
                                <span class="lesson-egg-ring" style="--egg-progress:${progressDeg}deg">
                                    <span class="lesson-egg-core">
                                        <span class="lesson-egg-symbol">${lessonNodeSymbol(status)}</span>
                                        <span class="lesson-egg-index">Egg ${lessonIndex + 1}</span>
                                    </span>
                                </span>
                                <span class="lesson-egg-label">
                                    <span class="lesson-egg-title">${escapeHtml(lesson.label)} ${lessonCompletionBadge(lesson.id)}</span>
                                    <span class="lesson-egg-detail">${escapeHtml(lesson.detail)}</span>
                                    <span class="lesson-egg-progress">${escapeHtml(lessonNodeActionLabel(status, lessonProgress))} • ${escapeHtml(progressText)}</span>
                                </span>
                            </button>
                        </div>
                    `;
                }).join("")}
            </div>
        </div>
    `;
}

    const sections = sectionsForPart(index);

        startPart(index);
        return;

                                </span>
                            </button>
                        </div>
                    `;

function partOrbitStyle(index, total){
    const radius = total <= 3 ? 188 : 208;
    const startAngle = -90;
    const angle = ((360 / total) * index) + startAngle;
    const duration = (8.8 + (index * 0.65)).toFixed(2);
    const delay = (index * -0.55).toFixed(2);
    return `--orbit-angle:${angle.toFixed(2)}deg; --orbit-radius:${radius.toFixed(1)}px; --orbit-duration:${duration}s; --orbit-delay:${delay}s;`;
}

function partMenuThemeStyle(groupIndex){
    const theme = partMenuThemes[groupIndex] || partMenuThemes[groupIndex % partMenuThemes.length];
    if(!theme) return "";

    return [
        `--menu-top:${theme.top}`,
        `--menu-mid:${theme.mid}`,
        `--menu-bottom:${theme.bottom}`,
        `--menu-glow-a:${theme.glowA}`,
        `--menu-glow-b:${theme.glowB}`,
        `--menu-ribbon-a:${theme.ribbonA}`,
        `--menu-ribbon-b:${theme.ribbonB}`,
        `--menu-ribbon-c:${theme.ribbonC}`,
        `--menu-inset:${theme.inset}`,
        `--menu-shadow:${theme.shadow}`,
        `--menu-border:${theme.border}`

}

function load(){
    const part = gameParts[partIndex];
    let step = currentStep();
    if(!step) {
        if(activeLesson && sectionsForPart(partIndex).length) {
            const sectionIndex = Number.isInteger(activeLesson.sectionIndex) ? activeLesson.sectionIndex : currentSectionIndex();
            if(sectionIndex >= 0) {
                const restartFromBeginning = Boolean(activeLesson.reviewMode) || isSectionComplete(partIndex, sectionIndex);
                const fallbackLessonIndex = firstPlayableLessonIndex(
                    partIndex,
                    sectionIndex,
                    restartFromBeginning ? 0 : nextLessonIndexForSection(partIndex, sectionIndex)
                );
                if(fallbackLessonIndex >= 0) {
                    startLesson(
                        partIndex,
                        sectionIndex,
                        fallbackLessonIndex,
                        restartFromBeginning
                    );
                    return;
                }

                showSectionSelect(partIndex, "This ball could not load correctly. Please open it again.");
                return;
            }
        }

        if(usesDirectBallFlow(partIndex) && initialBallId) {
            const directSectionIndex = sectionsForPart(partIndex).findIndex((section) => section.id === initialBallId);
            if(directSectionIndex >= 0) {
                const restartFromBeginning = isSectionComplete(partIndex, directSectionIndex);
                const fallbackLessonIndex = firstPlayableLessonIndex(
                    partIndex,
                    directSectionIndex,
                    restartFromBeginning ? 0 : nextLessonIndexForSection(partIndex, directSectionIndex)
                );
                if(fallbackLessonIndex >= 0) {
                    startLesson(
                        partIndex,
                        directSectionIndex,
                        fallbackLessonIndex,
                        restartFromBeginning
                    );
                    return;
                }
            }

            startSectionById(partIndex, initialBallId);
            return;
        }

        if(sectionsForPart(partIndex).length) {
            showSectionSelect(partIndex, "Tap a ball to start or continue learning.");
            return;
        }

        showPartSelect();
        return;
    }
    ensureGradeState();
    applyPageTheme(partIndex);
    const activeSection = sectionsForPart(partIndex)[currentSectionIndex()];
    document.body.classList.toggle("compact-build-step", step.type === "build");

    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;

    renderHearts();
    updateProgress();
    if(activeLesson) {
        setTopBackButton("← Back", () => {
            if(usesDirectBallFlow(partIndex)) {
                window.location.href = "engine.html";
                return;
            }
            if(sectionsForPart(partIndex).length) {
                showSectionSelect(partIndex, "Tap a ball to continue from the next unfinished lesson.");
                return;
            }
            showPartSelect();
        });
    } else if(sectionsForPart(partIndex).length) {
        setTopBackButton("← Back", () => showSectionSelect(partIndex));
    } else {
        setTopBackButton(sectionsForPart(partIndex).length ? "← Back" : "← Back", () => sectionsForPart(partIndex).length ? showSectionSelect(partIndex) : showPartSelect());
    }
    showPartLabel("");
    document.getElementById("instruction").innerText = step.instruction || "";
    const questionEl = document.getElementById("question");
    questionEl.classList.toggle("rich-prompt", Boolean(step.promptHtml));
    if(step.promptHtml) {
        questionEl.innerHTML = step.promptHtml;
    } else {
        questionEl.innerText = cleanPlaceholderLines(step.prompt || "");
    }
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";
    updateGradeDisplay();
    setLessonMascot(
        step.type === "type" ? "write" :
        step.type === "hear" ? "listen" :
        step.type === "match" || step.type === "audioMatch" ? "read" :
        step.type === "next" ? "talk" :
        "idle",
        { returnTo:"idle", duration:1200 }
    );

    if(step.type === "image") renderImageStep(step);
    if(step.type === "choice") renderChoiceStep(step);
    if(step.type === "hear") renderHearStep(step);
    if(step.type === "build") renderBuildStep(step);
    if(step.type === "match") renderMatchStep(step);
    if(step.type === "audioMatch") renderAudioMatchStep(step);
    if(step.type === "type") renderTypeStep(step);
    if(step.type === "next") renderNextStep(step);
}

function shuffleChoiceOptions(options){
    for(let i = options.length - 1; i > 0; i--) {
        const swapIndex = Math.floor(Math.random() * (i + 1));
        [options[i], options[swapIndex]] = [options[swapIndex], options[i]];
    }
}

function emojiForCorrectChoice(step, option){
    const emoji = emojiForChoice(step);
    if(!emoji || !isCorrectChoice(step, option)) return "";

    return isPluralChoice(step, option) ? emoji.plural : emoji.singular;
}

function emojiForChoice(step){
    const text = [step.prompt, ...step.options, ...answersForStep(step)].join(" ").toLowerCase();

    if(text.includes("person") || text.includes("people") || text.includes("man") || text.includes("mirov")) {
        return { singular:"👨", plural:"👨👨" };
    }

    if(text.includes("apple") || text.includes("sêv")) {
        return { singular:"🍎", plural:"🍎🍎" };
    }

    if(text.includes("book") || text.includes("pirtûk")) {
        return { singular:"📘", plural:"📚" };
    }

    if(text.includes("ball") || text.includes("top")) {
        return { singular:"⚽", plural:"⚽⚽" };
    }

    return null;
}

function isPluralChoice(step, option){
    const text = normalize(option + " " + step.prompt);
    return /\b(these|those|apples|books|balls|people)\b/.test(text);
}

function renderHearStep(step){

function renderMatchStep(step){
    const kurmanjiCards = [];
    const englishCards = [];

    step.pairs.forEach((pair, index) => {
        const englishValue = Array.isArray(pair) ? pair[0] : pair.english;
        const kurmanjiValue = Array.isArray(pair) ? pair[1] : pair.kurmanji;
        const englishHtml = Array.isArray(pair) ? "" : (pair.englishHtml || "");
        const kurmanjiHtml = Array.isArray(pair) ? "" : (pair.kurmanjiHtml || "");
        const matchGroup = Array.isArray(pair) ? index : (pair.group || index);
        const leftText = step.leftSide === "second" ? kurmanjiValue : englishValue;
        const rightText = step.rightSide === "first" ? englishValue : kurmanjiValue;
        const leftHtml = step.leftSide === "second" ? kurmanjiHtml : englishHtml;
        const rightHtml = step.rightSide === "first" ? englishHtml : kurmanjiHtml;

        englishCards.push({
            text:rightText,
            html:rightHtml,
            key:index,
            group:matchGroup,
            side:"english",
            id:"en-" + index,
            spoken:step.rightSpeakMap?.[rightText] || (step.rightSpeakValues ? rightText : "") || (step.speakSide === "english" ? kurmanjiValue : ""),
            spokenLang:step.rightSpeakLangMap?.[rightText] || ""
        });
        kurmanjiCards.push({
            text:leftText,
            html:leftHtml,
            key:index,
            group:matchGroup,
            side:"kurmanji",
            id:"ku-" + index,
            spoken:step.leftSpeakMap?.[leftText] || (step.speakSide === "kurmanji" ? englishValue : ""),
            spokenLang:step.leftSpeakLangMap?.[leftText] || ""
        });
    });

    if(!step.noShuffle){
        shuffleCards(kurmanjiCards, "match-kurmanji");
        shuffleCards(englishCards, "match-english");
    }

    document.getElementById("activity").innerHTML = `
        <div class="match-grid">
            <div class="match-column">
                <div class="match-heading">${escapeHtml(step.leftHeading || "Kurmanji")}</div>
                ${kurmanjiCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="${card.spoken ? `speakAndSelectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)}, '${escapeHtml(card.spoken)}', '${escapeHtml(card.spokenLang || "")}')` : `selectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)})`}">
                        ${card.spoken ? "🔊 " : ""}${card.html || escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
            <div class="match-column">
                <div class="match-heading">${escapeHtml(step.rightHeading || "English")}</div>
                ${englishCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="${card.spoken ? `speakAndSelectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)}, '${escapeHtml(card.spoken)}', '${escapeHtml(card.spokenLang || "")}')` : `selectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)})`}">
                        ${card.spoken ? "🔊 " : ""}${card.html || escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
        </div>
    `;
}

function renderAudioMatchStep(step){

function buildLessonStepOrder(partIdx, start, end){
    const order = [];

    for(let i = start; i <= end; i++) {
        if(isGradableStep(gameParts[partIdx].steps[i])) {
            order.push(i);
        }
    }

    shuffleChoiceOptions(order);
    return order;
}

function setupTypingQuizKeyboard(){
    const input = document.getElementById("typedAnswer");
    if(!input) return;

    window.setTimeout(() => {
        input.focus();
        input.select();
    }, 0);

    input.addEventListener("keydown", (event) => {
        if(event.key !== "Enter") return;
        event.preventDefault();

        if(pendingAdvanceTimer){
            finishPendingAdvance();
            return;
        }

        const checkButton = document.getElementById("typedCheckButton");
        if(checkButton && !checkButton.disabled){
            checkTyped(checkButton);
        }
    });
}

function shuffleCards(cards, salt){
    if(cards.length < 2) return;

    let seed = 2166136261;
    const text = salt + "-" + partIndex + "-" + currentStepActualIndex() + "-" + cards.length;

    for(let i = 0; i < text.length; i++) {
        seed ^= text.charCodeAt(i);
        seed = Math.imul(seed, 16777619);
    }

    for(let i = cards.length - 1; i > 0; i--) {
        seed = Math.imul(seed ^ (seed >>> 13), 1274126177);
        const swapIndex = Math.abs(seed) % (i + 1);
        [cards[i], cards[swapIndex]] = [cards[swapIndex], cards[i]];
    }
}

function showButtonResult(button, result){
    if(!button) return;
    button.classList.remove("correct", "wrong");
    button.classList.add(result);
}

function revealCorrectEmoji(button, step, value){
    if(!button || button.dataset.emojiRevealed === "true") return;

    const emoji = emojiForCorrectChoice(step, value);
    if(!emoji) return;

    button.textContent = emoji + " " + button.textContent.trim();
    button.dataset.emojiRevealed = "true";
}

function answersForStep(step){
    if(Array.isArray(step.acceptedAnswers) && step.acceptedAnswers.length) {
        return step.acceptedAnswers;
    }
    return Array.isArray(step.answer) ? step.answer : [step.answer];
}

function isCorrectChoice(step, value){
    return answersForStep(step).some(answer => normalize(value) === normalize(answer));
}

function isAcceptedTypedAnswer(step, value){
    return answersForStep(step).some(answer => normalize(value) === normalize(answer));
}

function checkChoice(value, button){
    const step = currentStep();
    if(isCorrectChoice(step, value)){
        revealCorrectEmoji(button, step, value);
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    showButtonResult(button, "wrong");
    markWrong();
}

function selectWord(index){
    const button = document.getElementById("word-" + index);
    if(!button || button.disabled) return;

    button.disabled = true;
    button.classList.add("selected");
    selectedWords.push({ index:index, text:currentBuildOptions[index] });
    renderSelectedWords();
}

function renderSelectedWords(){
    const bank = document.getElementById("answerBank");
    if(!bank) return;

    if(selectedWords.length === 0) {
        bank.innerHTML = "";
        return;
    }

    bank.innerHTML = selectedWords.map((word, index) => `
        <button onclick="removeWord(${index})">${escapeHtml(word.text)}</button>
    `).join("");
}

function removeWord(index){
    const word = selectedWords[index];
    if(!word) return;

    selectedWords.splice(index, 1);
    const button = document.getElementById("word-" + word.index);
    if(button) {
        button.disabled = false;
        button.classList.remove("selected");
    }

    renderSelectedWords();
}

function checkBuild(button){
    const step = currentStep();
    const answer = selectedWords.map(word => normalize(word.text));
    const expectedAnswers = Array.isArray(step.answer[0]) ? step.answer : [step.answer];
    const isCorrect = expectedAnswers.some(expected =>
        answer.join(" ") === expected.map(word => normalize(word)).join(" ")
    );

    if(isCorrect){
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    showButtonResult(button, "wrong");
    markWrong();
}

function checkTyped(button){
    const step = currentStep();
    const input = document.getElementById("typedAnswer");
    const value = input ? input.value : "";

    if(isAcceptedTypedAnswer(step, value)){
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    document.getElementById("feedback").innerText =
        "Correct answer: " + answersForStep(step).join(" / ");
    showButtonResult(button, "wrong");
    if(input){
        window.setTimeout(() => {
            input.focus();
            input.select();
        }, 0);
    }
    markWrong();
}

function selectMatch(buttonIndex, side, key){
    if(matchedKeys.includes(buttonIndex)) return;

    const button = document.getElementById("match-" + buttonIndex);
    if(!button) return;

    button.classList.add("selected");

    if(!selectedMatch) {
        selectedMatch = { buttonIndex:buttonIndex, side:side, key:key };
        return;
    }

    if(selectedMatch.buttonIndex === buttonIndex) return;

    const firstButton = document.getElementById("match-" + selectedMatch.buttonIndex);

    if(selectedMatch.side !== side && selectedMatch.key === key) {
        matchedKeys.push(buttonIndex, selectedMatch.buttonIndex);
        button.classList.add("correct");
        if(firstButton) firstButton.classList.add("correct");
        button.disabled = true;
        if(firstButton) firstButton.disabled = true;
        selectedMatch = null;

        if(matchedKeys.length === currentStep().pairs.length * 2) {
            markCorrect();
        }
        return;
    }

    setTimeout(() => {
        button.classList.add("wrong");
        if(firstButton) firstButton.classList.add("wrong");
    }, 50);

    setTimeout(() => {
        button.classList.remove("selected");
        button.classList.remove("wrong");
        if(firstButton) firstButton.classList.remove("selected", "wrong");
        selectedMatch = null;
        markWrong();
    }, 650);
}

function normalize(value){
    return String(value)
        .normalize("NFC")
        .toLowerCase()
        .normalize("NFC")
        .replace(/[\u00ad\u0307\u034f\u061c\u180e\u200b-\u200f\u202a-\u202e\u2060-\u206f\ufeff]/g, "")
        .replace(/[\u2010-\u2015\u2212\ufe58\ufe63\uff0d]/g, "-")
        .replace(/\s+/g, " ")
        .replace(/[!?.،,]/g, "")
        .trim();
}

function markCorrect(){
    registerCorrectForGrade();
    playSound("correct");
    document.getElementById("feedback").innerText = "✅ Correct";
    showLessonMascotMessage({
        category:"correct",
        animation:Math.random() > 0.45 ? "smile" : "wave",
        duration:1900
    });
    if(pendingAdvanceTimer) clearTimeout(pendingAdvanceTimer);
    pendingAdvanceTimer = setTimeout(() => {
        pendingAdvanceTimer = null;
        completeStep();
    }, 650);
}

function markWrong(){
    registerWrongForGrade();
    hearts = Engine.loseHeart();
    renderHearts();
    playSound("wrong");
    document.getElementById("feedback").innerText = "❌ Try again";
    showLessonMascotMessage({
        category:"wrong",
        animation:"think",
        duration:2100
    });

    if(hearts <= 0) gameOver();
}

function finishPendingAdvance(){
    if(!pendingAdvanceTimer) return;
    clearTimeout(pendingAdvanceTimer);
    pendingAdvanceTimer = null;
    completeStep();
}

function completeStep(){
    if(pendingAdvanceTimer){
        clearTimeout(pendingAdvanceTimer);
        pendingAdvanceTimer = null;
    }
    const sections = sectionsForPart(partIndex);
    const sectionIndex = currentSectionIndex();
    if(activeLesson && sections.length && sectionIndex >= 0) {
        const completedLessonIndex = activeLesson.lessonIndex;
        const wasReviewMode = !!activeLesson.reviewMode;
        markLessonStepComplete(activeLesson.id, currentStepActualIndex());
        const wasComplete = isSectionComplete(partIndex, sectionIndex);
        if(Array.isArray(activeLesson.stepOrder) && activeLesson.orderPosition < activeLesson.stepOrder.length - 1) {
            activeLesson.orderPosition++;
            load();
            return;
        }

        markLessonComplete(partIndex, sectionIndex, activeLesson.id);
        saveCurrentGradeRecord();
        const heartsMax = Number(window.Engine?.HEARTS_MAX || 5);
        const heartsBeforeRestore = window.Engine?.getHearts ? Engine.getHearts() : hearts;
        const restoredHeart = heartsBeforeRestore < heartsMax;
        hearts = window.Engine?.addHeart ? Engine.addHeart(1) : Math.min(heartsMax, heartsBeforeRestore + 1);
        renderHearts();
        const lessonPercent = currentGradePercent();
        const completionCategory = activeLessonIsQuiz() ? "quizComplete" : "lessonComplete";
        const completionScore = activeLessonIsQuiz()
            ? `${gradeLetter(lessonPercent)} • ${lessonPercent}%`
            : "";
        const nowComplete = isSectionComplete(partIndex, sectionIndex);
        const nextSection = sections[sectionIndex + 1];
        activeLesson = null;

        showLessonMascotReaction({
            category:completionCategory,
            animation:"celebrate",
            duration:2600,
            score:completionScore,
            speak:true,
            zoomIn:true
        });
        window.PilingoPush?.recordLessonCompletion?.({
            page:"game1.html",
            lessonId: activeLesson?.id || "",
            partId: activeCoursePartRoute?.slug || `part-${partIndex + 1}`,
            label: completionCategory,
            score: completionScore
        });
        window.PilingoPush?.maybePromptAfterUse?.(completionCategory);

        if(nowComplete && !wasComplete) {
            markSectionComplete(partIndex, sectionIndex);
            setReviewLessonIndex(partIndex, sectionIndex, 0);
            const routeCompleted = syncActiveCoursePartCompletion(partIndex);

            if(usesDirectBallFlow(partIndex)) {
                window.location.href = "engine.html";
                return;
            }

            if(nextSection) {
                showSectionSelect(
                    partIndex,
                    (restoredHeart ? "❤️ +1 heart • " : "") + nextSection.label + " is now unlocked"
                );
                return;
            }

            if(activeCoursePartRoute && routeCompleted) {
                showSectionSelect(
                    partIndex,
                    (restoredHeart ? "❤️ +1 heart • " : "") + "🏆 This course part is completed. You can review these lessons again or go back when you are ready."
                );
                return;
            }
            markPartComplete(partIndex);
            showPartComplete(partIndex);
            return;
        }

        if(nowComplete && wasComplete && wasReviewMode && typeof completedLessonIndex === "number") {
            const sectionLessons = lessonsForSection(partIndex, sectionIndex);
            const nextReviewLessonIndex = completedLessonIndex + 1;
            if(nextReviewLessonIndex < sectionLessons.length) {
                startLesson(partIndex, sectionIndex, nextReviewLessonIndex, true);
                return;
            }

            window.location.href = "engine.html";
            return;
        }

        if(nowComplete && wasComplete && typeof completedLessonIndex === "number") {
            advanceReviewLessonIndex(partIndex, sectionIndex, completedLessonIndex);
        }

        if(usesDirectBallFlow(partIndex)) {
            if(["a-part-2-greetings-v2", "a-part-2-greetings-v3"].includes(sections[sectionIndex]?.id) && typeof completedLessonIndex === "number") {
                const nextLessonIndex = completedLessonIndex + 1;
                if(nextLessonIndex < lessonsForSection(partIndex, sectionIndex).length) {
                    startLesson(partIndex, sectionIndex, nextLessonIndex);
                    return;
                }
            }
            window.location.href = "engine.html";
            return;
        }

        showSectionSelect(partIndex, "✅ Lesson passed. Tap the same ball to continue, or open another unlocked ball.");
        return;
    }

    stepIndex++;

    if(stepIndex < gameParts[partIndex].steps.length) {
        load();
        return;
    }

    if(!sections.length) {
        saveCurrentGradeRecord();
    }

    if(activeCoursePartRoute) {
        syncActiveCoursePartCompletion(partIndex);
    }
    markPartComplete(partIndex);
    showPartComplete(partIndex);
}

function showPartComplete(completedIndex){
    PilingoAudio.playLessonComplete();
    applyPageTheme(completedIndex);
    setLessonMascot("celebrate", { returnTo:"idle", duration:1700 });
    showLessonMascotReaction({
        category:"lessonComplete",
        animation:"celebrate",
        duration:2600,
        speak:true,
        zoomIn:true
    });

    const openPart = nextOpenPart();
    const isAllDone = allPartsComplete();

    renderHearts();
    setTopBackButton("← Back", () => {
        if(activeCoursePartRoute){
            showSectionSelect(completedIndex, "🏆 This course part is completed. You can review these lessons again or go back when you are ready.");
            return;
        }
        showPartSelect();
    });
    document.getElementById("bar").style.width = "100%";
    showPartLabel("Kurmanji to English");
    document.getElementById("instruction").innerText = "Part complete";
    document.getElementById("question").innerText = displayPartTitle(completedIndex);
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "✅ Great job!";
    const partSectionsForResult = sectionsForPart(completedIndex);
    const recordKey = partSectionsForResult.length ? partSectionsForResult[partSectionsForResult.length - 1].id : "game1-part-" + completedIndex;
    const record = gradebook[recordKey];
    document.getElementById("activity").innerHTML = `
        <div class="part-complete-actions">
            <div class="section-grade" style="font-size:16px !important; margin-bottom:10px;">${escapeHtml(record ? `Your latest grade: ${record.latestLetter} (${record.latestPercent}%)` : "Your grade was saved.")}</div>
            ${!activeCoursePartRoute && openPart >= 0 ? `<button class="primary-action" onclick="startPart(${openPart})">Start next part</button>` : ""}
            ${!activeCoursePartRoute && isAllDone ? `<button class="primary-action" onclick="finish()">Finish Game One</button>` : ""}
        </div>
    `;
}

function finish(){
    PilingoAudio.playLessonComplete();
  showLessonComplete();

    if (typeof Engine.completeCoursePart === "function") {
        Engine.completeCoursePart("section-1", "part-1", { xp: 10, result: "passed" });
    } else if (typeof Engine.completeSkill === "function") {
        Engine.completeSkill(0, 10);
    } else {
        Engine.addXP(10);
        Engine.unlockLevel(1);
        Engine.resetHearts();
    }

    document.getElementById("bar").style.width = "100%";

    setTimeout(() => {
        window.location.href = "engine.html";
    }, 2200);
}

function showLessonComplete(){
  const card = document.querySelector(".card");
  if(!card) return;
  card.innerHTML = `
<div id="lessonCompleteMascot" class="lesson-complete-mascot" aria-hidden="true"></div>
<h2>Great job!</h2>
<p>You finished this lesson.</p>
`;
    if(window.PilingoMascot){
      PilingoMascot.mount("#lessonCompleteMascot", {
        size: 132,
        screen: "results",
        state: "celebrate"
      });
    if(window.showPilingoReaction){
      showPilingoReaction({
        target:"#lessonCompleteMascot",
        category:"lessonComplete",
        animation:"celebrate",
        duration:2600,
        speak:true,
        zoomIn:true
      });
    } else if(window.showPilingoMessage){
      showPilingoMessage({
        target:"#lessonCompleteMascot",
        category:"lessonComplete",
        animation:"celebrate",
        duration:2600
      });
    }
  }
}

function gameOver(){
    if(activeLesson?.id) {
        lessonStatuses[activeLesson.id] = "failed";
        saveLessonStatuses();
    }
    document.body.innerHTML = `
    <div class="card">
        <div id="gameOverMascot" class="lesson-complete-mascot" aria-hidden="true"></div>
        <h2>Out of hearts</h2>
        <button onclick="location.reload()">Try again</button>
    </div>`;
    if(window.PilingoMascot){
        PilingoMascot.mount("#gameOverMascot", {
            size: 132,
            screen: "results",
            state: "sad"
        });
        if(window.showPilingoMessage){
            showPilingoMessage({
                target:"#gameOverMascot",
                category:"wrong",
                animation:"think",
                duration:2500
            });
        }
    }
}

setTopBackButton("← Back", () => goBackToGames());

if(window.PilingoMascot){
    PilingoMascot.mount("#lessonMascot", {
        size: window.innerWidth <= 520 ? 82 : 122,
        screen: "quiz",
        compact: true,
        float: false,
        state: "wave"
    });
    window.setTimeout(() => setLessonMascot("idle"), 950);
}

if(activeCoursePartRoute) {
    if(!activeCoursePartRoute.sectionIds.length) {
        window.location.href = "engine.html";
    } else if(initialBallId) {
        startSectionById(activeCoursePartRoute.gamePartIndex, initialBallId);
    } else {
        window.location.href = "engine.html";
    }
} else {
    showPartSelect();
}
</script>
<script src="app-polish.js"></script>
</body>
