<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Lesson 3: This / That</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f9ff;
    text-align:center;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    max-width:550px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#hearts{
    font-size:28px;
    margin-bottom:10px;
}

#progress{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}

#bar{
    height:100%;
    width:0%;
    background:#4caf50;
}

#visual{
    font-size:82px;
    line-height:1;
    margin:18px 0 10px;
}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#1976d2;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#feedback{
    min-height:25px;
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div id="hearts"></div>

<div id="progress">
    <div id="bar"></div>
</div>

<div id="visual" aria-hidden="true"></div>

<h2 id="question">Loading...</h2>

<div id="options"></div>

<div id="feedback"></div>

</div>

<script src="pilingo-sounds.js"></script>
<script src="pwa.js"></script>
<script>

let course = localStorage.getItem("course") || "en-ku";

function t(en, ku){
    return ku;
}

let hearts = parseInt(localStorage.getItem("hearts") || "5");

function renderHearts(){
    let html = "";

    for(let i=0;i<hearts;i++) html += "❤️ ";
    for(let i=hearts;i<5;i++) html += "🖤 ";

    document.getElementById("hearts").innerHTML = html;
}

function playSound(type){
    if(type === "correct"){
        PilingoAudio.playCorrect();
        return;
    }

    PilingoAudio.playWrong();
}

let questions = [

{
q:t("What is this?","Ev çi ye?","Vad är detta?"),
visual:"👇",
options:[
t("This","Ev","Det här"),
t("That","Ew","Det där"),
t("He","Ew","Han")
],
answer:0
},

{
q:t("What is that?","Ew çi ye?","Vad är det där?"),
visual:"👉",
options:[
t("This","Ev","Det här"),
t("That","Ew","Det där"),
t("She","Ew","Hon")
],
answer:1
},

{
q:t("Choose 'This'","'Ev' hilbijêre","Välj 'Det här'"),
visual:"👇",
options:[
t("That","Ew","Det där"),
t("This","Ev","Det här"),
t("It","Ew e","Den")
],
answer:1
},

{
q:t("Choose 'That'","'Ew' hilbijêre","Välj 'Det där'"),
visual:"👉",
options:[
t("This","Ev","Det här"),
t("He","Ew","Han"),
t("That","Ew","Det där")
],
answer:2
},

{
q:t("This or that?","Ev an ew?","Det här eller det där?"),
visual:"👇",
options:[
t("This","Ev","Det här"),
t("That","Ew","Det där"),
t("She","Ew","Hon")
],
answer:0
}

];

let current = 0;

function updateProgress(){
    let percent = (current / questions.length) * 100;
    document.getElementById("bar").style.width = percent + "%";
}

function load(){

    renderHearts();
    updateProgress();

    let q = questions[current];

    document.getElementById("visual").innerText = q.visual;
    document.getElementById("question").innerText = q.q;

    let html = "";

    q.options.forEach((opt,i)=>{
        html += `<button onclick="check(${i})">${opt}</button>`;
    });

    document.getElementById("options").innerHTML = html;
    document.getElementById("feedback").innerHTML = "";
}

function check(i){

    let q = questions[current];

    if(i === q.answer){

        playSound("correct");

        document.getElementById("feedback").innerHTML =
        t("✅ Correct!","✅ Rast e!","✅ Rätt!");

        current++;

        setTimeout(()=>{

            if(current < questions.length){
                load();
            }else{
                finish();
            }

        },800);

    }else{

        hearts--;

        localStorage.setItem("hearts", hearts);

        renderHearts();

        playSound("wrong");

        document.getElementById("feedback").innerHTML =
        t("❌ Try again","❌ Dîsa biceribîne","❌ Försök igen");

        if(hearts <= 0){
            gameOver();
        }
    }
}

function showLessonComplete(){
  const card = document.querySelector(".card");
  if(!card) return;
  card.innerHTML = `
<h1>🐯</h1>
<h2>Great job!</h2>
<p>You finished this lesson.</p>
<p>Tu pir baş bûyî!</p>
`;
}

function gameOver(){

document.body.innerHTML = `
<div class="card">
<h1>💔</h1>
<h2>${t("Out of Hearts","Hevî tune ye","Inga hjärtan kvar")}</h2>
<button onclick="restart()">
${t("Try Again","Dîsa Biceribîne","Försök igen")}
</button>
</div>
`;

}

function restart(){
    localStorage.setItem("hearts","5");
    window.location.reload();
}

function finish(){
    PilingoAudio.playLessonComplete();
  showLessonComplete();

    localStorage.setItem("hearts","5");

    let xpKey = course + "_xp";
    let unlockKey = course + "_unlocked";

    let xp =
    parseInt(localStorage.getItem(xpKey) || "0");

    xp += 10;

    localStorage.setItem(xpKey, xp);

    let unlocked =
    JSON.parse(
    localStorage.getItem(unlockKey)
    ||
    "[true,false,false,false,false,false,false]"
    );

    unlocked[3] = true;

    localStorage.setItem(
    unlockKey,
    JSON.stringify(unlocked)
    );

    localStorage.setItem("skill_2", "4");
    localStorage.setItem("skill_3", "1");

    document.getElementById("bar").style.width = "100%";

    setTimeout(()=>{
        window.location.href = "engine.html";
    },2200);
}

load();

</script>

</body>
</html>
