<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game 1</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f9ff;margin:0;padding:20px;}
.card{background:white;max-width:550px;margin:auto;padding:20px;border-radius:15px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
#visual{font-size:60px;margin:10px;}
#progress{height:10px;background:#ddd;border-radius:10px;overflow:hidden;}
#bar{height:100%;width:0%;background:#4caf50;}
button{display:block;width:90%;margin:10px auto;padding:15px;border:none;border-radius:10px;background:#1976d2;color:white;}
#hearts{font-size:24px;}
</style>
</head>

<body>

<div class="card">

<div id="hearts"></div>
<div id="progress"><div id="bar"></div></div>

<h2 id="question"></h2>
<div id="visual"></div>
<div id="options"></div>
<div id="feedback"></div>

</div>

<script>

let course = localStorage.getItem("course") || "en-ku";

function t(en,ku,sv){
if(course==="en-ku") return ku;
if(course==="en-sv") return sv;
return en;
}

let hearts = 5;

function renderHearts(){
document.getElementById("hearts").innerHTML =
"❤️".repeat(hearts) + "🖤".repeat(5-hearts);
}

let questions=[
{
q:"What is this?",
visual:"🐶",
options:["Dog","Cat","Bird"],
answer:0
},
{
q:"What is this?",
visual:"🐱",
options:["Cat","Dog","Fish"],
answer:0
}
];

let current=0;

function load(){
renderHearts();
let q=questions[current];
document.getElementById("question").innerText=q.q;
document.getElementById("visual").innerText=q.visual;

let html="";
q.options.forEach((o,i)=>{
html+=`<button onclick="check(${i})">${o}</button>`;
});
document.getElementById("options").innerHTML=html;
}

function check(i){
if(i===questions[current].answer){
current++;
if(current<questions.length) load();
else finish();
}else{
hearts--;
renderHearts();
}
}

function finish(){
let xp=parseInt(localStorage.getItem(course+"_xp")||0);
xp+=10;
localStorage.setItem(course+"_xp",xp);
window.location.href="engine.html";
}

load();

</script>

</body>
</html>
