<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Path</title>

<style>
body{
  font-family: Arial;
  margin:0;
  padding:30px;
  text-align:center;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

h1{
  margin-bottom:20px;
}

/* PATH WRAPPER */
.path{
  max-width:400px;
  margin:auto;
  position:relative;
}

/* LINE CONNECTOR */
.line{
  position:absolute;
  left:50%;
  top:0;
  width:4px;
  height:100%;
  background:#cfd8dc;
  transform:translateX(-50%);
  z-index:0;
}

/* NODE */
.node{
  position:relative;
  z-index:1;
  width:140px;
  margin:25px auto;
  padding:15px;
  border-radius:50%;
  background:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.node:hover{
  transform:scale(1.05);
}

/* STATES */
.locked{
  opacity:0.3;
  pointer-events:none;
}

.unlocked{
  border:4px solid #58cc02;
}

.completed{
  border:4px solid gold;
}

/* ICONS */
.icon{
  font-size:28px;
}
.small{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>🦉 Your Learning Path</h1>

<div class="path">
<div class="line"></div>

<div id="map"></div>

</div>

<script src="engine-core.js"></script>

<script>

const skills = [
  { name:"Animals 🐶", id:"animals" },
  { name:"Actions 🏃", id:"verbs" },
  { name:"People 👤", id:"people" },
  { name:"Food 🍎", id:"food" },
  { name:"Objects 📦", id:"objects" },
  { name:"Places 🏙️", id:"places" },
  { name:"Adjectives 🎯", id:"adjectives" }
];

let unlocked = Engine.getUnlocked();
let xp = Engine.getXP();

function render(){

  let html = "";

  skills.forEach((s,i)=>{

    let state = "";

    if(i < unlocked.length && unlocked[i]){
      state = "unlocked";
    }

    if(i > 0 && !unlocked[i]){
      state = "locked";
    }

    html += `
      <div class="node ${state}" onclick="openSkill(${i})">
        <div class="icon">🦉</div>
        <div>${s.name}</div>
        <div class="small">Tap to start</div>
      </div>
    `;
  });

  document.getElementById("map").innerHTML = html;
}

function openSkill(i){
  window.location.href = "lesson.html?s=" + i;
}

render();

</script>

</body>
</html>
