<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Samantha Voice</title>
<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#f5f9ff;
  text-align:center;
}
.card{
  max-width:620px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
button{
  display:block;
  width:92%;
  margin:10px auto;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:white;
  font-size:16px;
  box-shadow:0 4px 0 rgba(16,87,158,0.26);
  transition:transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
}

button:active{
  transform:translateY(3px) scale(0.97);
  box-shadow:0 1px 0 rgba(16,87,158,0.26);
}

button.is-pressed{
  transform:translateY(4px) scale(0.965) !important;
  box-shadow:0 1px 0 rgba(16,87,158,0.26) !important;
}
button.save{
  background:#58cc02;
}
.voice{
  background:#eef5ff;
  color:#1976d2;
  border:2px solid #cfe2ff;
}
.selected{
  background:#58cc02;
  color:white;
  border-color:#58cc02;
}
.hint{
  color:#52616f;
}
</style>
</head>
<body>
<script src="pilingo-auth.js"></script>
<script>PilingoAuth.requireAccount();</script>
<script src="pilingo-notify.js"></script>
<script>PilingoNotify.track("page_open", "Opened voice page", { page:"voice" });</script>
<div class="card">
  <h1>🐯 Samantha Voice</h1>
  <p class="hint">Pilingo now uses Samantha as the lesson voice.</p>
  <div id="voices">Samantha is selected automatically when available.</div>
  <button onclick="window.location.href='index.html'">Back</button>
</div>

<script src="pwa.js?v=9"></script>
<script src="app-polish.js"></script>
<script>
document.getElementById("voices").innerText =
  "Samantha is selected automatically when your device provides that voice.";
</script>
</body>
</html>
