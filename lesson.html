<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owl-Lingo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eaf2ff;
  display:flex;
  justify-content:center;
}

/* PHONE FRAME */
.app{
  width:100%;
  max-width:420px;
  min-height:100vh;
  background:#f5f9ff;
  padding:16px;
  box-sizing:border-box;
  position:relative;
}

/* OWL HEADER */
#owl{
  font-size:58px;
  text-align:center;
  margin-top:10px;
  animation:float 2.5s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* STREAK */
#streak{
  position:absolute;
  top:15px;
  right:15px;
  background:#ff9800;
  color:white;
  padding:6px 10px;
  border-radius:20px;
  font-weight:bold;
  font-size:14px;
}

/* CARD */
.card{
  margin-top:20px;
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:0.25s;
}

/* QUESTION */
#question{
  font-size:18px;
  margin-bottom:12px;
}

/* BUTTONS (MOBILE OPTIMIZED) */
button{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  background:#1976d2;
  color:white;
  font-size:16px;

  /* touch feel */
  transform:translateZ(0);
  transition:0.12s;
}

button:active{
  transform:scale(0.97);
  opacity:0.9;
}

/* PROGRESS */
#bar{
  height:10px;
  background:#58cc02;
  border-radius:10px;
  width:0%;
  transition:0.4s ease;
  margin-top:10px;
}

/* XP POP */
#xpPopup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#58cc02;
  color:white;
  padding:10px 16px;
  border-radius:20px;
  font-weight:bold;
  opacity:0;
  transition:0.3s;
}

/* COMPLETION SCREEN */
#complete{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  text-align:center;
  padding-top:140px;
}

/* SOFT TAP FEEDBACK */
.tapFlash{
  animation:tap 0.25s ease;
}

@keyframes tap{
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="app">

<div id="streak">🔥 0</div>
<div id="xpPopup">+10 XP</div>

<div id="owl">🦉</div>

<div class="card">

<h2 id="question"></h2>
<div id="options"></div>
<div id="bar"></div>

</div>

<div id="complete">
  <h1>🎉 Completed!</h1>
  <p>Great work — lesson finished</p>
  <button onclick="home()">Continue</button>
</div>

</div>

<script src="engine-core.js"></script>
<script src="vocab_a1.js"></script>

<script>

const SKILL_MAP = ["animals","verbs","people","food","objects","places","adjectives"];

let skillIndex = new URLSearchParams(location.search).get("s") || 0;
let pool = VOCAB_A1[SKILL_MAP[skillIndex]];

let hearts = Engine.getHearts();
let questions = [];
let current = 0;

/* ---------------- BUILD ---------------- */
function build(){
  for(let i=0;i<5;i++){
    let correct = pool[Math.floor(Math.random()*pool.length)];
    let options = [correct];

    while(options.length<3){
      let r = pool[Math.floor(Math.random()*pool.length)];
      if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);
    questions.push({correct,options});
  }
}

/* ---------------- STREAK ---------------- */
function streakUI(){
  document.getElementById("streak").innerText =
    "🔥 " + Engine.updateStreak();
}

/* ---------------- LOAD ---------------- */
function load(){
  let q = questions[current];

  document.getElementById("question").innerText =
    "Translate: " + q.correct.en;

  let html = "";

  q.options.forEach((opt,i)=>{
    html += `<button onclick="check(${i}, this)">${opt.en}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  document.getElementById("bar").style.width =
    (current/questions.length)*100 + "%";
}

/* ---------------- CHECK ---------------- */
function check(i, el){

  el.classList.add("tapFlash");
  setTimeout(()=>el.classList.remove("tapFlash"),200);

  let q = questions[current];

  if(q.options[i] === q.correct){

    current++;

    if(current < questions.length){
      load();
    } else {
      finish();
    }

  } else {

    hearts = Engine.loseHeart();

    if(hearts <= 0){
      location.reload();
    }
  }
}

/* ---------------- FINISH ---------------- */
function finish(){

  Engine.addXP(10);
  Engine.resetHearts();
  Engine.updateStreak();

  document.getElementById("xpPopup").style.opacity = 1;
  setTimeout(()=>document.getElementById("xpPopup").style.opacity = 0,800);

  document.getElementById("complete").style.display = "block";
}

/* ---------------- HOME ---------------- */
function home(){
  window.location.href = "index.html";
}

/* ---------------- INIT ---------------- */
build();
load();
streakUI();

</script>

</body>
</html>
