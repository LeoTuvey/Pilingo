<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Kurmanji to English: Game One</title>

<style>
:root{
    --page-glow-a:rgba(255,218,69,0.26);
    --page-glow-b:rgba(112,193,255,0.20);
    --page-top:#e9f7ff;
    --page-mid:#f7fbf2;
    --page-bottom:#fff7df;
    --card-fill:#ffffff;
    --card-border:#e5edf5;
    --card-shadow:rgba(37,48,68,0.14);
    --card-topbar-start:#58cc02;
    --card-topbar-mid:#1cb0f6;
    --card-topbar-end:#ffb020;
    --part-shell-top:#081b3f;
    --part-shell-mid:#11346a;
    --part-shell-bottom:#0b2044;
    --part-star-a:rgba(255,255,255,0.96);
    --part-star-b:rgba(150,220,255,0.7);
    --part-halo:rgba(255,224,155,0.05);
}

*{
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:
        radial-gradient(circle at top left, var(--page-glow-a), transparent 34%),
        radial-gradient(circle at 86% 14%, var(--page-glow-b), transparent 28%),
        linear-gradient(180deg, var(--page-top) 0%, var(--page-mid) 48%, var(--page-bottom) 100%);
    text-align:center;
    margin:0;
    padding:22px;
    color:#253044;
    min-height:100vh;
    transition:background 0.35s ease;
}

.card{
    background:linear-gradient(180deg, rgba(255,255,255,0.99) 0%, var(--card-fill) 100%);
    max-width:620px;
    margin:auto;
    padding:22px;
    border:2px solid var(--card-border);
    border-radius:34px;
    box-shadow:0 20px 40px var(--card-shadow);
    position:relative;
    overflow:hidden;
    transition:border-color 0.35s ease, box-shadow 0.35s ease, background 0.35s ease;
}

.card::before{
    content:"";
    position:absolute;
    inset:0 0 auto;
    height:6px;
    background:linear-gradient(90deg, var(--card-topbar-start), var(--card-topbar-mid), var(--card-topbar-end));
}

.card::after{
    content:"";
    position:absolute;
    right:-42px;
    bottom:-78px;
    width:180px;
    height:180px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.46), rgba(255,255,255,0));
    pointer-events:none;
}

#hearts{
    display:flex;
    justify-content:center;
    gap:3px;
    font-size:24px;
    margin:6px 0 12px;
}

#progress{
    width:100%;
    height:14px;
    background:#e7eef7;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:16px;
    box-shadow:inset 0 1px 3px rgba(37,48,68,0.12);
}

#bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, #58cc02, #89e219);
    transition:width 0.25s ease;
}

.grade-panel{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin:0 0 16px;
    padding:12px 14px;
    border-radius:18px;
    background:linear-gradient(180deg, #fff7dc 0%, #ffe7a8 100%);
    border:2px solid #f0d27a;
    box-shadow:0 4px 0 #e4c05d;
}

.grade-main{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:4px;
}

.grade-label{
    font-size:12px;
    font-weight:900;
    letter-spacing:0.04em;
    color:#8c6608;
    text-transform:uppercase;
}

.grade-value{
    font-size:22px;
    font-weight:1000;
    color:#253044;
}

.grade-score{
    font-size:14px;
    font-weight:800;
    color:#715415;
}

.grade-note{
    font-size:13px;
    font-weight:800;
    color:#846722;
    text-align:right;
}

.lesson-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    min-height:42px;
    margin-bottom:6px;
    gap:10px;
    flex-wrap:wrap;
}

.menu-button{
    display:none;
    width:auto;
    margin:0;
    padding:9px 12px;
    background:#fff;
    color:#253044;
    border-color:#d6e3ef;
    box-shadow:0 3px 0 #d6e3ef;
    font-size:14px;
}

.menu-button:hover{
    background:#f7fbff;
}

.back-button{
    display:inline-block;
    width:auto;
    margin:0;
    padding:9px 12px;
    background:#fff9ef;
    color:#8c5b08;
    border:2px solid #ead8aa;
    box-shadow:0 3px 0 #ead8aa;
    font-size:14px;
    font-weight:800;
}

.back-button:hover{
    background:#fff4d8;
}

#partLabel{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:#f0f8ff;
    color:#31556f;
    border:1px solid #d6ebfb;
    font-size:14px;
    font-weight:800;
    margin-bottom:8px;
    white-space:pre-line;
}

#instruction{
    color:#65748b;
    font-size:16px;
    min-height:24px;
    margin:4px 0 8px;
    font-weight:700;
}

#question{
    margin:14px auto 18px;
    max-width:92%;
    font-size:30px;
    line-height:1.2;
    letter-spacing:0;
    color:#1f2937;
}

#question.rich-prompt{
    line-height:1.3;
}

.moving-demo-word{
    display:inline-block;
    text-decoration:underline;
    text-decoration-thickness:3px;
    text-underline-offset:5px;
    color:#1c80cf;
    font-weight:1000;
    animation:movingDemoWord 1.8s ease-in-out infinite;
}

@keyframes movingDemoWord{
    0%, 100%{ transform:translateY(0); }
    35%{ transform:translateY(-3px); }
    65%{ transform:translateY(2px); }
}

#image{
    display:none;
    width:120px;
    height:120px;
    object-fit:contain;
    margin:12px auto;
}

#activity{
    width:100%;
}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px 16px;
    font-size:16px;
    border:2px solid #d6e3ef;
    border-radius:20px;
    background:white;
    color:#253044;
    cursor:pointer;
    font-weight:800;
    box-shadow:0 4px 0 #d6e3ef;
    transition:transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
}

button:hover{
    background:#f7fbff;
    border-color:#1cb0f6;
    transform:translateY(-1px);
}

button:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 #d6e3ef;
}

button:disabled{
    opacity:0.7;
    cursor:default;
}

button.secondary{
    background:#fff;
    color:#253044;
    border-color:#d6e3ef;
}

button.selected{
    background:#58cc02;
    color:white;
    border-color:#46a302;
    box-shadow:0 4px 0 #46a302;
}

button.correct{
    background:#58cc02 !important;
    color:white !important;
    border-color:#46a302 !important;
    box-shadow:0 4px 0 #46a302 !important;
}

button.wrong{
    background:#ff4b4b !important;
    color:white !important;
    border-color:#d63636 !important;
    box-shadow:0 4px 0 #d63636 !important;
}

#activity > button:first-child:last-child,
.answer-bank + .word-bank + button,
.type-answer + button{
    background:#58cc02;
    border-color:#46a302;
    color:white;
    box-shadow:0 4px 0 #46a302;
}

#activity > button:first-child:last-child:hover,
.answer-bank + .word-bank + button:hover,
.type-answer + button:hover{
    background:#61d80a;
}

.part-selector{
    width:min(100%, 540px);
    margin:0 auto;
    position:relative;
    padding:0 0 6px;
}

.part-menu{
    position:relative;
    width:100%;
    margin:0 auto;
}

.part-path-line{
    position:absolute;
    left:50%;
    top:176px;
    bottom:24px;
    width:8px;
    transform:translateX(-50%);
    border-radius:999px;
    background:linear-gradient(180deg, rgba(241,199,94,0.2) 0%, rgba(214,155,35,0.9) 18%, rgba(214,155,35,0.9) 82%, rgba(241,199,94,0.2) 100%);
    box-shadow:0 0 0 6px rgba(255,255,255,0.34);
    pointer-events:none;
}

.part-menu-core{
    position:relative;
    width:100%;
    min-height:152px;
    margin-bottom:16px;
    border-radius:34px;
    background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.95), rgba(255,255,255,0.22) 20%, transparent 24%),
        linear-gradient(180deg, rgba(255,252,240,0.98) 0%, rgba(255,243,214,0.98) 100%);
    box-shadow:
        inset 0 -10px 0 rgba(220,179,88,0.12),
        0 10px 0 rgba(204,156,55,0.46),
        0 18px 24px rgba(124,91,17,0.14);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#5b4212;
    border:2px solid rgba(255,255,255,0.82);
    overflow:hidden;
}

.part-menu-core strong{
    position:relative;
    z-index:1;
    font-size:38px;
    line-height:1;
    text-shadow:none;
}

.part-menu-core span{
    position:relative;
    z-index:1;
    margin-top:6px;
    font-size:14px;
    font-weight:900;
    letter-spacing:0.1em;
    text-transform:uppercase;
    text-shadow:none;
}

.part-list{
    display:flex;
    flex-direction:column;
    gap:18px;
    position:relative;
}

.part-choice{
    position:relative;
    width:min(330px, calc(100% - 44px));
    min-height:128px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:
        radial-gradient(circle at 24% 18%, rgba(255,255,255,0.96), rgba(255,255,255,0.22) 24%, transparent 28%),
        linear-gradient(180deg, rgba(255,252,239,0.98) 0%, rgba(255,244,217,0.98) 100%);
    border:2px solid rgba(255,255,255,0.82);
    box-shadow:
        inset 0 -10px 0 rgba(220,179,88,0.12),
        0 10px 0 rgba(204,156,55,0.46),
        0 18px 24px rgba(124,91,17,0.14);
    padding:18px 16px 18px;
    overflow:hidden;
    border-radius:44% 44% 50% 50% / 34% 34% 62% 62%;
    transition:transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
}

.part-choice:nth-child(odd){
    transform:translateX(-74px);
}

.part-choice:nth-child(even){
    transform:translateX(74px);
}

.part-choice:hover{
    filter:none;
    transform:translateY(-3px) translateX(var(--hover-offset, 0px));
}

.part-badge{
    display:inline-flex;
    position:relative;
    width:96px;
    height:96px;
    align-items:flex-start;
    justify-content:center;
    border-radius:50%;
    background:
        radial-gradient(circle at 28% 20%, rgba(255,255,255,0.98), rgba(255,255,255,0.16) 28%, transparent 32%),
        radial-gradient(circle at 52% 54%, rgba(255,243,197,0.78), rgba(255,243,197,0.06) 34%, transparent 42%),
        linear-gradient(180deg, #fff0bf 0%, #ffd15d 40%, #ffa63a 100%);
    color:#6f5840;
    font-weight:900;
    font-size:52px;
    box-shadow:
        inset 0 -10px 0 rgba(176,113,17,0.2),
        0 0 18px rgba(255,219,110,0.28),
        0 10px 0 rgba(197,119,21,0.82),
        0 18px 26px rgba(14,35,65,0.22);
    border:4px solid rgba(255,255,255,0.92);
    text-shadow:0 2px 0 rgba(255,255,255,0.35);
    overflow:hidden;
    animation:planetSpin 12s linear infinite;
}

.part-choice:nth-child(odd){
    --hover-offset:-74px;
}

.part-choice:nth-child(even){
    --hover-offset:74px;
}

.part-badge::before{
    content:"";
    position:absolute;
    inset:7px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 22%, rgba(255,255,255,0.72), transparent 38%);
    pointer-events:none;
}

.part-badge::after{
    content:"";
    position:absolute;
    inset:-16px;
    border-radius:50%;
    border:2px solid rgba(255,244,206,0.3);
    animation:orbitHalo 4.2s linear infinite;
}

.part-animal{
    position:relative;
    z-index:1;
    display:inline-block;
    margin-top:12px;
    filter:drop-shadow(0 5px 5px rgba(122,83,0,0.18));
    transform-origin:center bottom;
    animation:animalBob 2.8s ease-in-out infinite;
}

@keyframes animalBob{
    0%, 100%{ transform:translateY(0) rotate(0deg) scale(1); }
    25%{ transform:translateY(-3px) rotate(-4deg) scale(1.03); }
    55%{ transform:translateY(-7px) rotate(4deg) scale(1.06); }
    78%{ transform:translateY(-2px) rotate(-2deg) scale(1.02); }
}

@keyframes planetSpin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

.part-copy{
    display:flex;
    flex-direction:column;
    gap:5px;
    margin-top:10px;
    width:100%;
    padding:0;
    align-self:center;
}

.part-name{
    color:#644717;
    font-size:22px;
    font-weight:900;
    line-height:1.2;
    text-shadow:none;
}

.part-detail{
    color:#83612a;
    font-size:13px;
    font-weight:700;
    line-height:1.35;
    text-shadow:none;
    max-width:220px;
    margin:0 auto;
}

.part-status{
    color:#fff;
    font-size:12px;
    font-weight:900;
    margin-top:12px;
    padding:7px 12px;
    border-radius:999px;
    background:#58cc02;
    border:2px solid #46a302;
    box-shadow:0 4px 0 #46a302;
}

.part-letter{
    position:absolute;
    top:10px;
    right:10px;
    z-index:2;
    width:28px;
    height:28px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:#ffffff;
    color:#0f4680;
    font-size:13px;
    font-weight:1000;
    box-shadow:0 4px 10px rgba(12,38,73,0.22);
}

.part-menu-glow{
    display:none;
}

.part-menu-banner{
    position:relative;
    left:auto;
    top:auto;
    grid-column:1 / -1;
    z-index:1;
    text-align:left;
    color:#6d4b12;
    max-width:none;
    padding:2px 4px 0;
    margin-bottom:8px;
}

.part-menu-banner strong{
    display:block;
    font-size:24px;
    font-weight:1000;
    letter-spacing:0.03em;
}

.part-menu-banner span{
    display:block;
    margin-top:6px;
    font-size:13px;
    line-height:1.35;
    color:#8a6630;
}

.section-progress-banner{
    width:100%;
    padding:16px 18px;
    border-radius:26px;
    background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.95), rgba(255,255,255,0.26) 28%, transparent 34%),
        linear-gradient(180deg, #fff8e4 0%, #fff0c8 100%);
    border:2px solid #efd08d;
    box-shadow:0 7px 0 #e5c57e, 0 16px 26px rgba(160,109,13,0.12);
    text-align:left;
}

.section-progress-banner strong,
.section-progress-banner span{
    display:block;
}

.section-progress-banner strong{
    font-size:20px;
    color:#533e17;
    margin-bottom:6px;
}

.section-progress-banner span{
    color:#7a6336;
    font-size:14px;
    line-height:1.4;
}

.part-complete-actions{
    display:grid;
    gap:10px;
    width:94%;
    margin:14px auto 0;
}

.part-complete-actions button{
    width:100%;
}

.part-complete-actions .primary-action{
    background:#58cc02;
    border-color:#46a302;
    color:white;
    box-shadow:0 4px 0 #46a302;
}

.part-complete-actions .primary-action:hover{
    background:#61d80a;
}

.part-complete-actions .secondary-action{
    background:#fff;
    border-color:#d6e3ef;
    color:#253044;
    box-shadow:0 4px 0 #d6e3ef;
}

.section-select{
    display:grid;
    gap:16px;
    width:96%;
    margin:14px auto 0;
}

.section-card{
    width:100%;
    margin:0;
    text-align:left;
    padding:18px 20px;
    border-radius:30px;
    min-height:120px;
    background:
        radial-gradient(circle at 16% 18%, rgba(255,255,255,0.95), rgba(255,255,255,0.22) 26%, transparent 30%),
        linear-gradient(180deg, #fffdf7 0%, #fff4dd 100%);
    border:2px solid #f0d7a2;
    box-shadow:0 7px 0 #e7c985, 0 14px 24px rgba(160,109,13,0.1);
    display:flex;
    flex-direction:column;
    justify-content:center;
    transition:transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
}

.section-card:hover{
    transform:translateY(-2px);
    border-color:#d5b16a;
    box-shadow:0 9px 0 #e7c985, 0 18px 28px rgba(160,109,13,0.14);
}

.section-card strong,
.section-card span{
    display:block;
}

.section-card strong{
    font-size:20px;
    margin-bottom:7px;
    color:#53411f;
}

.section-card span{
    font-size:14px;
    color:#65748b;
    line-height:1.42;
}

.section-grade{
    font-size:13px !important;
    font-weight:900;
    color:#a06d0d !important;
    margin-top:4px;
}

.section-card.locked{
    background:#f7f8fb;
    border-color:#dde4ee;
    color:#93a0b4;
    box-shadow:0 6px 0 #dde4ee;
    transform:none;
}

.section-card.locked:hover{
    transform:none;
    box-shadow:0 6px 0 #dde4ee;
}

.section-card.locked span,
.section-card.locked strong{
    color:#93a0b4;
}

.image-options{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
    width:92%;
    margin:8px auto;
}

.image-options button{
    width:100%;
    min-height:92px;
    font-size:20px;
}

.word-bank,
.answer-bank{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin:14px auto;
    width:92%;
}

.word-bank button,
.answer-bank button{
    display:inline-flex;
    width:auto;
    min-width:88px;
    margin:0;
    align-items:center;
    justify-content:center;
}

.match-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:12px;
    width:92%;
    margin:14px auto;
}

.match-column{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.match-heading{
    margin:0 0 4px;
    color:#65748b;
    font-size:13px;
    font-weight:800;
    text-transform:uppercase;
}

.match-grid button{
    display:flex;
    width:100%;
    min-height:52px;
    margin:0;
    align-items:center;
    justify-content:center;
}

.answer-bank{
    min-height:58px;
    padding:10px;
    border:2px dashed #b9d9f2;
    border-radius:8px;
    background:#f8fbff;
}

.speaker{
    width:86px;
    height:86px;
    border-radius:50%;
    font-size:36px;
    background:#58cc02;
    color:white;
    border-color:#46a302;
    box-shadow:0 5px 0 #46a302;
}

.type-answer{
    display:block;
    width:86%;
    margin:14px auto;
    padding:15px;
    border:2px solid #d6e3ef;
    border-radius:8px;
    font-size:18px;
    color:#253044;
}

#feedback{
    min-height:30px;
    margin-top:10px;
    font-size:18px;
    font-weight:900;
}

@media (max-width:520px){
    body{padding:12px;}
    .card{padding:18px 14px;}
    #question{font-size:25px; max-width:100%;}
    button{width:96%;}
    .part-selector{
        width:100%;
    }
    .part-menu{
        display:block;
        width:100%;
        padding:18px 12px 14px;
        border-radius:34px;
    }
    .part-menu-banner{
        position:relative;
        left:auto;
        top:auto;
        max-width:none;
        text-align:center;
        margin-bottom:10px;
    }
    .part-menu-core{
        width:100%;
        height:132px;
        margin-bottom:14px;
    }
    .part-path-line{
        left:28px;
        top:202px;
        bottom:18px;
        width:6px;
        transform:none;
        box-shadow:none;
    }
    .part-choice{
        width:calc(100% - 20px);
        min-height:120px;
        transform:none !important;
        padding:12px 14px 14px;
        margin:0 0 0 auto;
        border-radius:28px;
        text-align:left;
        align-items:flex-start;
    }
    .part-choice:nth-child(odd),
    .part-choice:nth-child(even){
        transform:none !important;
    }
    .part-choice:hover{
        transform:translateY(-2px) !important;
    }
    .part-choice::before{
        content:"";
        position:absolute;
        left:-20px;
        top:50%;
        width:20px;
        height:6px;
        transform:translateY(-50%);
        border-radius:999px;

function escapeHtml(value){
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function matchKeyLiteral(value){
    if(typeof value === "number") return String(value);
    return "'" + String(value).replace(/\\/g, "\\\\").replace(/'/g, "\\'") + "'";
}

function sectionsForPart(index){
    const sections = partSections[index] || [];

    if(!activeCoursePartRoute || activeCoursePartRoute.gamePartIndex !== index) {
        return sections;
    }

    return sections.filter((section) => activeCoursePartRoute.sectionIds.includes(section.id));
}

function sectionKey(index){
    return String(index);
}

function lessonStoreKey(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    return section ? section.id : "";
}

function lessonsForSection(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    if(!section) return [];
    if(Array.isArray(section.lessons) && section.lessons.length) return section.lessons;

    return [{
        id:section.id + "-lesson-1",
        label:"Lesson 1",
        detail:section.detail,
        start:section.start,
        end:section.end
    }];
}

function gradableStepsInRange(index, start, end){
    const steps = [];
    for(let i = start; i <= end; i++) {
        if(isGradableStep(gameParts[index].steps[i])) {
            steps.push(i);
        }
    }
    return steps;
}

function lessonProgressIds(index, sectionIndex){
    const lessons = lessonsForSection(index, sectionIndex);
    if(!lessons.length) return [];

    if(isLegacySectionComplete(index, sectionIndex)) {
        return lessons.map(lesson => lesson.id);
    }

    const saved = completedLessons[lessonStoreKey(index, sectionIndex)];
    if(!Array.isArray(saved) || !saved.length) return [];

    const savedIds = saved.filter(value => typeof value === "string");
    const savedSteps = saved.filter(value => typeof value === "number");
    const lessonIds = [];

    lessons.forEach((lesson) => {
        if(savedIds.includes(lesson.id)) {
            lessonIds.push(lesson.id);
            return;
        }

        if(savedSteps.length) {
            const gradableSteps = gradableStepsInRange(index, lesson.start, lesson.end);
            if(gradableSteps.length && gradableSteps.every(step => savedSteps.includes(step))) {
                lessonIds.push(lesson.id);
            }
        }
    });

    return lessonIds;
}

function isLegacySectionComplete(index, sectionIndex){
    const section = sectionsForPart(index)[sectionIndex];
    if(!section) return false;

    return (completedSections[sectionKey(index)] || []).includes(section.id);
}

function completedLessonSteps(index, sectionIndex){
    const lessonIds = lessonProgressIds(index, sectionIndex);
    return lessonIds;
}

function sectionLessonProgress(index, sectionIndex){
    const total = lessonsForSection(index, sectionIndex).length;
    const completed = Math.min(completedLessonSteps(index, sectionIndex).length, total);
    return { completed:completed, total:total };
}

function completeEnginePartForRoute(){
    if(!activeCoursePartRoute || !window.Engine?.completeCoursePart) return;
    Engine.completeCoursePart("section-1", activeCoursePartRoute.enginePartId, { xp:10, result:"passed" });
}

function isActiveCoursePartComplete(index){
    if(!activeCoursePartRoute) return false;
    const sections = sectionsForPart(index);
    if(!sections.length) return false;
    return sections.every((section, sectionIndex) => isSectionComplete(index, sectionIndex));
}

function isLessonComplete(index, sectionIndex, lessonId){
    return completedLessonSteps(index, sectionIndex).includes(lessonId);
}

function markLessonComplete(index, sectionIndex, lessonId){
    const key = lessonStoreKey(index, sectionIndex);
    if(!key) return;

    const saved = lessonProgressIds(index, sectionIndex);
    if(saved.includes(lessonId)) return;

    completedLessons[key] = [...saved, lessonId];
    saveCompletedLessons();
    lessonStatuses[lessonId] = "passed";
    saveLessonStatuses();
}

function isSectionComplete(index, sectionIndex){
    if(isLegacySectionComplete(index, sectionIndex)) return true;

    const progress = sectionLessonProgress(index, sectionIndex);
    return progress.total > 0 && progress.completed >= progress.total;
}

function isSectionUnlocked(index, sectionIndex){
    if(sectionIndex === 0) return true;
    return isSectionComplete(index, sectionIndex - 1);
}

function markSectionComplete(index, sectionIndex){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    if(!section) return;

    completedLessons[section.id] = lessonsForSection(index, sectionIndex).map(lesson => lesson.id);
    saveCompletedLessons();
    lessonsForSection(index, sectionIndex).forEach((lesson) => {
        lessonStatuses[lesson.id] = "passed";
    });
    saveLessonStatuses();

    const key = sectionKey(index);
    const saved = completedSections[key] || [];
    if(saved.includes(section.id)) return;

    completedSections[key] = [...saved, section.id];
    saveCompletedSections();

    // Award progress the first time a section is completed so home stats move
    // immediately instead of waiting until the entire lesson is finished.
    if(window.Engine?.addXP){
        Engine.addXP(10);
    }

    if(window.AppUI?.updateQuestProgress){
        AppUI.updateQuestProgress(10);
    }

    if(window.PilingoNotify?.submitStudentStats){
        PilingoNotify.submitStudentStats(leaderboardSummary());
    }
}

function currentSectionIndex(){
    const sections = sectionsForPart(partIndex);
    return sections.findIndex((section) => stepIndex >= section.start && stepIndex <= section.end);
}

function isGradableStep(step){
    return !!step && step.type !== "next";
}

function currentScope(){
    const sections = sectionsForPart(partIndex);
    const sectionIndex = currentSectionIndex();

    if(activeLesson) {
        return {
            kind:"lesson",
            id:activeLesson.id,
            label:activeLesson.scopeLabel,
            start:activeLesson.start,
            end:activeLesson.end
        };
    }

    if(sections.length && sectionIndex >= 0) {
        const section = sections[sectionIndex];
        return {
            kind:"section",
            id:section.id,
            label:displayPartTitle(partIndex) + " • " + section.label,
            start:section.start,
            end:section.end
        };
    }

    return {
        kind:"part",
        id:"game1-part-" + partIndex,
        label:displayPartTitle(partIndex),
        start:0,
        end:gameParts[partIndex].steps.length - 1
    };
}

function gradableCountForScope(scope){
    let total = 0;

    for(let i = scope.start; i <= scope.end; i++) {
        if(isGradableStep(gameParts[partIndex].steps[i])) total++;
    }

    return total;
}

function ensureGradeState(){
    const scope = currentScope();
    if(gradeState && gradeState.scopeId === scope.id) return;

    gradeState = {
        scopeId:scope.id,
        label:scope.label,
        kind:scope.kind,
        total:gradableCountForScope(scope),
        completed:0,
        earned:0,
        mistakes:0,
        stepStates:{}
    };
}

function currentStepGradeState(){
    ensureGradeState();
    const key = String(stepIndex);

    if(!gradeState.stepStates[key]) {
        gradeState.stepStates[key] = { missed:false, completed:false };
    }

    return gradeState.stepStates[key];
}

function currentGradePercent(){
    ensureGradeState();
    if(!gradeState.total) return 100;
    return Math.round((gradeState.earned / gradeState.total) * 100);
}

function gradeLetter(percent){
    if(percent >= 97) return "A+";
    if(percent >= 93) return "A";
    if(percent >= 90) return "A-";
    if(percent >= 87) return "B+";
    if(percent >= 83) return "B";
    if(percent >= 80) return "B-";
    if(percent >= 77) return "C+";
    if(percent >= 73) return "C";
    if(percent >= 70) return "C-";
    if(percent >= 67) return "D+";
    if(percent >= 63) return "D";
    if(percent >= 60) return "D-";
    return "F";
}

function updateGradeDisplay(){
    if(!document.getElementById("gradeValue")) return;
    ensureGradeState();

    const percent = currentGradePercent();
    document.getElementById("gradeValue").innerText = gradeLetter(percent) + " • " + percent + "%";
    document.getElementById("gradeScore").innerText = gradeState.earned + "/" + gradeState.total + " first-try correct";
    document.getElementById("gradeNote").innerText = gradeState.completed + " finished • " + gradeState.mistakes + " mistakes";
}

function showIdleGrade(message){
    const value = document.getElementById("gradeValue");
    const score = document.getElementById("gradeScore");
    const note = document.getElementById("gradeNote");

    if(!value || !score || !note) return;

    value.innerText = "Ready";
    score.innerText = message || "Start a section to begin grading";
    note.innerText = "Grades are saved when a lesson group is finished.";
}

function registerCorrectForGrade(){
    if(!isGradableStep(currentStep())) return;

    const state = currentStepGradeState();
    if(state.completed) return;

    state.completed = true;
    gradeState.completed++;
    if(!state.missed) gradeState.earned++;
    updateGradeDisplay();
}

function registerWrongForGrade(){
    if(!isGradableStep(currentStep())) return;

    const state = currentStepGradeState();
    if(state.completed || state.missed) return;

    state.missed = true;
    gradeState.mistakes++;
    updateGradeDisplay();
}

function saveCurrentGradeRecord(){
    ensureGradeState();
    const percent = currentGradePercent();
    const existing = gradebook[gradeState.scopeId] || {};
    const bestPercent = Math.max(existing.bestPercent || 0, percent);

    gradebook[gradeState.scopeId] = {
        id:gradeState.scopeId,
        label:gradeState.label,
        kind:gradeState.kind,
        latestPercent:percent,
        latestLetter:gradeLetter(percent),
        latestEarned:gradeState.earned,
        latestTotal:gradeState.total,
        latestMistakes:gradeState.mistakes,
        bestPercent:bestPercent,
        bestLetter:gradeLetter(bestPercent),
        attempts:(existing.attempts || 0) + 1,
        updatedAt:new Date().toISOString()
    };

    saveGradebook();

    if(window.PilingoNotify?.submitStudentStats){
        PilingoNotify.submitStudentStats(leaderboardSummary());
    }
}

function gradeSummaryText(record){
    if(!record) return "No grade yet";
    return "Latest " + record.latestLetter + " (" + record.latestPercent + "%) • Best " + record.bestLetter + " (" + record.bestPercent + "%)";
}

function starsForPercent(percent){
    const score = Number(percent) || 0;
    if(score >= 95) return "⭐️⭐️⭐️";
    if(score >= 80) return "⭐️⭐️";
    if(score >= 60) return "⭐️";
    return "";
}

function lessonCompletionBadge(lessonId){
    if(lessonStatuses[lessonId] === "failed") return "❌";
    if(lessonStatuses[lessonId] === "passed") return "✅";
    return "";
}

function lessonCompletionNote(lessonId){
    if(lessonStatuses[lessonId] === "failed") return "Failed";
    if(lessonStatuses[lessonId] === "passed") return "Completed";

    const record = gradebook[lessonId];
    if(!record) return "Start lesson";

    const stars = starsForPercent(record.bestPercent);
    const grade = `${record.bestLetter} (${record.bestPercent}%)`;
    return stars ? `${stars} • ${grade}` : grade;
}

function leaderboardSummary(){
    const records = Object.values(gradebook || {});
    const count = records.length;
    const bestGrade = records.reduce((best, record) => Math.max(best, Number(record.bestPercent) || 0), 0);
    const averageGrade = count
        ? Math.round(records.reduce((sum, record) => sum + (Number(record.bestPercent) || 0), 0) / count)
        : 0;

    return {
        completedSections: count,
        averageGrade: averageGrade,
        bestGrade: bestGrade,
        lessonsFinished: completedParts.length,
        xp: typeof Engine.getXP === "function" ? Engine.getXP() : 0,
        level: typeof Engine.getLevel === "function" ? Engine.getLevel() : 0,
        streak: Number(localStorage.getItem("streak") || "0") || 0
    };
}

function markPartComplete(index){
    if(activeCoursePartRoute && activeCoursePartRoute.gamePartIndex === index) {
        return;
    }

    if(!completedParts.includes(index)) {
        completedParts.push(index);
        saveCompletedParts();
    }
}

function nextOpenPart(){
    if(activeCoursePartRoute) return -1;
    return gameParts.findIndex((part, index) => !completedParts.includes(index));
}

function allPartsComplete(){
    if(activeCoursePartRoute) return false;
    return completedParts.length >= gameParts.length;
}

function startPart(index){
    activeLesson = null;
    if(sectionsForPart(index).length) {
        showSectionSelect(index);
        return;
    }

    partIndex = index;
    stepIndex = 0;
    hearts = Engine.getHearts();
    gradeState = null;
    PilingoAudio.playPartAnimal(index);
    load();
}

function startSection(index, sectionIndex){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    if(!section || !isSectionUnlocked(index, sectionIndex)) return;

    showLessonSelect(index, sectionIndex);
}

function startLesson(index, sectionIndex, lessonIndex){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    const lesson = lessonsForSection(index, sectionIndex)[lessonIndex];
    if(!section || !isSectionUnlocked(index, sectionIndex)) return;
    if(!lesson) return;

    partIndex = index;
    stepIndex = lesson.start;
    activeLesson = {
        ...lesson,
        sectionIndex:sectionIndex,
        scopeLabel:displayPartTitle(index) + " • " + section.label + " • " + lesson.label
    };
    hearts = Engine.getHearts();
    gradeState = null;
    PilingoAudio.playPartAnimal(index);
    load();
}

function showLessonSelect(index, sectionIndex, message){
    const sections = sectionsForPart(index);
    const section = sections[sectionIndex];
    if(!section) {
        showSectionSelect(index);
        return;
    }

    const lessons = lessonsForSection(index, sectionIndex);
    const progress = sectionLessonProgress(index, sectionIndex);

    partIndex = index;
    applyPageTheme(index);
    activeLesson = null;
    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;

    renderHearts();
    document.getElementById("menuButton").style.display = "none";
    document.getElementById("bar").style.width = progress.total ? ((progress.completed / progress.total) * 100) + "%" : "0%";
    document.getElementById("partLabel").innerText = "Kurmanji to English";
    document.getElementById("instruction").innerText = message || "Choose any lesson in this section";
    document.getElementById("question").innerText = displayPartTitle(index) + " • " + section.label;
    document.getElementById("question").classList.remove("rich-prompt");
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";
    showIdleGrade(`${progress.completed}/${progress.total} lesson groups passed in this section`);
    document.getElementById("activity").innerHTML = `
        <div class="section-select">
            <div class="section-progress-banner">
                <strong>${escapeHtml(section.label)}</strong>
                <span>${escapeHtml(section.detail)}</span>
                <span class="section-grade">${progress.completed}/${progress.total} lesson groups completed</span>
            </div>
            ${lessons.map((lesson, lessonIndex) => `
                <button class="section-card" onclick="startLesson(${index}, ${sectionIndex}, ${lessonIndex})">
                    <strong>${escapeHtml(lesson.label)} ${lessonCompletionBadge(lesson.id)}</strong>
                    <span>${escapeHtml(lesson.detail)}</span>
                    <span class="section-grade">${escapeHtml(section.label + " • " + lesson.label)}</span>
                    <span>${lessonCompletionNote(lesson.id)}</span>
                </button>
            `).join("")}
            <button class="secondary" onclick="showSectionSelect(${index})">Back to sections</button>
        </div>
    `;
}

function showSectionSelect(index, message){
    const sections = sectionsForPart(index);
    if(!sections.length) {
        startPart(index);
        return;
    }

    partIndex = index;
    applyPageTheme(index);
    activeLesson = null;
    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;

    renderHearts();
    document.getElementById("menuButton").style.display = "none";
    document.getElementById("bar").style.width = "0%";
    document.getElementById("partLabel").innerText = "Kurmanji to English";
    document.getElementById("instruction").innerText = message || "Choose a section to study";
    document.getElementById("question").innerText = displayPartTitle(index);
    document.getElementById("question").classList.remove("rich-prompt");
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";
    showIdleGrade("Choose a section to see its live grade");
    document.getElementById("activity").innerHTML = `
        <div class="section-select">
            ${sections.map((section, sectionIndex) => {
                const unlocked = isSectionUnlocked(index, sectionIndex);
                const complete = isSectionComplete(index, sectionIndex);
                const progress = sectionLessonProgress(index, sectionIndex);
                return `
                    <button
                        class="section-card ${unlocked ? "" : "locked"}"
                        onclick="${unlocked ? `showLessonSelect(${index}, ${sectionIndex})` : ""}"
                        ${unlocked ? "" : "disabled"}
                    >
                        <strong>${escapeHtml(section.label)} ${complete ? "✅✅" : ""}</strong>
                        <span>${escapeHtml(section.detail)}</span>
                        <span class="section-grade">${escapeHtml(progress.completed + "/" + progress.total + " lesson groups passed")}</span>
                        <span>${unlocked ? (complete ? "✅ Completed • Open lessons again" : "Open this section") : "Finish the previous section first"}</span>
                    </button>
                `;
            }).join("")}
            <button class="secondary" onclick="${activeCoursePartRoute ? "goBackToGames()" : "showPartSelect()"}">${activeCoursePartRoute ? "Back to learning map" : "Back to parts"}</button>
        </div>
    `;
}

function showPartSelect(){
    applyPageTheme(0);
    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;
    activeLesson = null;

    renderHearts();
    document.getElementById("menuButton").style.display = "none";
    document.getElementById("bar").style.width = "0%";
    document.getElementById("partLabel").innerText = "Kurmanji to English";
    document.getElementById("instruction").innerText = "Choose a part to study";
    document.getElementById("question").innerText = "Game One";
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";
    showIdleGrade("Choose a part to begin grading");
    document.getElementById("activity").innerHTML = `
        <div class="part-selector">
            <div class="part-menu" style="${partMenuThemeStyle(0)}">
                <div class="part-menu-banner">
                    <strong>Choose a Part</strong>
                    <span>Move down the path and open any Game One part. Each part contains grouped lessons, quizzes, and review.</span>
                </div>
                <div class="part-menu-core">
                    <strong>🌍</strong>
                    <span>Game One Path</span>
                </div>
                <div class="part-path-line" aria-hidden="true"></div>
                <div class="part-list">
                    ${gameParts.map((part, actualIndex) => `
                        <button class="part-choice" onclick="startPart(${actualIndex})">
                            <span class="part-badge" aria-hidden="true">
                                <span class="part-letter">${escapeHtml(partCode(part.title))}</span>
                                <span class="part-animal" style="animation-delay:${(actualIndex * 0.18).toFixed(2)}s">${partEmojis[actualIndex] || "🦉"}</span>
                            </span>
                            <span class="part-copy">
                                <span class="part-name">${escapeHtml(displayPartTitle(actualIndex))}</span>
                                <span class="part-detail">${escapeHtml(partDescriptions[actualIndex] || "Practice section")}</span>
                            </span>
                            <span class="part-status">${completedParts.includes(actualIndex) ? "✓ Done" : "Start"}</span>
                        </button>
                    `).join("")}
                </div>
            </div>
        </div>
    `;
}

function partCode(title){
    const match = String(title || "").match(/Game One;\s*([A-Z])/i);
    return match ? match[1].toUpperCase() : "P";
}

function displayPartTitle(index){
    if(activeCoursePartRoute && activeCoursePartRoute.gamePartIndex === index) {
        return activeCoursePartRoute.title;
    }

    return partDisplayNames[index] || gameParts[index]?.title || "Part";
}

function applyPageTheme(index){
    const root = document.documentElement;
    const theme = partThemes[index] || {
        pageGlowA:"rgba(255,218,69,0.26)",
        pageGlowB:"rgba(112,193,255,0.20)",
        pageTop:"#e9f7ff",
        pageMid:"#f7fbf2",
        pageBottom:"#fff7df",
        cardFill:"#ffffff",
        cardBorder:"#e5edf5",
        cardShadow:"rgba(37,48,68,0.14)",
        topbarStart:"#58cc02",
        topbarMid:"#1cb0f6",
        topbarEnd:"#ffb020",
        shellTop:"#081b3f",
        shellMid:"#11346a",
        shellBottom:"#0b2044",
        starB:"rgba(150,220,255,0.7)",
        halo:"rgba(255,224,155,0.05)"
    };

    root.style.setProperty("--page-glow-a", theme.pageGlowA);
    root.style.setProperty("--page-glow-b", theme.pageGlowB);
    root.style.setProperty("--page-top", theme.pageTop);
    root.style.setProperty("--page-mid", theme.pageMid);
    root.style.setProperty("--page-bottom", theme.pageBottom);
    root.style.setProperty("--card-fill", theme.cardFill);
    root.style.setProperty("--card-border", theme.cardBorder);
    root.style.setProperty("--card-shadow", theme.cardShadow);
    root.style.setProperty("--card-topbar-start", theme.topbarStart);
    root.style.setProperty("--card-topbar-mid", theme.topbarMid);
    root.style.setProperty("--card-topbar-end", theme.topbarEnd);
    root.style.setProperty("--part-shell-top", theme.shellTop);
    root.style.setProperty("--part-shell-mid", theme.shellMid);
    root.style.setProperty("--part-shell-bottom", theme.shellBottom);
    root.style.setProperty("--part-star-b", theme.starB);
    root.style.setProperty("--part-halo", theme.halo);
}

function partOrbitStyle(index, total){
    const radius = total <= 3 ? 188 : 208;
    const startAngle = -90;
    const angle = ((360 / total) * index) + startAngle;
    const duration = (8.8 + (index * 0.65)).toFixed(2);
    const delay = (index * -0.55).toFixed(2);
    return `--orbit-angle:${angle.toFixed(2)}deg; --orbit-radius:${radius.toFixed(1)}px; --orbit-duration:${duration}s; --orbit-delay:${delay}s;`;
}

function partMenuThemeStyle(groupIndex){
    const theme = partMenuThemes[groupIndex] || partMenuThemes[groupIndex % partMenuThemes.length];
    if(!theme) return "";

    return [
        `--menu-top:${theme.top}`,
        `--menu-mid:${theme.mid}`,
        `--menu-bottom:${theme.bottom}`,
        `--menu-glow-a:${theme.glowA}`,
        `--menu-glow-b:${theme.glowB}`,
        `--menu-ribbon-a:${theme.ribbonA}`,
        `--menu-ribbon-b:${theme.ribbonB}`,
        `--menu-ribbon-c:${theme.ribbonC}`,
        `--menu-inset:${theme.inset}`,
        `--menu-shadow:${theme.shadow}`,
        `--menu-border:${theme.border}`
    ].join("; ");
}

function load(){
    const part = gameParts[partIndex];
    const step = currentStep();
    ensureGradeState();
    applyPageTheme(partIndex);

    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;

    renderHearts();
    updateProgress();
    document.getElementById("menuButton").style.display = "block";
    if(sectionsForPart(partIndex).length && currentSectionIndex() >= 0) {
        document.getElementById("menuButton").innerText = "← Lessons";
        document.getElementById("menuButton").onclick = () => showLessonSelect(partIndex, currentSectionIndex());
    } else {
        document.getElementById("menuButton").innerText = sectionsForPart(partIndex).length ? "← Sections" : "← Parts";
        document.getElementById("menuButton").onclick = () => sectionsForPart(partIndex).length ? showSectionSelect(partIndex) : showPartSelect();
    }
    document.getElementById("partLabel").innerText =
        "Kurmanji to English\nPart " + (partIndex + 1) + " of " + gameParts.length + " • " + displayPartTitle(partIndex);
    document.getElementById("instruction").innerText = step.instruction || "";
    const questionEl = document.getElementById("question");
    questionEl.classList.toggle("rich-prompt", Boolean(step.promptHtml));
    if(step.promptHtml) {
        questionEl.innerHTML = step.promptHtml;
    } else {
        questionEl.innerText = step.prompt || "";
    }
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";
    updateGradeDisplay();

    if(step.type === "image") renderImageStep(step);
    if(step.type === "choice") renderChoiceStep(step);
    if(step.type === "hear") renderHearStep(step);
    if(step.type === "build") renderBuildStep(step);
    if(step.type === "match") renderMatchStep(step);
    if(step.type === "audioMatch") renderAudioMatchStep(step);
    if(step.type === "type") renderTypeStep(step);
    if(step.type === "next") renderNextStep(step);
}

function renderImageStep(step){
    document.getElementById("activity").innerHTML = `
        <div class="image-options">
            ${step.options.map((option) => `
                <button onclick="checkChoice('${escapeHtml(option.value)}', this)">
                    <span aria-hidden="true">${escapeHtml(option.emoji)}</span><br>
                    ${escapeHtml(option.label)}
                </button>
            `).join("")}
        </div>
    `;
}

function renderChoiceStep(step){
    const options = [...step.options];
    if(shouldShuffleChoiceStep(step)) {
        shuffleChoiceOptions(options);
    }

    document.getElementById("activity").innerHTML =
        options.map(option => `
            <button onclick="checkChoice('${escapeHtml(option)}', this)">${escapeHtml(option)}</button>
        `).join("");
}

function shuffleChoiceOptions(options){
    for(let i = options.length - 1; i > 0; i--) {
        const swapIndex = Math.floor(Math.random() * (i + 1));
        [options[i], options[swapIndex]] = [options[swapIndex], options[i]];
    }
}

function shouldShuffleChoiceStep(step){
    return partIndex === 5 && stepIndex >= 0 && stepIndex <= 4;
}

function emojiForCorrectChoice(step, option){
    const emoji = emojiForChoice(step);
    if(!emoji || !isCorrectChoice(step, option)) return "";

    return isPluralChoice(step, option) ? emoji.plural : emoji.singular;
}

function emojiForChoice(step){
    const text = [step.prompt, ...step.options, ...answersForStep(step)].join(" ").toLowerCase();

    if(text.includes("person") || text.includes("people") || text.includes("man") || text.includes("mirov")) {
        return { singular:"👨", plural:"👨👨" };
    }

    if(text.includes("apple") || text.includes("sêv")) {
        return { singular:"🍎", plural:"🍎🍎" };
    }

    if(text.includes("book") || text.includes("pirtûk")) {
        return { singular:"📘", plural:"📚" };
    }

    if(text.includes("ball") || text.includes("top")) {
        return { singular:"⚽", plural:"⚽⚽" };
    }

    return null;
}

function isPluralChoice(step, option){
    const text = normalize(option + " " + step.prompt);
    return /\b(these|those|apples|books|balls|people)\b/.test(text);
}

function renderHearStep(step){
    document.getElementById("activity").innerHTML = `
        <button class="speaker" onclick="speak('${escapeHtml(step.spoken)}')" aria-label="Play sound">🔊</button>
        ${step.options.map(option => `
            <button onclick="checkChoice('${escapeHtml(option)}', this)">${escapeHtml(option)}</button>
        `).join("")}
    `;
    setTimeout(() => speak(step.spoken), 250);
}

function renderBuildStep(step){
    document.getElementById("activity").innerHTML = `
        ${step.spoken ? `<button class="speaker" onclick="speak('${escapeHtml(step.spoken)}')" aria-label="Play sound">🔊</button>` : ""}
        <div class="answer-bank" id="answerBank"></div>
        <div class="word-bank" id="wordBank">
            ${step.options.map((word, index) => `
                <button class="secondary" id="word-${index}" onclick="selectWord(${index})">${escapeHtml(word)}</button>
            `).join("")}
        </div>
        <button onclick="checkBuild(this)">Check</button>
    `;

    if(step.spoken) setTimeout(() => speak(step.spoken), 250);
    renderSelectedWords();
}

function renderMatchStep(step){
    const kurmanjiCards = [];
    const englishCards = [];

    step.pairs.forEach((pair, index) => {
        const englishValue = Array.isArray(pair) ? pair[0] : pair.english;
        const kurmanjiValue = Array.isArray(pair) ? pair[1] : pair.kurmanji;
        const matchGroup = Array.isArray(pair) ? index : (pair.group || index);
        const leftText = step.leftSide === "second" ? kurmanjiValue : englishValue;
        const rightText = step.rightSide === "first" ? englishValue : kurmanjiValue;

        englishCards.push({
            text:rightText,
            key:index,
            group:matchGroup,
            side:"english",
            id:"en-" + index,
            spoken:step.rightSpeakMap?.[rightText] || (step.rightSpeakValues ? rightText : "") || (step.speakSide === "english" ? kurmanjiValue : ""),
            spokenLang:step.rightSpeakLangMap?.[rightText] || ""
        });
        kurmanjiCards.push({
            text:leftText,
            key:index,
            group:matchGroup,
            side:"kurmanji",
            id:"ku-" + index,
            spoken:step.leftSpeakMap?.[leftText] || (step.speakSide === "kurmanji" ? englishValue : ""),
            spokenLang:step.leftSpeakLangMap?.[leftText] || ""
        });
    });

    shuffleCards(kurmanjiCards, "match-kurmanji");
    shuffleCards(englishCards, "match-english");

    document.getElementById("activity").innerHTML = `
        <div class="match-grid">
            <div class="match-column">
                <div class="match-heading">${escapeHtml(step.leftHeading || "Kurmanji")}</div>
                ${kurmanjiCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="${card.spoken ? `speakAndSelectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)}, '${escapeHtml(card.spoken)}', '${escapeHtml(card.spokenLang || "")}')` : `selectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)})`}">
                        ${card.spoken ? "🔊 " : ""}${escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
            <div class="match-column">
                <div class="match-heading">${escapeHtml(step.rightHeading || "English")}</div>
                ${englishCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="${card.spoken ? `speakAndSelectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)}, '${escapeHtml(card.spoken)}', '${escapeHtml(card.spokenLang || "")}')` : `selectMatch('${card.id}', '${card.side}', ${matchKeyLiteral(card.group)})`}">
                        ${card.spoken ? "🔊 " : ""}${escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
        </div>
    `;
}

function renderAudioMatchStep(step){
    const soundCards = [];
    const kurmanjiCards = [];

    step.pairs.forEach((pair, index) => {
        soundCards.push({ spoken:pair[0], key:index, id:"sound-" + index });
        kurmanjiCards.push({ text:pair[1], key:index, id:"ku-audio-" + index });
    });

    shuffleCards(soundCards, "audio-sound");
    shuffleCards(kurmanjiCards, "audio-kurmanji");

    document.getElementById("activity").innerHTML = `
        <div class="match-grid">
            <div class="match-column">
                <div class="match-heading">Hear</div>
                ${soundCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="selectAudioMatch('${card.id}', ${card.key}, '${escapeHtml(card.spoken)}')" aria-label="Hear word">
                        🔊
                    </button>
                `).join("")}
            </div>
            <div class="match-column">
                <div class="match-heading">Kurmanji</div>
                ${kurmanjiCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="selectMatch('${card.id}', 'kurmanji', ${card.key})">
                        ${escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
        </div>
    `;
}

function renderTypeStep(step){
    document.getElementById("activity").innerHTML = `
        ${step.spoken ? `<button class="speaker" onclick="speak('${escapeHtml(step.spoken)}')" aria-label="Play sound">🔊</button>` : ""}
        <input class="type-answer" id="typedAnswer" type="text" autocomplete="off" autocapitalize="none" placeholder="Type in English">
        <button onclick="checkTyped(this)">Check</button>
    `;

    if(step.spoken) setTimeout(() => speak(step.spoken), 250);
}

function shuffleCards(cards, salt){
    if(cards.length < 2) return;

    let seed = 2166136261;
    const text = salt + "-" + partIndex + "-" + stepIndex + "-" + cards.length;

    for(let i = 0; i < text.length; i++) {
        seed ^= text.charCodeAt(i);
        seed = Math.imul(seed, 16777619);
    }

    for(let i = cards.length - 1; i > 0; i--) {
        seed = Math.imul(seed ^ (seed >>> 13), 1274126177);
        const swapIndex = Math.abs(seed) % (i + 1);
        [cards[i], cards[swapIndex]] = [cards[swapIndex], cards[i]];
    }
}

function selectAudioMatch(buttonIndex, key, spoken){
    speak(spoken);
    selectMatch(buttonIndex, "audio", key);
}

function speakAndSelectMatch(buttonIndex, side, key, spoken, lang){
    if(lang){
        speakWithLang(spoken, lang, spoken === "Yrsa");
    } else {
        speak(spoken);
    }
    selectMatch(buttonIndex, side, key);
}

function renderNextStep(step){
    PilingoAudio.playLessonComplete();
    document.getElementById("activity").innerHTML =
        `<button onclick="completeStep()">${escapeHtml(step.button || "Next")}</button>`;
}

function showButtonResult(button, result){
    if(!button) return;
    button.classList.remove("correct", "wrong");
    button.classList.add(result);
}

function revealCorrectEmoji(button, step, value){
    if(!button || button.dataset.emojiRevealed === "true") return;

    const emoji = emojiForCorrectChoice(step, value);
    if(!emoji) return;

    button.textContent = emoji + " " + button.textContent.trim();
    button.dataset.emojiRevealed = "true";
}

function answersForStep(step){
    return Array.isArray(step.answer) ? step.answer : [step.answer];
}

function isCorrectChoice(step, value){
    return answersForStep(step).some(answer => normalize(value) === normalize(answer));
}

function checkChoice(value, button){
    const step = currentStep();
    if(isCorrectChoice(step, value)){
        revealCorrectEmoji(button, step, value);
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    showButtonResult(button, "wrong");
    markWrong();
}

function selectWord(index){
    const step = currentStep();
    const button = document.getElementById("word-" + index);
    if(!button || button.disabled) return;

    button.disabled = true;
    button.classList.add("selected");
    selectedWords.push({ index:index, text:step.options[index] });
    renderSelectedWords();
}

function renderSelectedWords(){
    const bank = document.getElementById("answerBank");
    if(!bank) return;

    if(selectedWords.length === 0) {
        bank.innerHTML = "";
        return;
    }

    bank.innerHTML = selectedWords.map((word, index) => `
        <button onclick="removeWord(${index})">${escapeHtml(word.text)}</button>
    `).join("");
}

function removeWord(index){
    const word = selectedWords[index];
    if(!word) return;

    selectedWords.splice(index, 1);
    const button = document.getElementById("word-" + word.index);
    if(button) {
        button.disabled = false;
        button.classList.remove("selected");
    }

    renderSelectedWords();
}

function checkBuild(button){
    const step = currentStep();
    const answer = selectedWords.map(word => normalize(word.text));
    const expectedAnswers = Array.isArray(step.answer[0]) ? step.answer : [step.answer];
    const isCorrect = expectedAnswers.some(expected =>
        answer.join(" ") === expected.map(word => normalize(word)).join(" ")
    );

    if(isCorrect){
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    showButtonResult(button, "wrong");
    markWrong();
}

function checkTyped(button){
    const step = currentStep();
    const input = document.getElementById("typedAnswer");
    const value = input ? input.value : "";

    if(answersForStep(step).some(answer => normalize(value) === normalize(answer))){
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    document.getElementById("feedback").innerText =
        "Correct answer: " + answersForStep(step).join(" / ");
    showButtonResult(button, "wrong");
    markWrong();
}

function selectMatch(buttonIndex, side, key){
    if(matchedKeys.includes(buttonIndex)) return;

    const button = document.getElementById("match-" + buttonIndex);
    if(!button) return;

    button.classList.add("selected");

    if(!selectedMatch) {
        selectedMatch = { buttonIndex:buttonIndex, side:side, key:key };
        return;
    }

    if(selectedMatch.buttonIndex === buttonIndex) return;

    const firstButton = document.getElementById("match-" + selectedMatch.buttonIndex);

    if(selectedMatch.side !== side && selectedMatch.key === key) {
        matchedKeys.push(buttonIndex, selectedMatch.buttonIndex);
        button.classList.add("correct");
        if(firstButton) firstButton.classList.add("correct");
        button.disabled = true;
        if(firstButton) firstButton.disabled = true;
        selectedMatch = null;

        if(matchedKeys.length === currentStep().pairs.length * 2) {
            markCorrect();
        }
        return;
    }

    setTimeout(() => {
        button.classList.add("wrong");
        if(firstButton) firstButton.classList.add("wrong");
    }, 50);

    setTimeout(() => {
        button.classList.remove("selected");
        button.classList.remove("wrong");
        if(firstButton) firstButton.classList.remove("selected", "wrong");
        selectedMatch = null;
        markWrong();
    }, 650);
}

function normalize(value){
    return String(value)
        .toLowerCase()
        .replace(/[!?.،,]/g, "")
        .trim();
}

function markCorrect(){
    registerCorrectForGrade();
    playSound("correct");
    document.getElementById("feedback").innerText = "✅ Correct";
    setTimeout(completeStep, 650);
}

function markWrong(){
    registerWrongForGrade();
    hearts = Engine.loseHeart();
    renderHearts();
    playSound("wrong");
    document.getElementById("feedback").innerText = "❌ Try again";

    if(hearts <= 0) gameOver();
}

function completeStep(){
    const sections = sectionsForPart(partIndex);
    const sectionIndex = currentSectionIndex();
    if(activeLesson && sections.length && sectionIndex >= 0) {
        const wasComplete = isSectionComplete(partIndex, sectionIndex);
        if(stepIndex < activeLesson.end) {
            stepIndex++;
            load();
            return;
        }

        markLessonComplete(partIndex, sectionIndex, activeLesson.id);
        saveCurrentGradeRecord();
        const nowComplete = isSectionComplete(partIndex, sectionIndex);
        const nextSection = sections[sectionIndex + 1];
        activeLesson = null;

        if(activeCoursePartRoute && isActiveCoursePartComplete(partIndex)) {
            if(nowComplete && !wasComplete) {
                markSectionComplete(partIndex, sectionIndex);
                hearts = window.Engine?.addHeart ? Engine.addHeart(1) : Math.min(5, hearts + 1);
                renderHearts();
            }

            completeEnginePartForRoute();
            showPartComplete(partIndex);
            return;
        }

        if(nowComplete && !wasComplete) {
            markSectionComplete(partIndex, sectionIndex);
            hearts = window.Engine?.addHeart ? Engine.addHeart(1) : Math.min(5, hearts + 1);
            renderHearts();

            if(nextSection) {
                showSectionSelect(partIndex, "❤️ +1 heart • " + nextSection.label + " is now unlocked");
                return;
            }

            if(activeCoursePartRoute) {
                completeEnginePartForRoute();
            }
            markPartComplete(partIndex);
            showPartComplete(partIndex);
            return;
        }

        showLessonSelect(partIndex, sectionIndex, "✅ Lesson passed. You can open any other lesson in this section.");
        return;
    }

    stepIndex++;

    if(stepIndex < gameParts[partIndex].steps.length) {
        load();
        return;
    }

    if(!sections.length) {
        saveCurrentGradeRecord();
    }

    if(activeCoursePartRoute) {
        completeEnginePartForRoute();
    }
    markPartComplete(partIndex);
    showPartComplete(partIndex);
}

function showPartComplete(completedIndex){
    PilingoAudio.playLessonComplete();
    applyPageTheme(completedIndex);

    const openPart = nextOpenPart();
    const isAllDone = allPartsComplete();

    renderHearts();
    document.getElementById("menuButton").style.display = "none";
    document.getElementById("bar").style.width = "100%";
    document.getElementById("partLabel").innerText = "Kurmanji to English";
    document.getElementById("instruction").innerText = "Part complete";
    document.getElementById("question").innerText = displayPartTitle(completedIndex);
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "✅ Great job!";
    const partSectionsForResult = sectionsForPart(completedIndex);
    const recordKey = partSectionsForResult.length ? partSectionsForResult[partSectionsForResult.length - 1].id : "game1-part-" + completedIndex;
    const record = gradebook[recordKey];
    document.getElementById("activity").innerHTML = `
        <div class="part-complete-actions">
            <div class="section-grade" style="font-size:16px !important; margin-bottom:10px;">${escapeHtml(record ? `Your latest grade: ${record.latestLetter} (${record.latestPercent}%)` : "Your grade was saved.")}</div>
            ${activeCoursePartRoute ? `<button class="primary-action" onclick="window.location.href='engine.html'">Back to learning map</button>` : ""}
            ${!activeCoursePartRoute && openPart >= 0 ? `<button class="primary-action" onclick="startPart(${openPart})">Start next part</button>` : ""}
            <button class="secondary-action" onclick="${activeCoursePartRoute ? "window.location.href='engine.html'" : "showPartSelect()"}">${activeCoursePartRoute ? "Choose another course part" : "Choose another part"}</button>
            ${!activeCoursePartRoute && isAllDone ? `<button class="primary-action" onclick="finish()">Finish Game One</button>` : ""}
        </div>
    `;

    PilingoAudio.speak("Great job! You finished this part.");
}

function finish(){
    PilingoAudio.playLessonComplete();
  showLessonComplete();
  PilingoAudio.speak("Great job! You finished this lesson.");

    if (typeof Engine.completeCoursePart === "function") {
        Engine.completeCoursePart("section-1", "part-1", { xp: 10, result: "passed" });
    } else if (typeof Engine.completeSkill === "function") {
        Engine.completeSkill(0, 10);
    } else {
        Engine.addXP(10);
        Engine.unlockLevel(1);
        Engine.resetHearts();
    }

    document.getElementById("bar").style.width = "100%";

    setTimeout(() => {
        window.location.href = "engine.html";
    }, 2200);
}

function showLessonComplete(){
  const card = document.querySelector(".card");
  if(!card) return;
  card.innerHTML = `
<h1>🐯</h1>
<h2>Great job!</h2>
<p>You finished this lesson.</p>
`;
}

function gameOver(){
    if(activeLesson?.id) {
        lessonStatuses[activeLesson.id] = "failed";
        saveLessonStatuses();
    }
    document.body.innerHTML = `
    <div class="card">
        <h1>💔</h1>
        <h2>Out of hearts</h2>
        <button onclick="location.reload()">Try again</button>
    </div>`;
}

if(activeCoursePartRoute) {
    showSectionSelect(activeCoursePartRoute.gamePartIndex, "Choose a lesson in this part");
} else {
    showPartSelect();
}
</script>
