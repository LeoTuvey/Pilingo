<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Lesson</title>

<style>
body{
  font-family:Arial;
  background:#f5f9ff;
  text-align:center;
  margin:0;
  padding:20px;
  transition:0.2s;
}

/* OWL */
#owl{
  font-size:60px;
  margin-top:10px;
  transition:0.3s;
  display:inline-block;
}

.owl-happy{ transform: scale(1.2) rotate(-10deg); }
.owl-sad{ transform: scale(0.9) rotate(10deg); }

.owl-celebrate{
  animation: bounce 0.6s ease;
}

@keyframes bounce{
  0%{transform:translateY(0);}
  30%{transform:translateY(-10px);}
  60%{transform:translateY(0);}
  100%{transform:translateY(-5px);}
}

/* CARD */
.card{
  background:white;
  max-width:550px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* STREAK */
#streakBox{
  font-size:18px;
  font-weight:bold;
  margin:10px;
  color:#ff9800;
}

/* PROGRESS */
#bar{
  height:10px;
  background:#4caf50;
  width:0%;
  transition:0.4s ease;
  border-radius:10px;
  margin-bottom:15px;
}

/* BUTTONS */
button{
  display:block;
  width:90%;
  margin:10px auto;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:white;
  font-size:16px;
  transition:0.15s;
  cursor:pointer;
}

button:active{
  transform:scale(0.96);
}

/* FEEDBACK */
.correctFlash{ animation:popGreen 0.4s ease; }
.wrongShake{ animation:shake 0.4s ease; }

@keyframes popGreen{
  0%{background:#f5f9ff;}
  50%{background:#4caf50; transform:scale(1.03);}
  100%{background:#f5f9ff;}
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}

/* XP POPUP */
#xpPopup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#58cc02;
  color:white;
  padding:10px 18px;
  border-radius:20px;
  font-weight:bold;
  opacity:0;
  transition:0.4s;
}
</style>
</head>

<body>

<div id="owl">🦉</div>
<div id="streakBox">🔥 Streak: 0</div>
<div id="xpPopup">+10 XP</div>

<div class="card">

<h2 id="question"></h2>

<div id="options"></div>

<div id="bar"></div>

</div>

<script src="engine-core.js"></script>
<script src="vocab_a1.js"></script>

<script>

let course = Engine.getCourse();
let hearts = Engine.getHearts();

let params = new URLSearchParams(location.search);
let skill = params.get("skill") || "animals";

/* --------------------
   SAFE POOL
-------------------- */
function getPool(){
  return VOCAB_A1[skill] || VOCAB_A1.animals;
}

let questions = [];
let current = 0;

/* --------------------
   GENERATE (FIXED)
-------------------- */
function generate(){

questions = []; // FIX 1: prevent duplication

let pool = getPool();

for(let i=0;i<5;i++){

let correct = pool[Math.floor(Math.random()*pool.length)];

let options = [correct];

while(options.length < 3){
let r = pool[Math.floor(Math.random()*pool.length)];
if(!options.includes(r)) options.push(r);
}

options.sort(()=>Math.random()-0.5);

questions.push({correct, options});
}

}

/* --------------------
   OWL
-------------------- */
function owl(state){

let o = document.getElementById("owl");

o.classList.remove("owl-happy","owl-sad","owl-celebrate");

if(state === "happy") o.classList.add("owl-happy");
if(state === "sad") o.classList.add("owl-sad");
if(state === "win") o.classList.add("owl-celebrate");
}

/* --------------------
   STREAK
-------------------- */
function updateStreakUI(){
  let streak = Engine.updateStreak();
  document.getElementById("streakBox").innerText =
    "🔥 Streak: " + streak;
}

/* --------------------
   XP POPUP
-------------------- */
function showXP(){
  let el = document.getElementById("xpPopup");
  el.style.opacity = 1;
  setTimeout(()=> el.style.opacity = 0, 800);
}

/* --------------------
   LOAD QUESTION
-------------------- */
function load(){

let q = questions[current];

document.getElementById("question").innerText =
"Select: " + q.correct.en;

let html = "";

q.options.forEach((opt,i)=>{
html += `<button onclick="check(${i})">${opt.en}</button>`;
});

document.getElementById("options").innerHTML = html;

updateBar();
}

/* --------------------
   PROGRESS
-------------------- */
function updateBar(){
document.getElementById("bar").style.width =
(current/questions.length)*100 + "%";
}

/* --------------------
   CHECK ANSWER
-------------------- */
function check(i){

let q = questions[current];

if(q.options[i] === q.correct){

owl("happy");

document.body.classList.add("correctFlash");
setTimeout(()=>document.body.classList.remove("correctFlash"),400);

current++;

if(current < questions.length){
load();
}else{
finish();
}

}else{

hearts = Engine.loseHeart();

owl("sad");

document.body.classList.add("wrongShake");
setTimeout(()=>document.body.classList.remove("wrongShake"),400);

if(hearts <= 0){
alert("Game Over");
location.reload();
}
}
}

/* --------------------
   FINISH
-------------------- */
function finish(){

Engine.addXP(10);
Engine.resetHearts();
Engine.updateStreak();

owl("win");
showXP();
updateStreakUI();

setTimeout(()=>{
window.location.href = "engine.html";
},1200);
}

/* --------------------
   START (FIXED)
-------------------- */
generate();
load();
updateStreakUI();

</script>

</body>
</html>
