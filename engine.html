<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>🐯 Pilingo Path</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Inter,Arial,sans-serif;
  margin:0;
  padding:26px 18px 36px;
  text-align:center;
  background:
    radial-gradient(circle at top left, rgba(255,235,193,0.65), transparent 30%),
    linear-gradient(180deg, #fffef9 0%, #f7fbff 44%, #f6efe0 100%);
  color:#253044;
  min-height:100vh;
}

h1{
  margin:4px 0 14px;
  font-size:30px;
  letter-spacing:0;
}

#xp{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  color:#58a700;
  border:2px solid #d7f2c3;
  box-shadow:0 4px 0 #d7f2c3;
  padding:10px 14px;
  border-radius:999px;
  font-weight:900;
  z-index:10;
}

.course-panel{
  max-width:460px;
  margin:0 auto 24px;
}

.course-label{
  padding:14px;
  border:2px solid #efe2c7;
  border-radius:999px;
  background:linear-gradient(180deg, #fffefb 0%, #fbf2e2 100%);
  font-size:16px;
  font-weight:900;
  box-shadow:0 6px 0 #eadfca;
}

.path{
  max-width:460px;
  margin:auto;
  position:relative;
  padding:10px 0 6px;
}

.line{
  position:absolute;
  left:50%;
  top:0;
  width:8px;
  height:100%;
  background:#e5edf5;
  border-radius:999px;
  transform:translateX(-50%);
  pointer-events:none;
}

#owlGuide{
  position:absolute;
  left:50%;
  transform:translate(-50%,0);
  width:52px;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:31px;
  color:white;
  background:#ffb020;
  border:3px solid white;
  border-radius:50%;
  box-shadow:0 5px 0 rgba(37,48,68,0.16);
  transition:0.6s ease;
  z-index:5;
  pointer-events:none;
}

.node{
  width:min(236px, 78vw);
  min-height:150px;
  margin:28px auto;
  padding:18px 18px 20px;
  border-radius:45% 45% 48% 48% / 36% 36% 58% 58%;
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), rgba(255,255,255,0.22) 28%, transparent 30%),
    linear-gradient(180deg, #fffefb 0%, #f8efe1 100%);
  border:3px solid rgba(255,255,255,0.95);
  box-shadow:0 10px 0 #eadfca, 0 18px 28px rgba(122,83,0,0.12);
  cursor:pointer;
  transition:transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
  position:relative;
  z-index:2;
  font-weight:900;
  overflow:hidden;
}

.node:nth-child(odd){
  transform:translateX(-54px);
}

.node:nth-child(even){
  transform:translateX(54px);
}

.node:hover{
  box-shadow:0 8px 0 #d9ccb0, 0 18px 30px rgba(122,83,0,0.16);
  border-color:#fff8ef;
}

.node:nth-child(odd):hover{
  transform:translateX(-54px) translateY(-2px);
}

.node:nth-child(even):hover{
  transform:translateX(54px) translateY(-2px);
}

.locked{
  opacity:0.55;
  pointer-events:none;
  filter:grayscale(0.35);
}

.unlocked{
  box-shadow:0 10px 0 #eadfca, 0 18px 28px rgba(88,167,0,0.12);
}

.completed{
  box-shadow:0 10px 0 #eadfca, 0 18px 28px rgba(255,176,32,0.16);
}

.icon{
  display:inline-flex;
  width:78px;
  height:78px;
  align-items:center;
  justify-content:center;
  border-radius:46% 46% 52% 52% / 40% 40% 60% 60%;
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), rgba(255,255,255,0.2) 30%, transparent 32%),
    linear-gradient(180deg, #fffefc 0%, #f5ead8 100%);
  font-size:38px;
  margin:0 auto 10px;
  box-shadow:inset 0 -7px 0 rgba(214,197,168,0.6), 0 8px 0 rgba(214,197,168,0.75);
}

.skill-name{
  font-size:17px;
  line-height:1.2;
}

.skill-name .skill-emoji{
  display:block;
  font-size:24px;
  margin-bottom:4px;
}

.small{
  font-size:13px;
  color:#7f6d58;
  margin-top:8px;
}

.bar{
  height:10px;
  background:#efe5d5;
  border-radius:999px;
  margin-top:12px;
  overflow:hidden;
}

.bar-fill{
  height:100%;
  width:0%;
  background:#58cc02;
  transition:0.4s ease;
}

.level-0 .bar-fill{ background:#ddd; }
.level-1 .bar-fill{ background:#ffca28; }
.level-2 .bar-fill{ background:#ffb300; }
.level-3 .bar-fill{ background:#66bb6a; }
.level-4 .bar-fill{ background:#2e7d32; }

@media (max-width:520px){
  body{padding:18px 12px 28px;}
  #xp{position:static; display:inline-block; margin-bottom:10px;}
  .node,
  .node:nth-child(odd),
  .node:nth-child(even){
    transform:none;
    width:88%;
  }
  .node:nth-child(odd):hover,
  .node:nth-child(even):hover{
    transform:translateY(-2px);
  }
  .line{left:22px;}
  #owlGuide{display:none;}
}
</style>
</head>

<body>

<h1>🐯 Your Learning Path</h1>

<div id="xp">XP: 0</div>

<div class="course-panel">
  <div class="course-label">Kurmanji to English</div>
</div>

<div class="path">
  <div class="line"></div>
  <div id="owlGuide">🐯</div>
  <div id="map"></div>
</div>

<!-- CORE -->
<script src="engine-core.js"></script>
<script src="vocab_a1.js"></script>
<script src="app-ui.js"></script>
<script src="app-state.js"></script>
<script src="app-polish.js"></script>
<script src="app-effects.js"></script>
<script src="pwa.js"></script>

<script>
/* =========================
   DEBUG BOOT LOG
========================= */

console.log("🐯 Pilingo engine loading...");

/* =========================
   WAIT FOR DOM
========================= */

document.addEventListener("DOMContentLoaded", () => {

  console.log("DOM ready");

  /* =========================
     SAFE ENGINE CHECK
  ========================= */

  let xp = 0;

  if (window.Engine && typeof Engine.getXP === "function") {
    xp = Engine.getXP();
    console.log("Engine loaded ✔ XP:", xp);
  } else {
    console.warn("Engine missing → fallback XP = 0");
  }

  document.getElementById("xp").innerText = "XP: " + xp;

  if(window.Engine?.setCourse){
    Engine.setCourse("en-ku");
  } else {
    localStorage.setItem("course", "en-ku");
  }

  /* =========================
     SKILLS
  ========================= */

  const skills = [
    { name:"Animals", emoji:"🐶", id:"animals" },
    { name:"Actions", emoji:"🏃", id:"verbs" },
    { name:"This / That", emoji:"👇", id:"this-that" },
    { name:"Articles", emoji:"🍎", id:"articles" },
    { name:"Numbers", emoji:"🔢", id:"numbers" },
    { name:"Listening", emoji:"🔊", id:"listening" },
    { name:"Final Review", emoji:"🏆", id:"review" }
  ];

  function getSkillLevel(i){

    let key = "skill_" + i;
    let val = localStorage.getItem(key);

    if(val !== null){
      return parseInt(val, 10) || 0;
    }

    return 0;
  }

  function isSkillUnlocked(i){
    if(i === 0) return true;
    if(getSkillLevel(i) > 0) return true;

    try {
      let course = window.Engine?.getCourse ? Engine.getCourse() : "en-ku";
      let unlocked = JSON.parse(
        localStorage.getItem(course + "_unlocked") ||
        "[true,false,false,false,false,false,false]"
      );

      return Array.isArray(unlocked) && unlocked[i] === true;
    } catch(e) {
      return false;
    }
  }

  function getBar(level){
    if(level === 0) return 0;
    if(level === 1) return 25;
    if(level === 2) return 50;
    if(level === 3) return 75;
    return 100;
  }

  function render(){

    let html = "";

    skills.forEach((s,i)=>{

      let level = getSkillLevel(i);
      let progress = getBar(level);

      let state = isSkillUnlocked(i) ? "unlocked" : "locked";

      html += `
        <div class="node ${state} level-${level}" onclick="openSkill(${i})">

          <div class="icon">
            ${level === 4 ? "👑" : s.emoji}
          </div>

          <div class="skill-name">
            <span class="skill-emoji">${s.emoji}</span>
            <span>${s.name}</span>
          </div>

          <div class="small">Level ${level}/4</div>

          <div class="bar">
            <div class="bar-fill" style="width:${progress}%"></div>
          </div>

        </div>
      `;
    });

    document.getElementById("map").innerHTML = html;

    setTimeout(placeOwl, 200);
  }

  function placeOwl(){

    let owl = document.getElementById("owlGuide");
    let nodes = document.querySelectorAll(".node");

    if(!nodes.length) return;

    let first = nodes[0].getBoundingClientRect();
    let container = document.querySelector(".path").getBoundingClientRect();

    owl.style.top = (first.top - container.top + 10) + "px";
  }

  window.openSkill = function(i){

    let nodes = document.querySelectorAll(".node");
    if(!nodes[i]) return;
    if(!isSkillUnlocked(i)) return;

    let rect = nodes[i].getBoundingClientRect();
    let container = document.querySelector(".path").getBoundingClientRect();

    document.getElementById("owlGuide").style.top =
      (rect.top - container.top + 10) + "px";

    if(window.AppState?.setLastSkill){
      AppState.setLastSkill(i);
    }

    if(window.AppEffects?.flash){
      AppEffects.flash("correct");
    }

    setTimeout(()=>{

      let url = "game" + (i + 1) + ".html";
      if(i === 0) url += "?v=6";

      if(window.AppState?.go){
        AppState.go(url);
      } else {
        window.location.href = url;
      }

    }, 400);
  };

  render();

});

</script>

</body>
</html>
