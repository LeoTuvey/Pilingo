<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Engine</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#e3f2fd,#fce4ec);
    text-align:center;
}

header{
    background:#1976d2;
    color:white;
    padding:15px;
    font-size:18px;
}

#info{
    font-weight:bold;
    margin:10px;
    font-size:16px;
}

.map{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.node{
    width:120px;
    height:120px;
    margin:35px auto;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.2s;
}

.node:hover{
    transform:scale(1.05);
}

.locked{
    opacity:0.3;
    pointer-events:none;
}

.green{ border:4px solid #4caf50; }
.orange{ border:4px solid #ff9800; }
.blue{ border:4px solid #2196f3; }
.purple{ border:4px solid #9c27b0; }

.small{
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<header>🦉 Owl-Lingo Course Engine</header>

<div id="info">Loading course...</div>

<div class="map">
<div id="levels"></div>
</div>

<script>

/////////////////////////////////////
// COURSE SYSTEM
/////////////////////////////////////

let course = localStorage.getItem("course") || "en-ku";

// PRETTY COURSE NAME
let courseName =
course === "en-ku" ? "English → Kurdish" :
course === "en-sv" ? "English → Swedish" :
course;

// KEYS
let xpKey = course + "_xp";
let unlockKey = course + "_unlocked";

// DATA
let xp = parseInt(localStorage.getItem(xpKey) || "0");
let unlocked = JSON.parse(
    localStorage.getItem(unlockKey) ||
    "[true,false,false,false,false,false,false]"
);

// INFO DISPLAY
document.getElementById("info").innerText =
"📘 Course: " + courseName + " | ⭐ XP: " + xp;

/////////////////////////////////////
// LEVELS
/////////////////////////////////////

let levels = [
{ name:"Animals", file:"game1.html", color:"green" },
{ name:"Actions", file:"game2.html", color:"green" },
{ name:"This / That", file:"game3.html", color:"orange" },
{ name:"A / An", file:"game4.html", color:"blue" },
{ name:"Plural", file:"game5.html", color:"blue" },
{ name:"Listening", file:"game6.html", color:"purple" },
{ name:"Final Test", file:"game7.html", color:"purple" }
];

/////////////////////////////////////
// RENDER MAP
/////////////////////////////////////

let html = "";

levels.forEach((lvl,i)=>{

let locked = !unlocked[i];

html += `
<div class="node ${lvl.color} ${locked ? "locked":""}" onclick="go(${i})">
<div>🦉</div>
<div>${lvl.name}</div>
<div class="small">Level ${i+1}</div>
</div>
`;

});

document.getElementById("levels").innerHTML = html;

/////////////////////////////////////
// NAVIGATION
/////////////////////////////////////

function go(i){
    window.location.href = levels[i].file;
}

</script>

</body>
</html>
