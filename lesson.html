<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lesson</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body { font-family: Arial, sans-serif; }
    #owl, #owlGuide {
      width: 120px;
      height: 120px;
      background: #eee;
      border-radius: 20px;
      margin: 20px;
    }
    .happy { background: #58cc02; }
    .sad { background: #ff4b4b; }
    .celebrate { background: gold; }
  </style>
</head>

<body>

  <!-- UI ROOT -->
  <div id="owl"></div>

  <button id="finishBtn">Finish Lesson</button>

  <!-- =========================
       1. CORE ENGINE (LOAD FIRST)
  ========================== -->
  <script>
    const Engine = {

      getCourse(){
        return localStorage.getItem("course") || "en-ku";
      },

      getXP(){
        const c = this.getCourse();
        return Number(localStorage.getItem(c + "_xp") || 0);
      },

      addXP(v){
        const c = this.getCourse();
        const key = c + "_xp";
        const xp = this.getXP() + (Number(v) || 0);
        localStorage.setItem(key, xp);
        return xp;
      },

      getLevel(){
        const xp = this.getXP();
        if (xp < 50) return 0;
        if (xp < 120) return 1;
        if (xp < 220) return 2;
        if (xp < 350) return 3;
        return 4;
      },

      updateStreak(){
        const today = new Date().toISOString().split("T")[0];
        const last = localStorage.getItem("lastDay");

        let streak = Number(localStorage.getItem("streak") || 0);

        if (last !== today) {
          streak = (last ? streak + 1 : 1);
          localStorage.setItem("lastDay", today);
          localStorage.setItem("streak", streak);
        }

        return streak;
      },

      resetHearts(){
        localStorage.setItem("hearts", "5");
      }
    };

    window.Engine = Engine;
  </script>

  <!-- =========================
       2. ADAPTIVE BRAIN
  ========================== -->
  <script>
    const AdaptiveBrain = {

      decide(context = {}){

        const {
          streak = 0,
          level = 0,
          xp = 0
        } = context;

        const r = {
          xpMultiplier: 1,
          mood: "correct",
          showStreakBoost: false
        };

        if (streak >= 5) {
          r.xpMultiplier = 1.5;
          r.showStreakBoost = true;
        }

        if (streak >= 10) {
          r.xpMultiplier = 2;
        }

        if (level >= 3) r.xpMultiplier += 0.5;
        if (xp > 300) r.xpMultiplier *= 0.9;

        return r;
      }
    };

    window.AdaptiveBrain = AdaptiveBrain;
  </script>

  <!-- =========================
       3. UI SYSTEMS
  ========================== -->
  <script>
    const AppEffects = {

      xpBurst(xp){
        const el = document.createElement("div");
        el.innerText = "+" + xp + " XP";
        el.style.position = "fixed";
        el.style.top = "40%";
        el.style.left = "50%";
        el.style.transform = "translate(-50%,-50%)";
        el.style.fontSize = "28px";
        el.style.color = "#58cc02";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
      },

      flash(type){
        document.body.style.background =
          type === "levelup" ? "gold" :
          type === "wrong" ? "red" : "white";

        setTimeout(() => document.body.style.background = "", 200);
      },

      streakFire(){
        console.log("🔥 streak");
      }
    };

    const AppPolish = {

      setMood(mood){
        const owl = document.getElementById("owl");
        if (!owl) return;

        owl.className = "";

        if (mood === "correct") owl.classList.add("happy");
        if (mood === "wrong") owl.classList.add("sad");
        if (mood === "levelup") owl.classList.add("celebrate");
      },

      xpPopup(xp){
        console.log("XP:", xp);
      },

      notify(msg){
        alert(msg);
      }
    };

    window.AppEffects = AppEffects;
    window.AppPolish = AppPolish;
  </script>

  <!-- =========================
       4. FINISH ENGINE
  ========================== -->
  <script>
    function runFinishLogic(){

      const baseXP = 10;

      const oldLevel = window.Engine.getLevel();
      const streak = window.Engine.updateStreak();
      const xp = window.Engine.getXP();

      const brain = window.AdaptiveBrain.decide({
        streak,
        level: oldLevel,
        xp
      });

      const xpReward = Math.max(
        1,
        Math.round(baseXP * brain.xpMultiplier)
      );

      window.Engine.addXP(xpReward);

      const newLevel = window.Engine.getLevel();
      const leveledUp = newLevel > oldLevel;

      window.AppEffects.xpBurst(xpReward);
      window.AppEffects.flash(leveledUp ? "levelup" : "correct");

      window.AppPolish.setMood(
        leveledUp ? "levelup" : "correct"
      );

      if (leveledUp) {
        window.AppEffects.streakFire();
        window.AppPolish.notify("🏆 Level Up!");
      }

      return { xpReward, oldLevel, newLevel };
    }

    window.runFinishLogic = runFinishLogic;
  </script>

  <!-- =========================
       5. SAFE INIT (CRITICAL FIX)
  ========================== -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const btn = document.getElementById("finishBtn");

      btn?.addEventListener("click", () => {
        try {
          runFinishLogic();
        } catch (e) {
          console.error("Finish logic crashed:", e);
        }
      });

    });
  </script>

</body>
</html>
