<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson</title>
</head>

<body>

<h1>Lesson</h1>

<button onclick="runFinishLogic()">
  Finish Lesson (+10 XP)
</button>

<script src="engine-core.js"></script>

<script>
function runFinishLogic(){

  console.log("🏆 runFinishLogic triggered");

  if (!window.Engine) {
    console.error("Engine not loaded");
    return;
  }

  const oldLevel = Engine.getLevel();
  const xpReward = 10;

  Engine.addXP(xpReward);
  Engine.updateStreak();
  Engine.resetHearts();

  const newLevel = Engine.getLevel();
  const leveledUp = newLevel > oldLevel;

  console.log({
    oldLevel,
    newLevel,
    leveledUp,
    totalXP: Engine.getXP()
  });

  if (leveledUp) {
    alert("🏆 LEVEL UP!");
  } else {
    alert("+10 XP!");
  }
}
</script>

</body>
</html>
