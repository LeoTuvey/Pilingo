<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

button{
  padding: 15px;
  font-size: 18px;
  background: #58cc02;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🦉 Lesson Page</h1>

<button id="finishBtn">
  Finish Lesson (+10 XP)
</button>

<script src="engine-core.js"></script>

<script>
/* =========================
   SAFE GLOBAL FUNCTION
========================= */

window.runFinishLogic = function(){

  console.log("🏆 runFinishLogic triggered");

  const engine = window.Engine;

  if(!engine){
    console.error("❌ Engine not loaded");
    alert("Engine not loaded (check engine-core.js)");
    return;
  }

  const oldLevel = engine.getLevel();
  const xpReward = 10;

  engine.addXP(xpReward);
  engine.updateStreak();
  engine.resetHearts();

  const newLevel = engine.getLevel();

  console.log("OLD LEVEL:", oldLevel);
  console.log("NEW LEVEL:", newLevel);
  console.log("TOTAL XP:", engine.getXP());

  if(newLevel > oldLevel){
    alert("🏆 LEVEL UP!");
  } else {
    alert("+10 XP!");
  }
};

/* =========================
   EXTRA SAFETY BINDING
========================= */

document.getElementById("finishBtn").addEventListener("click", function(){
  console.log("button clicked");
  window.runFinishLogic();
});
</script>

</body>
</html>
