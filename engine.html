<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>🐯 Pilingo Path</title>

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Inter,Arial,sans-serif;
  margin:0;
  padding:26px 18px 36px;
  text-align:center;
  background:
    radial-gradient(circle at top left, rgba(255,214,102,0.48), transparent 30%),
    linear-gradient(180deg, #fffdf6 0%, #fbf4de 44%, #f2deaf 100%);
  color:#253044;
  min-height:100vh;
}

.top-actions{
  max-width:460px;
  margin:0 auto 12px;
  display:flex;
  justify-content:flex-start;
}

.back-button{
  width:auto;
  padding:12px 16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(180deg, #fffaf0 0%, #ffe7b0 100%);
  color:#9b6b10;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 4px 0 #dcb25b;
}

.back-button:hover{
  transform:translateY(-1px);
}

h1{
  margin:4px 0 14px;
  font-size:30px;
  letter-spacing:0;
}

#xp{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  color:#58a700;
  border:2px solid #d7f2c3;
  box-shadow:0 4px 0 #d7f2c3;
  padding:10px 14px;
  border-radius:999px;
  font-weight:900;
  z-index:10;
}

.course-panel{
  max-width:460px;
  margin:0 auto 24px;
}

.course-label{
  padding:14px;
  border:2px solid #e1c27a;
  border-radius:999px;
  background:linear-gradient(180deg, #fff7da 0%, #f4d98f 100%);
  font-size:16px;
  font-weight:900;
  box-shadow:0 6px 0 #dbb35c;
}

.gradeboard{
  max-width:460px;
  margin:0 auto 22px;
  padding:16px;
  border-radius:24px;
  background:linear-gradient(180deg, #fff8de 0%, #f6e2ab 100%);
  border:3px solid #ecd07a;
  box-shadow:0 8px 0 #d6b25d, 0 16px 24px rgba(122,83,0,0.12);
  text-align:left;
}

.gradeboard h2{
  margin:0 0 8px;
  font-size:20px;
  color:#7d5605;
}

.gradeboard p{
  margin:0 0 12px;
  font-size:14px;
  color:#7f6630;
  line-height:1.4;
}

.grade-list{
  display:grid;
  gap:10px;
}

.grade-item{
  padding:12px 14px;
  border-radius:18px;
  background:rgba(255,255,255,0.84);
  border:2px solid rgba(236,208,122,0.9);
}

.grade-item strong,
.grade-item span{
  display:block;
}

.grade-item strong{
  font-size:15px;
  color:#253044;
}

.grade-item span{
  margin-top:4px;
  font-size:13px;
  color:#7b6636;
}

.path{
  max-width:460px;
  margin:auto;
  position:relative;
  padding:10px 0 6px;
}

.line{
  position:absolute;
  left:50%;
  top:0;
  width:8px;
  height:100%;
  background:linear-gradient(180deg, #efd79a 0%, #d8b35c 100%);
  border-radius:999px;
  transform:translateX(-50%);
  pointer-events:none;
}

#owlGuide{
  position:absolute;
  left:50%;
  transform:translate(-50%,0);
  width:52px;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:31px;
  color:white;
  background:#ffb020;
  border:3px solid white;
  border-radius:50%;
  box-shadow:0 5px 0 rgba(37,48,68,0.16);
  transition:0.6s ease;
  z-index:5;
  pointer-events:none;
}

.node{
  width:min(236px, 78vw);
  min-height:150px;
  margin:28px auto;
  padding:18px 18px 20px;
  border-radius:45% 45% 48% 48% / 36% 36% 58% 58%;
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), rgba(255,255,255,0.22) 28%, transparent 30%),
    linear-gradient(180deg, var(--egg-top, #fff8df) 0%, var(--egg-bottom, #efcf7c) 100%);
  border:3px solid rgba(255,248,222,0.96);
  box-shadow:0 10px 0 var(--egg-shadow, #d7ae56), 0 18px 28px rgba(122,83,0,0.18);
  cursor:pointer;
  transition:transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
  position:relative;
  z-index:2;
  font-weight:900;
  overflow:hidden;
}

.node:nth-child(odd){
  transform:translateX(-54px);
}

.node:nth-child(even){
  transform:translateX(54px);
}

.node:hover{
  box-shadow:0 8px 0 var(--egg-hover-shadow, #cfa145), 0 18px 30px rgba(122,83,0,0.22);
  border-color:#fff4ce;
}

.node:nth-child(odd):hover{
  transform:translateX(-54px) translateY(-2px);
}

.node:nth-child(even):hover{
  transform:translateX(54px) translateY(-2px);
}

.locked{
  opacity:0.55;
  pointer-events:none;
  filter:grayscale(0.35);
}

.lock-badge{
  position:absolute;
  top:12px;
  right:12px;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(37,48,68,0.82);
  color:#fff;
  font-size:18px;
  box-shadow:0 4px 0 rgba(18,24,34,0.28);
}

.unlocked{
  box-shadow:0 10px 0 var(--egg-shadow, #d7ae56), 0 18px 28px rgba(230,171,24,0.18);
}

.completed{
  box-shadow:0 10px 0 var(--egg-complete-shadow, #c8912d), 0 18px 28px rgba(255,176,32,0.24);
}

.icon{
  display:inline-flex;
  width:78px;
  height:78px;
  align-items:center;
  justify-content:center;
  border-radius:46% 46% 52% 52% / 40% 40% 60% 60%;
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), rgba(255,255,255,0.2) 30%, transparent 32%),
    linear-gradient(180deg, var(--icon-top, #fff7d3) 0%, var(--icon-bottom, #e9c062) 100%);
  font-size:38px;
  margin:0 auto 10px;
  box-shadow:inset 0 -7px 0 rgba(184,137,31,0.34), 0 8px 0 var(--icon-shadow, rgba(196,148,45,0.7));
}

.skill-name{
  font-size:17px;
  line-height:1.2;
}

.skill-name .skill-emoji{
  display:block;
  font-size:24px;
  margin-bottom:4px;
}

.small{
  font-size:13px;
  color:#6e5527;
  margin-top:8px;
}

.bar{
  height:10px;
  background:#edd7a0;
  border-radius:999px;
  margin-top:12px;
  overflow:hidden;
}

.bar-fill{
  height:100%;
  width:0%;
  background:#58cc02;
  transition:0.4s ease;
}

.level-0 .bar-fill{ background:#ddd; }
.level-1 .bar-fill{ background:#ffca28; }
.level-2 .bar-fill{ background:#ffb300; }
.level-3 .bar-fill{ background:#66bb6a; }
.level-4 .bar-fill{ background:#2e7d32; }

@media (max-width:520px){
  body{padding:18px 12px 28px;}
  #xp{position:static; display:inline-block; margin-bottom:10px;}
  .node,
  .node:nth-child(odd),
  .node:nth-child(even){
    transform:none;
    width:88%;
  }
  .node:nth-child(odd):hover,
  .node:nth-child(even):hover{
    transform:translateY(-2px);
  }
  .line{left:22px;}
  #owlGuide{display:none;}
}
</style>
</head>

<body>
<script src="pilingo-auth.js"></script>
<script>PilingoAuth.requireAccount();</script>

<div class="top-actions">
  <button class="back-button" onclick="goBackHome()">← Back to home</button>
</div>

<h1>🐯 Your Learning Path</h1>

<div id="xp">XP: 0</div>

<div class="course-panel">
  <div class="course-label">Kurmanji to English</div>
</div>

<section class="gradeboard">
  <h2>📘 Student Grades</h2>
  <p>Finished section grades from Game 1 are saved here so you can review progress and encourage students.</p>
  <div id="gradeList" class="grade-list">
    <div class="grade-item">
      <strong>No grades yet</strong>
      <span>Grades will appear here after students finish a section.</span>
    </div>
  </div>
</section>

<div class="path">
  <div class="line"></div>
  <div id="owlGuide">🐯</div>
  <div id="map"></div>
</div>

<!-- CORE -->
<script src="engine-core.js"></script>
<script src="pilingo-sounds.js"></script>
<script src="vocab_a1.js"></script>
<script src="app-ui.js"></script>
<script src="app-state.js"></script>
<script src="app-polish.js"></script>
<script src="app-effects.js"></script>
<script src="pwa.js"></script>

<script>
/* =========================
   DEBUG BOOT LOG
========================= */

console.log("🐯 Pilingo engine loading...");

function goBackHome(){
  window.location.href = "index.html";
}

/* =========================
   WAIT FOR DOM
========================= */

document.addEventListener("DOMContentLoaded", () => {

  console.log("DOM ready");

  /* =========================
     SAFE ENGINE CHECK
  ========================= */

  let xp = 0;

  if (window.Engine && typeof Engine.getXP === "function") {
    xp = Engine.getXP();
    console.log("Engine loaded ✔ XP:", xp);
  } else {
    console.warn("Engine missing → fallback XP = 0");
  }

  document.getElementById("xp").innerText = "XP: " + xp;

  if(window.Engine?.setCourse){
    Engine.setCourse("en-ku");
  } else {
    localStorage.setItem("course", "en-ku");
  }

  /* =========================
     SKILLS
  ========================= */

  const skills = [
    { name:"Animals", emoji:"🐶", id:"animals", eggTop:"#fff1cf", eggBottom:"#f0c46f", eggShadow:"#d39d3b", eggHover:"#bf8c2d", eggComplete:"#b67f21", iconTop:"#fff7d8", iconBottom:"#ebc35b", iconShadow:"rgba(201,148,27,0.72)" },
    { name:"Actions", emoji:"🏃", id:"verbs", eggTop:"#ffe2c9", eggBottom:"#f0a56d", eggShadow:"#cf7d42", eggHover:"#b76832", eggComplete:"#a85922", iconTop:"#fff0df", iconBottom:"#eead7d", iconShadow:"rgba(196,110,46,0.68)" },
    { name:"This / That", emoji:"👇", id:"this-that", eggTop:"#dff3ff", eggBottom:"#8bc9f5", eggShadow:"#5fa2d4", eggHover:"#438cbe", eggComplete:"#2f77ab", iconTop:"#edf8ff", iconBottom:"#93d4ff", iconShadow:"rgba(67,140,190,0.62)" },
    { name:"Articles", emoji:"🍎", id:"articles", eggTop:"#ffe0e8", eggBottom:"#ee98ae", eggShadow:"#c96b82", eggHover:"#b45770", eggComplete:"#a1415b", iconTop:"#fff0f4", iconBottom:"#f4a8bc", iconShadow:"rgba(180,87,112,0.66)" },
    { name:"Numbers", emoji:"🔢", id:"numbers", eggTop:"#efe2ff", eggBottom:"#b89af0", eggShadow:"#8c6fcb", eggHover:"#7558b3", eggComplete:"#5f439e", iconTop:"#f8f2ff", iconBottom:"#c4a8ff", iconShadow:"rgba(117,88,179,0.66)" },
    { name:"Listening", emoji:"🔊", id:"listening", eggTop:"#ddf8e6", eggBottom:"#8ed0a7", eggShadow:"#5da679", eggHover:"#458c62", eggComplete:"#35704d", iconTop:"#edfdf2", iconBottom:"#95ddb1", iconShadow:"rgba(69,140,98,0.62)" },
    { name:"Final Review", emoji:"🏆", id:"review", eggTop:"#ffe7bf", eggBottom:"#f0b44b", eggShadow:"#ce8c21", eggHover:"#b77616", eggComplete:"#a5640e", iconTop:"#fff2d8", iconBottom:"#f6c86f", iconShadow:"rgba(183,118,22,0.68)" }
  ];

  function getSkillLevel(i){

    let key = "skill_" + i;
    let val = localStorage.getItem(key);

    if(val !== null){
      return parseInt(val, 10) || 0;
    }

    return 0;
  }

  function isSkillUnlocked(i){
    if(i === 0) return true;

    try {
      let course = window.Engine?.getCourse ? Engine.getCourse() : "en-ku";
      let unlocked = JSON.parse(
        localStorage.getItem(course + "_unlocked") ||
        "[true,false,false,false,false,false,false]"
      );

      if (Array.isArray(unlocked) && unlocked[i] === true) {
        return true;
      }
    } catch(e) {
      // fall through to sequential check below
    }

    return getSkillLevel(i - 1) >= 4;
  }

  function getBar(level){
    if(level === 0) return 0;
    if(level === 1) return 25;
    if(level === 2) return 50;
    if(level === 3) return 75;
    return 100;
  }

  function loadGrades(){
    try {
      const saved = JSON.parse(localStorage.getItem("pilingo_game1_grades") || "{}");
      return saved && typeof saved === "object" ? Object.values(saved) : [];
    } catch(error) {
      return [];
    }
  }

  function renderGrades(){
    const list = document.getElementById("gradeList");
    if(!list) return;

    const grades = loadGrades()
      .sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0))
      .slice(0, 8);

    if(!grades.length) {
      list.innerHTML = `
        <div class="grade-item">
          <strong>No grades yet</strong>
          <span>Grades will appear here after students finish a section.</span>
        </div>
      `;
      return;
    }

    list.innerHTML = grades.map((grade) => `
      <div class="grade-item">
        <strong>${grade.label || "Game One section"}</strong>
        <span>Latest grade: ${grade.latestLetter || "-"} (${grade.latestPercent || 0}%)</span>
        <span>Best grade: ${grade.bestLetter || "-"} (${grade.bestPercent || 0}%) • Attempts: ${grade.attempts || 1}</span>
      </div>
    `).join("");
  }

  function render(){

    let html = "";

    skills.forEach((s,i)=>{

      let level = getSkillLevel(i);
      let progress = getBar(level);

      let state = isSkillUnlocked(i) ? "unlocked" : "locked";

      html += `
        <div class="node ${state} level-${level}" style="--egg-top:${s.eggTop}; --egg-bottom:${s.eggBottom}; --egg-shadow:${s.eggShadow}; --egg-hover-shadow:${s.eggHover}; --egg-complete-shadow:${s.eggComplete}; --icon-top:${s.iconTop}; --icon-bottom:${s.iconBottom}; --icon-shadow:${s.iconShadow};" onclick="openSkill(${i})">
          ${state === "locked" ? `<div class="lock-badge">🔒</div>` : ""}

          <div class="icon">
            ${level === 4 ? "👑" : s.emoji}
          </div>

          <div class="skill-name">
            <span class="skill-emoji">${s.emoji}</span>
            <span>${s.name}</span>
          </div>

          <div class="small">${state === "locked" ? "Finish the previous game first" : `Level ${level}/4`}</div>

          <div class="bar">
            <div class="bar-fill" style="width:${progress}%"></div>
          </div>

        </div>
      `;
    });

    document.getElementById("map").innerHTML = html;

    setTimeout(placeOwl, 200);
  }

  function placeOwl(){

    let owl = document.getElementById("owlGuide");
    let nodes = document.querySelectorAll(".node");

    if(!nodes.length) return;

    let first = nodes[0].getBoundingClientRect();
    let container = document.querySelector(".path").getBoundingClientRect();

    owl.style.top = (first.top - container.top + 10) + "px";
  }

  window.openSkill = function(i){

    let nodes = document.querySelectorAll(".node");
    if(!nodes[i]) return;
    if(!isSkillUnlocked(i)) return;

    let rect = nodes[i].getBoundingClientRect();
    let container = document.querySelector(".path").getBoundingClientRect();

    document.getElementById("owlGuide").style.top =
      (rect.top - container.top + 10) + "px";

    if(window.AppState?.setLastSkill){
      AppState.setLastSkill(i);
    }

    if(window.AppEffects?.flash){
      AppEffects.flash("correct");
    }

    if(window.PilingoAudio?.playCorrect){
      PilingoAudio.playCorrect();
    }

    if(window.PilingoAudio?.playGameOpen){
      setTimeout(() => PilingoAudio.playGameOpen(i + 1), 120);
    }

    setTimeout(()=>{

      let url = "game" + (i + 1) + ".html";
      if(i === 0) url += "?v=6";

      if(window.AppState?.go){
        AppState.go(url);
      } else {
        window.location.href = url;
      }

    }, 700);
  };

  render();
  renderGrades();

});

</script>

</body>
</html>
