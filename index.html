<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  margin:0;
  padding:40px;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

h1{ font-size:28px; }

.card{
  background:white;
  max-width:320px;
  margin:15px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.small{
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>🦉 Choose a Skill</h1>

<div class="card" onclick="start(0)">
Animals 🐶
<div class="small">Beginner vocabulary</div>
</div>

<div class="card" onclick="start(1)">
Actions 🏃
<div class="small">Beginner verbs</div>
</div>

<div class="card" onclick="start(2)">
People 👤
<div class="small">Basic communication</div>
</div>

<div class="card" onclick="start(3)">
Food 🍎
<div class="small">Daily vocabulary</div>
</div>

<script>
function start(skill){
  window.location.href = "lesson.html?s=" + skill;
}
</script>

</body>
</html>
