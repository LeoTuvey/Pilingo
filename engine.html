<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owl-Lingo</title>

<style>
body{
margin:0;
font-family: system-ui, Arial;
background:#eef3ff;
}

/* APP HEADER */
header{
background:linear-gradient(135deg,#58cc02,#46a302);
color:white;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.brand span{
font-size:22px;
}

.topStats{
font-size:13px;
opacity:0.95;
}

/* APP WRAPPER */
.app{
max-width:480px;
margin:0 auto;
padding:15px;
}

/* NAV BAR */
.nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
border-radius:14px;
margin:10px 0;
box-shadow:0 4px 15px rgba(0,0,0,0.06);
}

.nav button{
border:none;
background:none;
font-weight:bold;
cursor:pointer;
color:#555;
}

/* SCREEN */
.screen{
display:none;
animation:fade 0.2s ease;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.07);
margin-top:10px;
}

/* LESSON TILE */
.lesson{
padding:14px;
border-radius:14px;
background:#fff;
margin:10px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
cursor:pointer;
display:flex;
justify-content:space-between;
}

/* GAME UI */
#visual{
font-size:64px;
margin:10px;
}

button.option{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:2px solid #eee;
background:white;
cursor:pointer;
transition:0.15s;
}

button.option:hover{
border-color:#58cc02;
transform:scale(1.02);
}

/* PROGRESS */
#progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

#bar{
height:100%;
width:0%;
background:#58cc02;
transition:0.3s;
}

/* XP POP */
#xpPopup{
position:fixed;
top:20px;
right:20px;
background:#58cc02;
color:white;
padding:10px 14px;
border-radius:12px;
display:none;
font-weight:bold;
}

/* STATS BOX */
.statBox{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:14px;
color:#444;
}

/* HEARTS */
#hearts{
font-size:20px;
margin:5px 0;
}

/* BUTTON PRIMARY */
.primary{
background:#58cc02;
color:white;
padding:12px;
border:none;
border-radius:14px;
width:100%;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="brand">
<span>🦉</span> Owl-Lingo
</div>
<div class="topStats" id="topStats">XP: 0 | 🔥 0</div>
</header>

<div class="app">

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('lessons')">Lessons</button>
<button onclick="show('profile')">Profile</button>
</div>

<div id="xpPopup">+10 XP</div>

<!-- HOME -->
<div id="home" class="screen active">
<div class="card">
<h2>Welcome 👋</h2>
<p>Continue your learning streak!</p>
<button class="primary" onclick="startLesson()">Start Learning</button>
</div>
</div>

<!-- LESSONS -->
<div id="lessons" class="screen">

<div class="lesson" onclick="startLesson(0)">
Animals 🐶
<span>▶</span>
</div>

<div class="lesson" onclick="startLesson(1)">
Actions 🏃
<span>▶</span>
</div>

<div class="lesson" onclick="startLesson(2)">
This / That 👉
<span>▶</span>
</div>

</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="card">

<div class="statBox">
<div id="hearts"></div>
<div id="xpMini"></div>
</div>

<div id="progress"><div id="bar"></div></div>

<div id="visual"></div>
<h2 id="question"></h2>

<div id="options"></div>
</div>

</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<div class="card">
<h2>Profile</h2>
<div id="stats"></div>
</div>
</div>

</div>

<script>

let course = localStorage.getItem("course") || "en-ku";

let xpKey = course+"_xp";
let streakKey = course+"_streak";

let xp = parseInt(localStorage.getItem(xpKey) || 0);
let streak = parseInt(localStorage.getItem(streakKey) || 0);

let lessonIndex = 0;
let qIndex = 0;
let hearts = 5;

const lessons = [
{
name:"Animals",
questions:[
{q:"What is this?",visual:"🐶",options:["Dog","Cat","Bird"],answer:0},
{q:"What is this?",visual:"🐱",options:["Cat","Dog","Fish"],answer:0}
]
},
{
name:"Actions",
questions:[
{q:"What is he doing?",visual:"🏃",options:["Running","Eating","Sleeping"],answer:0}
]
},
{
name:"This / That",
questions:[
{q:"What is this?",visual:"👈",options:["This","That","He"],answer:0}
]
}
];

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function updateTop(){
document.getElementById("topStats").innerText =
"XP: "+xp+" | 🔥 "+streak;
}

function popup(){
let p=document.getElementById("xpPopup");
p.style.display="block";
setTimeout(()=>p.style.display="none",700);
}

function renderHearts(){
document.getElementById("hearts").innerHTML =
"❤️".repeat(hearts)+"🖤".repeat(5-hearts);
}

function startLesson(i=0){
lessonIndex=i;
qIndex=0;
hearts=5;
show("game");
load();
}

function load(){
renderHearts();

let q = lessons[lessonIndex].questions[qIndex];

document.getElementById("visual").innerText=q.visual;
document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((o,i)=>{
html+=`<button class="option" onclick="check(${i})">${o}</button>`;
});

document.getElementById("options").innerHTML=html;

let percent=(qIndex/q.options.length)*100;
document.getElementById("bar").style.width=percent+"%";
}

function check(i){
let q = lessons[lessonIndex].questions[qIndex];

if(i===q.answer){

xp+=10;
localStorage.setItem(xpKey,xp);
popup();

qIndex++;

if(qIndex<lessons[lessonIndex].questions.length){
load();
}else{
finish();
}

}else{
hearts--;
renderHearts();
if(hearts<=0){
alert("Game Over");
show("home");
}
}

updateTop();
}

function finish(){
streak++;
localStorage.setItem(streakKey,streak);
show("home");
updateTop();
}

updateTop();

</script>

</body>
</html>
