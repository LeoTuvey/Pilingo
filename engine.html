<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Engine</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f9ff;
text-align:center;
}

.card{
max-width:550px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-top:30px;
}

#visual{
font-size:60px;
margin:10px;
}

#hearts{
font-size:24px;
}

#progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

#bar{
height:100%;
width:0%;
background:#4caf50;
}

button{
display:block;
width:90%;
margin:10px auto;
padding:15px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
}
</style>
</head>

<body>

<div class="card">

<div id="hearts"></div>
<div id="progress"><div id="bar"></div></div>

<h2 id="question"></h2>
<div id="visual"></div>
<div id="options"></div>
<div id="feedback"></div>

</div>

<script>

/////////////////////////////////////
// COURSE SYSTEM
/////////////////////////////////////

let course = localStorage.getItem("course") || "en-ku";

function t(en,ku,sv){
if(course==="en-ku") return ku;
if(course==="en-sv") return sv;
return en;
}

/////////////////////////////////////
// GLOBAL DATA (ALL LESSONS)
/////////////////////////////////////

const lessons = [

{
name:"Animals",
questions:[
{q:"What is this?",visual:"🐶",options:["Dog","Cat","Bird"],answer:0},
{q:"What is this?",visual:"🐱",options:["Cat","Dog","Fish"],answer:0}
]
},

{
name:"Actions",
questions:[
{q:"What is he doing?",visual:"🍽️",options:["Eating","Sleeping","Running"],answer:0},
{q:"What is she doing?",visual:"📖",options:["Reading","Eating","Swimming"],answer:0}
]
},

{
name:"This / That",
questions:[
{q:"What is this?",visual:"👈",options:["This","That","He"],answer:0},
{q:"What is that?",visual:"👉",options:["This","That","She"],answer:1}
]
}

];

/////////////////////////////////////
// STATE
/////////////////////////////////////

let lessonIndex = 0;
let qIndex = 0;
let hearts = 5;

/////////////////////////////////////
// UI
/////////////////////////////////////

function renderHearts(){
document.getElementById("hearts").innerHTML =
"❤️".repeat(hearts)+"🖤".repeat(5-hearts);
}

function updateProgress(){
let total = lessons[lessonIndex].questions.length;
let percent = (qIndex/total)*100;
document.getElementById("bar").style.width = percent + "%";
}

/////////////////////////////////////
// LOAD QUESTION
/////////////////////////////////////

function load(){
renderHearts();

let q = lessons[lessonIndex].questions[qIndex];

document.getElementById("question").innerText = q.q;
document.getElementById("visual").innerText = q.visual;

let html="";
q.options.forEach((o,i)=>{
html+=`<button onclick="check(${i})">${o}</button>`;
});

document.getElementById("options").innerHTML=html;
updateProgress();
}

/////////////////////////////////////
// CHECK
/////////////////////////////////////

function check(i){

let q = lessons[lessonIndex].questions[qIndex];

if(i===q.answer){

qIndex++;

if(qIndex<lessons[lessonIndex].questions.length){
load();
}else{
nextLesson();
}

}else{

hearts--;
renderHearts();

if(hearts<=0){
alert("Game Over");
location.reload();
}
}
}

/////////////////////////////////////
// NEXT LESSON
/////////////////////////////////////

function nextLesson(){

lessonIndex++;
qIndex=0;

if(lessonIndex>=lessons.length){
alert("🎉 All lessons completed!");
return;
}

load();
}

/////////////////////////////////////
// START
/////////////////////////////////////

load();

</script>

</body>
</html>
