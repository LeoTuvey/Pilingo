<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Lesson 6: Listening</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f9ff;
text-align:center;
margin:0;
padding:20px;
}

.card{
background:white;
max-width:550px;
margin:auto;
padding:24px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#hearts{
font-size:28px;
margin-bottom:10px;
}

#progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:16px;
}

#bar{
height:100%;
width:0%;
background:#4caf50;
}

#visual{
font-size:78px;
line-height:1;
margin:12px 0 16px;
}

button{
display:block;
width:90%;
margin:10px auto;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
cursor:pointer;
}

.listen{
background:#58cc02;
}

#feedback{
min-height:24px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
<div id="hearts"></div>
<div id="progress"><div id="bar"></div></div>
<div id="visual" aria-hidden="true">🔊</div>
<h2>Listen and choose</h2>
<button class="listen" onclick="speakCurrent()">Replay sound</button>
<div id="options"></div>
<div id="feedback"></div>
</div>

<script src="engine-core.js"></script>
<script src="pilingo-sounds.js"></script>
<script src="pwa.js"></script>
<script>

let course = Engine.getCourse();
let hearts = Engine.getHearts();

let questions=[
{ text:"cat", visual:"🐱", options:["Cat","Dog","Bird"], answer:0 },
{ text:"dog", visual:"🐶", options:["Bird","Dog","Cat"], answer:1 },
{ text:"apple", visual:"🍎", options:["Apple","Cat","Run"], answer:0 },
{ text:"run", visual:"🏃", options:["Read","Sleep","Run"], answer:2 }
];

let current=0;

function renderHearts(){
let html="";
for(let i=0;i<hearts;i++) html+="❤️ ";
for(let i=hearts;i<5;i++) html+="🖤 ";
document.getElementById("hearts").innerHTML=html;
}

function update(){
document.getElementById("bar").style.width=(current/questions.length)*100+"%";
}

function speak(text){
PilingoAudio.speak(text);
}

function speakCurrent(){
speak(questions[current].text);
}

function load(){
renderHearts();
update();
let q=questions[current];
document.getElementById("visual").innerText=q.visual;
document.getElementById("options").innerHTML=
q.options.map((o,i)=>`<button onclick="check(${i})">${o}</button>`).join("");
document.getElementById("feedback").innerText="";
setTimeout(speakCurrent,250);
}

function check(i){
if(i===questions[current].answer){
PilingoAudio.playCorrect();
document.getElementById("feedback").innerText="✅ Correct";
current++;
setTimeout(()=>{
if(current<questions.length){
load();
}else{
finish();
}
},650);
}else{
PilingoAudio.playWrong();
hearts=Engine.loseHeart();
renderHearts();
document.getElementById("feedback").innerText="❌ Try again";
if(hearts<=0) gameOver();
}
}

function showLessonComplete(){
  const card = document.querySelector(".card");
  if(!card) return;
  card.innerHTML = `
<h1>🐯</h1>
<h2>Great job!</h2>
<p>You finished this lesson.</p>
<p>Tu pir baş bûyî!</p>
`;
}

function gameOver(){
document.body.innerHTML=`
<div class="card">
<h1>💔</h1>
<h2>Out of hearts</h2>
<button onclick="location.reload()">Try again</button>
</div>`;
}

function finish(){
PilingoAudio.playLessonComplete();
  showLessonComplete();

if(typeof Engine.completeSkill==="function"){
Engine.completeSkill(5,10);
}else{
let unlockKey=course+"_unlocked";
Engine.addXP(10);
let unlocked=JSON.parse(localStorage.getItem(unlockKey)||"[true,false,false,false,false,false,false]");
unlocked[6]=true;
localStorage.setItem(unlockKey,JSON.stringify(unlocked));
localStorage.setItem("skill_5","4");
localStorage.setItem("skill_6","1");
Engine.resetHearts();
}
document.getElementById("bar").style.width="100%";
setTimeout(()=>window.location.href="engine.html",2200);
}

load();

</script>
</body>
</html>
