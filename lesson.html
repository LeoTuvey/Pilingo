<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Lesson</title>

<style>
body{
font-family:Arial;
background:#f5f9ff;
text-align:center;
margin:0;
padding:20px;
}

.card{
background:white;
max-width:550px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#bar{
height:10px;
background:#4caf50;
width:0%;
transition:0.3s;
}

button{
display:block;
width:90%;
margin:10px auto;
padding:14px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<div id="options"></div>

<div id="bar"></div>

</div>

<script src="engine-core.js"></script>
<script src="vocab_a1.js"></script>

<script>

let course = Engine.getCourse();
let hearts = Engine.getHearts();

let params = new URLSearchParams(location.search);
let skill = params.get("skill");

// --------------------
// GET VOCAB BY SKILL
// --------------------
function getPool(){
  return VOCAB_A1[skill] || VOCAB_A1.animals;
}

// --------------------
// QUESTION ENGINE
// --------------------
let questions = [];
let current = 0;

function generate(){

let pool = getPool();

for(let i=0;i<5;i++){

let correct = pool[Math.floor(Math.random()*pool.length)];

let options = [correct];

while(options.length < 3){
let r = pool[Math.floor(Math.random()*pool.length)];
if(!options.includes(r)) options.push(r);
}

options.sort(()=>Math.random()-0.5);

questions.push({correct, options});

}

}

// --------------------
// RENDER
// --------------------
function load(){

let q = questions[current];

document.getElementById("question").innerText =
"Select: " + q.correct.en;

let html = "";

q.options.forEach((opt,i)=>{
html += `<button onclick="check(${i})">${opt.en}</button>`;
});

document.getElementById("options").innerHTML = html;

updateBar();

}

function updateBar(){
document.getElementById("bar").style.width =
(current/questions.length)*100 + "%";
}

// --------------------
// CHECK
// --------------------
function check(i){

let q = questions[current];

if(q.options[i] === q.correct){

current++;

if(current < questions.length){
load();
}else{
finish();
}

}else{

hearts = Engine.loseHeart();

if(hearts <= 0){
alert("Game Over");
location.reload();
}
}

}

// --------------------
// FINISH
// --------------------
function finish(){

Engine.addXP(10);
Engine.resetHearts();

// unlock next skill automatically
Engine.updateStreak();

setTimeout(()=>{
window.location.href = "engine.html";
},800);

}

// --------------------
// START
// --------------------
generate();
load();

</script>

</body>
</html>
