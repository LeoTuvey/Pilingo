<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 2: Actions</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f9ff;
    text-align:center;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    max-width:550px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#hearts{font-size:28px;margin-bottom:10px;}

#progress{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:10px;
}

#bar{height:100%;width:0%;background:#4caf50;}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px;
    border:none;
    background:#1976d2;
    color:white;
}

#feedback{min-height:20px;font-weight:bold;}
</style>
</head>

<body>

<div class="card">

<div id="hearts"></div>
<div id="progress"><div id="bar"></div></div>

<h2 id="question"></h2>
<div id="options"></div>
<div id="feedback"></div>

</div>

<script src="engine-core.js"></script>

<script>

let course = Engine.getCourse();
let hearts = Engine.getHearts();

function renderHearts(){
    let html = "";
    for(let i=0;i<hearts;i++) html+="❤️ ";
    for(let i=hearts;i<5;i++) html+="🖤 ";
    document.getElementById("hearts").innerHTML = html;
}

function playSound(type){
    let a = new Audio();
    a.src = type==="correct"
        ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
        : "https://actions.google.com/sounds/v1/cartoon/boing.ogg";
    a.play();
}

function t(en,ku,sv){
    if(course==="en-ku") return ku;
    if(course==="en-sv") return sv;
    return en;
}

let questions = [
{
q:t("What is he doing?","Ew çi dike?","Vad gör han?"),
options:[
t("Eating","Xwarin","Äter"),
t("Sleeping","Razane","Sover"),
t("Running","Revîn","Springer")
],
answer:0
},
{
q:t("What is she doing?","Ew çi dike?","Vad gör hon?"),
options:[
t("Reading","Xwendin","Läser"),
t("Eating","Xwarin","Äter"),
t("Swimming","Avjîn","Simmar")
],
answer:0
}
];

let current=0;

function update(){
document.getElementById("bar").style.width =
(current/questions.length)*100 + "%";
}

function load(){
renderHearts();
update();

let q=questions[current];

document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((o,i)=>{
html+=`<button onclick="check(${i})">${o}</button>`;
});

document.getElementById("options").innerHTML=html;
}

function check(i){
let q=questions[current];

if(i===q.answer){

playSound("correct");
current++;

setTimeout(()=>{
if(current<questions.length){
load();
}else{
finish();
}
},600);

}else{

hearts=Engine.loseHeart();
renderHearts();
playSound("wrong");

if(hearts<=0) gameOver();
}
}

function finish(){
Engine.addXP(10);
Engine.unlockLevel(2);
Engine.resetHearts();

setTimeout(()=>location.href="engine.html",1000);
}

function gameOver(){
document.body.innerHTML=`
<div class="card">
<h1>💔</h1>
<button onclick="location.reload()">Retry</button>
</div>`;
}

load();

</script>

</body>
</html>
