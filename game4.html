<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game 4</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f5f9ff;
text-align:center;
margin:0;
padding:20px;
}

.card{
background:white;
max-width:550px;
margin:auto;
padding:24px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

#visual{
font-size:82px;
line-height:1;
margin:12px 0 16px;
}

#hearts{
font-size:28px;
margin-bottom:10px;
}

#progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:16px;
}

#bar{
height:100%;
width:0%;
background:#4caf50;
}

#feedback{
min-height:24px;
font-weight:bold;
}

button{
display:block;
width:90%;
margin:10px auto;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<div id="hearts"></div>
<div id="progress"><div id="bar"></div></div>
<div id="visual" aria-hidden="true"></div>
<h2 id="q"></h2>
<div id="opt"></div>
<div id="feedback"></div>
</div>

<script src="engine-core.js"></script>
<script>

let course=window.Engine?.getCourse ? Engine.getCourse() : (localStorage.getItem("course")||"en-ku");
let hearts=window.Engine?.getHearts ? Engine.getHearts() : parseInt(localStorage.getItem("hearts")||"5",10);

function t(e,k,s){
if(course==="en-ku") return k;
if(course==="en-sv") return s;
return e;
}

function playSound(type){
new Audio(type==="correct"
?"https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
:"https://actions.google.com/sounds/v1/cartoon/boing.ogg").play().catch(()=>{});
}

let q=[{
q:t("Choose article","Hilbijêre","Välj artikel"),
visual:"🍎",
opt:["a","an","the"],
a:1
},{
q:t("A dog","Kûçikek","En hund"),
visual:"🐶",
opt:["a dog","an dog","the dog"],
a:0
},{
q:t("An apple","Sêvek","Ett äpple"),
visual:"🍎",
opt:["a apple","an apple","the apple"],
a:1
},{
q:t("The cat","Pisîkê","Katten"),
visual:"🐱",
opt:["a cat","an cat","the cat"],
a:2
}];

let current=0;

function renderHearts(){
let html="";
for(let i=0;i<hearts;i++) html+="❤️ ";
for(let i=hearts;i<5;i++) html+="🖤 ";
document.getElementById("hearts").innerHTML=html;
}

function update(){
document.getElementById("bar").style.width=(current/q.length)*100+"%";
}

function load(){
renderHearts();
update();
let x=q[current];
document.getElementById("visual").innerText=x.visual;
document.getElementById("q").innerText=x.q;
document.getElementById("opt").innerHTML=
x.opt.map((o,i)=>`<button onclick="check(${i})">${o}</button>`).join("");
document.getElementById("feedback").innerText="";
}

function check(i){
if(i===q[current].a){
playSound("correct");
document.getElementById("feedback").innerText="✅ Correct";
current++;
setTimeout(()=>{
if(current<q.length){
load();
}else{
finish();
}
},600);
}else{
playSound("wrong");
hearts=window.Engine?.loseHeart ? Engine.loseHeart() : Math.max(0,hearts-1);
localStorage.setItem("hearts",hearts);
renderHearts();
document.getElementById("feedback").innerText="❌ Try again";
if(hearts<=0) gameOver();
}
}

function gameOver(){
document.body.innerHTML=`
<div class="card">
<h1>💔</h1>
<h2>Out of hearts</h2>
<button onclick="location.reload()">Try again</button>
</div>`;
}

function finish(){
let c=localStorage.getItem("course")||"en-ku";

let xp=parseInt(localStorage.getItem(c+"_xp")||"0");
localStorage.setItem(c+"_xp",xp+10);

let u=JSON.parse(localStorage.getItem(c+"_unlocked")||"[true,false,false,false,false,false,false]");
u[4]=true;
localStorage.setItem(c+"_unlocked",JSON.stringify(u));
localStorage.setItem("skill_3","4");
localStorage.setItem("skill_4","1");
if(window.Engine?.resetHearts) Engine.resetHearts();
document.getElementById("bar").style.width="100%";

setTimeout(()=>window.location.href="engine.html",700);
}

load();

</script>

</body>
</html>
