services:
  - type: web
    name: pilingo
    runtime: node
    plan: free
    buildCommand: "echo Pilingo build ready"
    startCommand: "node server.js"
    healthCheckPath: /api/health
    disk:
      name: pilingo-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_FROM
        sync: false
