<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Engine</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f9ff;
    text-align:center;
}

header{
    background:#1976d2;
    color:white;
    padding:15px;
    font-size:20px;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    margin:15px 0;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.locked{
    opacity:0.4;
    pointer-events:none;
}

button{
    margin-top:20px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#1976d2;
    color:white;
}
</style>
</head>

<body>

<header>
🦉 Owl-Lingo
</header>

<div class="container">

<h2>Choose your lesson</h2>

<div id="menu"></div>

<p>⭐ XP: <span id="xp">0</span></p>

</div>

<script>

// XP + progress system
let xp = parseInt(localStorage.getItem("xp") || "0");

let unlocked = JSON.parse(localStorage.getItem("unlocked") || "[true,false,false,false,false,false,false]");

let lessons = [
"game1.html",
"game2.html",
"game3.html",
"game4.html",
"game5.html",
"game6.html",
"game7.html"
];

function render(){

let html = "";

lessons.forEach((g,i)=>{

if(unlocked[i]){
html += `
<div class="card" onclick="start(${i})">
Lesson ${i+1}
</div>`;
}else{
html += `
<div class="card locked">
🔒 Locked
</div>`;
}

});

document.getElementById("menu").innerHTML = html;
document.getElementById("xp").innerText = xp;

}

function start(i){
window.location.href = lessons[i];
}

render();

</script>

</body>
</html>
