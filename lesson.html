<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

button{
  padding: 15px;
  font-size: 18px;
  background: #58cc02;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🦉 Lesson Page</h1>

<!-- 🔴 THIS IS THE BUTTON YOU WERE MISSING -->
<button onclick="runFinishLogic()">
  Finish Lesson (+10 XP)
</button>

<script src="engine-core.js"></script>

<script>
function runFinishLogic(){

  console.log("🏆 runFinishLogic triggered");

  if(!window.Engine){
    alert("Engine not loaded!");
    return;
  }

  const oldLevel = Engine.getLevel();
  const xpReward = 10;

  Engine.addXP(xpReward);
  Engine.updateStreak();
  Engine.resetHearts();

  const newLevel = Engine.getLevel();

  console.log("OLD:", oldLevel);
  console.log("NEW:", newLevel);

  if(newLevel > oldLevel){
    alert("🏆 LEVEL UP!");
  } else {
    alert("+10 XP!");
  }
}
</script>

</body>
</html>
