<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owl-Lingo</title>

<style>
body{
margin:0;
font-family: system-ui, Arial;
background:#f2f7ff;
text-align:center;
}

/* TOP BAR */
header{
background:#58cc02;
color:white;
padding:14px 16px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

header .left{
display:flex;
align-items:center;
gap:10px;
}

.owl{
font-size:22px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-3px);}
}

/* STATS */
#stats{
font-size:14px;
opacity:0.95;
}

/* MAIN CARD */
.card{
max-width:520px;
margin:25px auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

/* VISUAL */
#visual{
font-size:72px;
margin:10px;
}

/* QUESTION */
#question{
font-size:20px;
margin:10px 0;
}

/* OPTIONS */
button{
width:100%;
padding:14px;
margin:10px 0;
border-radius:14px;
border:2px solid #e5e5e5;
background:white;
font-size:16px;
cursor:pointer;
transition:0.15s;
}

button:hover{
transform:scale(1.02);
border-color:#58cc02;
}

/* FEEDBACK */
#feedback{
min-height:22px;
font-weight:bold;
margin-top:8px;
}

/* PROGRESS */
#progress{
height:12px;
background:#e6e6e6;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

#bar{
height:100%;
width:0%;
background:#58cc02;
transition:0.3s;
}

/* XP POPUP */
#xpPopup{
position:fixed;
top:20px;
right:20px;
background:#58cc02;
color:white;
padding:10px 14px;
border-radius:12px;
font-weight:bold;
display:none;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* HEARTS */
#hearts{
font-size:22px;
margin-top:5px;
}

/* SCREEN SHAKE (wrong answer feel) */
.shake{
animation:shake 0.2s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<header>
<div class="left">
<div class="owl">🦉</div>
<div>Owl-Lingo</div>
</div>
<div id="stats">⭐ XP: 0 | 🔥 0</div>
</header>

<div id="hearts"></div>

<div id="xpPopup">+10 XP</div>

<div class="card">

<div id="progress"><div id="bar"></div></div>

<div id="visual"></div>
<h2 id="question"></h2>

<div id="options"></div>
<div id="feedback"></div>

</div>

<script>

///////////////////////
// COURSE SYSTEM
///////////////////////

let course = localStorage.getItem("course") || "en-ku";

///////////////////////
// STATE
///////////////////////

let lessonIndex = 0;
let qIndex = 0;
let hearts = 5;

let xpKey = course+"_xp";
let streakKey = course+"_streak";

let xp = parseInt(localStorage.getItem(xpKey) || "0");
let streak = parseInt(localStorage.getItem(streakKey) || "0");

///////////////////////
// DATA
///////////////////////

const lessons = [
{
name:"Animals",
questions:[
{q:"What is this?",visual:"🐶",options:["Dog","Cat","Bird"],answer:0},
{q:"What is this?",visual:"🐱",options:["Cat","Dog","Fish"],answer:0}
]
},
{
name:"Actions",
questions:[
{q:"What is he doing?",visual:"🍽️",options:["Eating","Sleeping","Running"],answer:0},
{q:"What is she doing?",visual:"📖",options:["Reading","Eating","Swimming"],answer:0}
]
},
{
name:"This / That",
questions:[
{q:"What is this?",visual:"👈",options:["This","That","He"],answer:0},
{q:"What is that?",visual:"👉",options:["This","That","She"],answer:1}
]
}
];

///////////////////////
// UI HELPERS
///////////////////////

function updateStats(){
document.getElementById("stats").innerText =
"⭐ XP: " + xp + " | 🔥 " + streak;
}

function showXP(){
let p=document.getElementById("xpPopup");
p.style.display="block";
setTimeout(()=>p.style.display="none",700);
}

function renderHearts(){
document.getElementById("hearts").innerHTML =
"❤️".repeat(hearts)+"🖤".repeat(5-hearts);
}

function updateProgress(){
let total = lessons[lessonIndex].questions.length;
let percent = (qIndex/total)*100;
document.getElementById("bar").style.width = percent + "%";
}

///////////////////////
// LOAD QUESTION
///////////////////////

function load(){

document.body.classList.remove("shake");

updateStats();
renderHearts();

let q = lessons[lessonIndex].questions[qIndex];

document.getElementById("question").innerText = q.q;
document.getElementById("visual").innerText = q.visual;

let html="";
q.options.forEach((o,i)=>{
html+=`<button onclick="check(${i})">${o}</button>`;
});

document.getElementById("options").innerHTML=html;
document.getElementById("feedback").innerHTML="";

updateProgress();
}

///////////////////////
// CHECK ANSWER
///////////////////////

function check(i){

let q = lessons[lessonIndex].questions[qIndex];

if(i===q.answer){

xp += 10;
localStorage.setItem(xpKey,xp);

showXP();

qIndex++;

if(qIndex<lessons[lessonIndex].questions.length){
load();
}else{
nextLesson();
}

}else{

hearts--;
renderHearts();

document.body.classList.add("shake");

document.getElementById("feedback").innerText =
"❌ Try again";

if(hearts<=0){
alert("Game Over");
location.reload();
}
}

updateStats();
}

///////////////////////
// NEXT LESSON
///////////////////////

function nextLesson(){

lessonIndex++;
qIndex=0;

streak++;
localStorage.setItem(streakKey,streak);

if(lessonIndex>=lessons.length){
alert("🎉 You completed Owl-Lingo!");
return;
}

load();
}

///////////////////////
// START
///////////////////////

load();

</script>

</body>
</html>
