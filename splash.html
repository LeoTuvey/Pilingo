<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">

<title>Pilingo</title>

<style>
body{
  margin:0;
  background: linear-gradient(135deg,#58cc02,#1cb0f6);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  color:white;
}

/* CENTER CONTENT */
.container{
  text-align:center;
  animation:fadeIn 1s ease;
}

/* OWL */
#owl{
  font-size:80px;
  animation:bounce 1.2s infinite ease-in-out;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* TITLE */
h1{
  margin-top:10px;
  font-size:28px;
  letter-spacing:1px;
}

/* LOADING BAR */
.bar{
  width:200px;
  height:6px;
  background:rgba(255,255,255,0.3);
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:white;
  animation:load 2s forwards;
}

@keyframes load{
  to{width:100%;}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<div id="owl">🐯</div>
<h1>Pilingo</h1>
<p>Learning made simple</p>

<div class="bar">
  <div class="fill"></div>
</div>

</div>

<script src="pwa.js"></script>
<script>
setTimeout(()=>{
  window.location.href = "index.html";
}, 2200);
</script>

</body>
</html>
