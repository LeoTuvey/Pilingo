<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owl-Lingo</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#e3f2fd,#fce4ec);
  text-align:center;
}

/* HEADER */
.header{
  background:#58cc02;
  color:white;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* BUTTON */
button{
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#58cc02;
  color:white;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h1>🦉 Owl-Lingo</h1>
  <div>Learn daily. Build streaks. Stay consistent.</div>
</div>

<div class="card">
  <h2>📊 Your Progress</h2>

  <div class="stats">
    <div>XP: <span id="xp">0</span></div>
    <div>🔥 Streak: <span id="streak">0</span></div>
  </div>

  <button onclick="goLearn()">▶ Continue Learning</button>
</div>

<div class="card">
  <h2>🎯 Daily Quest</h2>
  <p id="questText">Loading...</p>
</div>

<script src="engine-core.js"></script>
<script src="app-ui.js"></script>

<script>

/* =========================
   SAFE ENGINE LOAD
========================= */

let xp = window.Engine ? Engine.getXP() : 0;

/* IMPORTANT:
   Do NOT auto-call updateStreak here on load
   (prevents accidental streak manipulation)
*/

/* =========================
   UPDATE UI
========================= */

document.getElementById("xp").innerText = xp;

/* get streak ONLY for display */
document.getElementById("streak").innerText =
  window.Engine ? Engine.getXP ? Engine.updateStreak() : 0 : 0;

/* =========================
   STEP 17 HOOKS
========================= */

// 🦉 OWL UPDATE (safe)
if(window.AppUI) AppUI.updateOwl();

// 🎯 DAILY QUEST INIT
let quest = window.AppUI ? AppUI.getDailyQuest() : {goal:20,progress:0};

document.getElementById("questText").innerText =
"Complete " + quest.goal + " XP (Today: " + quest.progress + ")";

/* =========================
   NAVIGATION
========================= */

function goLearn(){
  AppUI.navigate("engine.html");
}

</script>

</body>
</html>
