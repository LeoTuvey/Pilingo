<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Engine</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg,#e3f2fd,#fce4ec);
    text-align:center;
}

header{
    background:#1976d2;
    color:white;
    padding:15px;
    font-size:20px;
}

#xpBox{
    margin:5px;
    font-size:18px;
    font-weight:bold;
}

#streakBox{
    margin:5px;
    font-size:16px;
    font-weight:bold;
    color:#ff6f00;
}

/* MAP */
.map{
    max-width:500px;
    margin:auto;
    padding:20px;
    position:relative;
}

.line{
    position:absolute;
    width:4px;
    background:#ccc;
    top:0;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    z-index:0;
}

/* NODE */
.node{
    width:120px;
    height:120px;
    border-radius:50%;
    background:white;
    margin:40px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    cursor:pointer;
    position:relative;
    z-index:1;
    transition:0.2s;
}

.node:hover{
    transform:scale(1.05);
}

.locked{
    opacity:0.4;
    pointer-events:none;
}

/* COLORS */
.green{ border:4px solid #4caf50; }
.orange{ border:4px solid #ff9800; }
.blue{ border:4px solid #2196f3; }
.purple{ border:4px solid #9c27b0; }

.small{
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<header>🦉 Owl-Lingo Learning Path</header>

<div id="xpBox">⭐ XP: 0</div>
<div id="streakBox">🔥 Streak: 0</div>

<div class="map">

<div class="line"></div>

<div id="levels"></div>

</div>

<script>

/////////////////////////////////////
// XP SYSTEM
/////////////////////////////////////

let xp = parseInt(localStorage.getItem("xp") || "0");

/////////////////////////////////////
// STREAK SYSTEM (FULL)
/////////////////////////////////////

let today = new Date().toDateString();

let lastDay = localStorage.getItem("lastDay");
let streak = parseInt(localStorage.getItem("streak") || "0");

if(lastDay === today){
    // already counted today
}else{
    if(lastDay){
        let prev = new Date(lastDay);
        let diff = (new Date(today) - prev) / (1000 * 60 * 60 * 24);

        if(diff === 1){
            streak += 1;
        }else{
            streak = 1;
        }
    }else{
        streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDay", today);
}

/////////////////////////////////////
// UNLOCK SYSTEM
/////////////////////////////////////

let unlocked = JSON.parse(
    localStorage.getItem("unlocked") ||
    "[true,false,false,false,false,false,false]"
);

/////////////////////////////////////
// DISPLAY
/////////////////////////////////////

document.getElementById("xpBox").innerText = "⭐ XP: " + xp;
document.getElementById("streakBox").innerText = "🔥 Streak: " + streak;

/////////////////////////////////////
// LEVELS
/////////////////////////////////////

let levels = [
{ name:"Animals", file:"game1.html", color:"green" },
{ name:"Actions", file:"game2.html", color:"green" },
{ name:"This / That", file:"game3.html", color:"orange" },
{ name:"A / An", file:"game4.html", color:"blue" },
{ name:"Plural", file:"game5.html", color:"blue" },
{ name:"Listening", file:"game6.html", color:"purple" },
{ name:"Final Test", file:"game7.html", color:"purple" }
];

/////////////////////////////////////
// RENDER MAP
/////////////////////////////////////

let html = "";

levels.forEach((lvl,i)=>{

let locked = !unlocked[i];

html += `
<div class="node ${lvl.color} ${locked ? "locked":""}" onclick="go(${i})">
<div>🦉</div>
<div>${lvl.name}</div>
<div class="small">Level ${i+1}</div>
</div>
`;

});

document.getElementById("levels").innerHTML = html;

/////////////////////////////////////
// NAVIGATION
/////////////////////////////////////

function go(i){
    window.location.href = levels[i].file;
}

</script>

</body>
</html>
