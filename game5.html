<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Lesson 5: Numbers</title>
<style>
body{
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top right, rgba(255,182,193,0.34), transparent 24%),
linear-gradient(180deg, #fff3f8 0%, #ffe4ef 50%, #ffd0e1 100%);
text-align:center;
margin:0;
padding:20px;
}

.card{
background:rgba(255,255,255,0.95);
max-width:550px;
margin:auto;
padding:24px;
border-radius:15px;
border:2px solid #f2bfd0;
box-shadow:0 10px 24px rgba(156,66,101,0.14);
}

.top-actions{
display:flex;
justify-content:flex-start;
margin-bottom:12px;
}

.back-button{
width:auto;
margin:0;
padding:12px 16px;
font-size:15px;
border:none;
border-radius:14px;
background:#fff4f8;
color:#c34c79;
cursor:pointer;
box-shadow:0 4px 0 #f2bfd0;
}

#hearts{
font-size:28px;
margin-bottom:10px;
}

#progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:16px;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg, #ff7aa8, #ffb0c9);
}

#visual{
font-size:78px;
line-height:1.15;
margin:12px 0 16px;
}

button{
display:block;
width:90%;
margin:10px auto;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#e75b90;
color:white;
cursor:pointer;
box-shadow:0 4px 0 #c44274;
}

button.correct{
background:#58cc02 !important;
box-shadow:0 4px 0 #46a302 !important;
}

#feedback{
min-height:24px;
font-weight:bold;
}
</style>
</head>
<body>
<script src="pilingo-auth.js"></script>
<script>PilingoAuth.requireAccount();</script>
<script src="pilingo-notify.js"></script>
<script>PilingoNotify.track("page_open", "Opened Game 5", { page:"game5" });</script>

<div class="card">
<div class="top-actions"><button class="back-button" onclick="goBackToGames()">← Choose another game</button></div>
<div id="hearts"></div>
<div id="progress"><div id="bar"></div></div>
<div id="visual" aria-hidden="true"></div>
<h2 id="q"></h2>
<div id="options"></div>
<div id="feedback"></div>
</div>

<script src="engine-core.js"></script>
<script src="pilingo-sounds.js"></script>
<script src="pwa.js"></script>
<script>

let course = Engine.getCourse();
let hearts = Engine.getHearts();

function goBackToGames(){
window.location.href="engine.html";
}

function t(en,ku){
return ku;
}

let questions=[
{
q:t("One apple","Yek sêv","Ett äpple"),
visual:"🍎",
options:[
t("One apple","Yek sêv","Ett äpple"),
t("Two apples","Du sêv","Två äpplen"),
t("Three apples","Sê sêv","Tre äpplen")
],
answer:0
},
{
q:t("Two cats","Du pisîk","Två katter"),
visual:"🐱 🐱",
options:[
t("One cat","Yek pisîk","En katt"),
t("Two cats","Du pisîk","Två katter"),
t("Three cats","Sê pisîk","Tre katter")
],
answer:1
},
{
q:t("Three birds","Sê teyr","Tre fåglar"),
visual:"🐦 🐦 🐦",
options:[
t("Three birds","Sê teyr","Tre fåglar"),
t("Two birds","Du teyr","Två fåglar"),
t("One bird","Yek teyr","En fågel")
],
answer:0
},
{
q:t("Choose two","Du hilbijêre","Välj två"),
visual:"🍎 🍎",
options:[
t("One","Yek","Ett"),
t("Two","Du","Två"),
t("Three","Sê","Tre")
],
answer:1
}
];

let current=0;

function renderHearts(){
let html="";
for(let i=0;i<hearts;i++) html+="❤️ ";
for(let i=hearts;i<5;i++) html+="🖤 ";
document.getElementById("hearts").innerHTML=html;
}

function update(){
document.getElementById("bar").style.width=(current/questions.length)*100+"%";
}

function load(){
renderHearts();
update();
let q=questions[current];
document.getElementById("visual").innerText=q.visual;
document.getElementById("q").innerText=q.q;
document.getElementById("options").innerHTML=
q.options.map((o,i)=>`<button onclick="check(${i}, this)">${o}</button>`).join("");
document.getElementById("feedback").innerText="";
}

function check(i, button){
if(i===questions[current].answer){
PilingoAudio.playCorrect();
if(button) button.classList.add("correct");
document.getElementById("feedback").innerText="✅ Correct";
current++;
setTimeout(()=>{
if(current<questions.length){
load();
}else{
finish();
}
},650);
}else{
PilingoAudio.playWrong();
hearts=Engine.loseHeart();
renderHearts();
document.getElementById("feedback").innerText="❌ Try again";
if(hearts<=0) gameOver();
}
}

function showLessonComplete(){
  const card = document.querySelector(".card");
  if(!card) return;
  card.innerHTML = `
<h1>🐯</h1>
<h2>Great job!</h2>
<p>You finished this lesson.</p>
`;
}

function gameOver(){
document.body.innerHTML=`
<div class="card">
<h1>💔</h1>
<h2>Out of hearts</h2>
<button onclick="location.reload()">Try again</button>
</div>`;
}

function finish(){
PilingoAudio.playLessonComplete();
  showLessonComplete();
  PilingoAudio.speak("Great job! You finished this lesson.");

if(typeof Engine.completeSkill==="function"){
Engine.completeSkill(4,10);
}else{
let unlockKey=course+"_unlocked";
Engine.addXP(10);
let unlocked=JSON.parse(localStorage.getItem(unlockKey)||"[true,false,false,false,false,false,false]");
unlocked[5]=true;
localStorage.setItem(unlockKey,JSON.stringify(unlocked));
localStorage.setItem("skill_4","4");
localStorage.setItem("skill_5","1");
Engine.resetHearts();
}
document.getElementById("bar").style.width="100%";
setTimeout(()=>window.location.href="engine.html",2200);
}

load();

</script>
</body>
</html>
