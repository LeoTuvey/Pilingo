<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lesson 1</title>

<style>
body{
    font-family: Arial;
    background:#f5f9ff;
    text-align:center;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    max-width:500px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

img{
    width:120px;
    height:120px;
    object-fit:cover;
    margin:10px 0;
}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#1976d2;
    color:white;
    cursor:pointer;
}

#feedback{
    margin-top:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">

<h2 id="question">Loading...</h2>

<img id="image">

<div id="options"></div>

<div id="feedback"></div>

</div>

<script>

/////////////////////////////////////
// COURSE SYSTEM
/////////////////////////////////////

let course = localStorage.getItem("course") || "en-ku";

// language mapping
function t(en, ku, sv){
    if(course === "en-ku") return ku;
    if(course === "en-sv") return sv;
    return en;
}

/////////////////////////////////////
// SPEECH
/////////////////////////////////////

function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    msg.rate = 0.85;
    speechSynthesis.speak(msg);
}

/////////////////////////////////////
// QUESTIONS (COURSE-AWARE)
/////////////////////////////////////

let questions = [
{
img:"https://cdn-icons-png.flaticon.com/512/616/616430.png",
q: t("What is this?","Ev çi ye?","Vad är detta?"),
options:[
t("Dog","Kûçik","Hund"),
t("Cat","Pisîk","Katt"),
t("Bird","Teyr","Fågel")
],
answer:1
},
{
img:"https://cdn-icons-png.flaticon.com/512/616/616408.png",
q: t("What is this?","Ev çi ye?","Vad är detta?"),
options:[
t("Cat","Pisîk","Katt"),
t("Dog","Kûçik","Hund"),
t("Apple","Sêv","Äpple")
],
answer:1
},
{
img:"https://cdn-icons-png.flaticon.com/512/415/415733.png",
q: t("What is this?","Ev çi ye?","Vad är detta?"),
options:[
t("Apple","Sêv","Äpple"),
t("Bird","Teyr","Fågel"),
t("Cat","Pisîk","Katt")
],
answer:0
}
];

let current = 0;

/////////////////////////////////////
// LOAD
/////////////////////////////////////

function load(){

let q = questions[current];

document.getElementById("question").innerText = q.q;
document.getElementById("image").src = q.img;

speak("Question");

let html = "";

q.options.forEach((opt,i)=>{
html += `<button onclick="check(${i})">${opt}</button>`;
});

document.getElementById("options").innerHTML = html;
document.getElementById("feedback").innerHTML = "";
}

load();

/////////////////////////////////////
// CHECK
/////////////////////////////////////

function check(i){

let q = questions[current];

if(i === q.answer){
document.getElementById("feedback").innerText =
t("Correct!","Rast e!","Rätt!");

current++;

setTimeout(()=>{
if(current < questions.length){
load();
}else{
finish();
}
},800);

}else{
document.getElementById("feedback").innerText =
t("Try again","Dîsa biceribîne","Försök igen");
}
}

/////////////////////////////////////
// FINISH
/////////////////////////////////////

function finish(){

// XP per course
let course = localStorage.getItem("course") || "en-ku";
let xpKey = course + "_xp";

let xp = parseInt(localStorage.getItem(xpKey) || "0");
xp += 10;
localStorage.setItem(xpKey, xp);

// unlock next level per course
let unlockKey = course + "_unlocked";
let unlocked = JSON.parse(localStorage.getItem(unlockKey) || "[true,false,false,false,false,false,false]");

unlocked[1] = true;
localStorage.setItem(unlockKey, JSON.stringify(unlocked));

// return
setTimeout(()=>{
window.location.href = "engine.html";
},1000);
}

</script>

</body>
</html>
