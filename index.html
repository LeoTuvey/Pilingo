<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo - Choose Course</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin:0;
    padding:40px;
    background: linear-gradient(135deg,#e3f2fd,#fce4ec);
}

h1{
    font-size:28px;
}

.card{
    background:white;
    max-width:300px;
    margin:15px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.small{
    font-size:13px;
    opacity:0.7;
}
</style>
</head>

<body>

<h1>🦉 Choose Your Course</h1>

<div class="card" onclick="select('en-ku')">
🇬🇧 English → 🟠 Kurdish
<div class="small">Beginner Course</div>
</div>

<div class="card" onclick="select('en-sv')">
🇬🇧 English → 🔵 Swedish
<div class="small">Beginner Course</div>
</div>

<script>

/////////////////////////////////////
// APP VERSION CONTROL (IMPORTANT FIX)
/////////////////////////////////////

const APP_VERSION = "1.0";

function checkVersion(){

    let savedVersion = localStorage.getItem("app_version");

    if(savedVersion !== APP_VERSION){
        localStorage.clear();
        localStorage.setItem("app_version", APP_VERSION);
    }
}

checkVersion();

/////////////////////////////////////
// COURSE SELECT
/////////////////////////////////////

function select(course){

    // save selected course
    localStorage.setItem("course", course);

    /////////////////////////////////////
    // SAFE INITIALIZATION (FIXED)
    /////////////////////////////////////

    if(!localStorage.getItem(course + "_init")){

        localStorage.setItem(course + "_xp", "0");

        // safe unlock system (future-proof)
        const unlocked = [true, ...Array(6).fill(false)];
        localStorage.setItem(course + "_unlocked", JSON.stringify(unlocked));

        localStorage.setItem(course + "_init", "true");

        // optional: reset streak per course start
        localStorage.setItem("streak", "0");
        localStorage.setItem("lastDay", "");
    }

    window.location.href = "engine.html";
}

</script>

</body>
</html>
