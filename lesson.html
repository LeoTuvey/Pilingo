<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owl-Lingo Lesson</title>

<style>
body{
  font-family: Arial;
  background:#f5f9ff;
  text-align:center;
  margin:0;
  padding:20px;
  transition:0.2s;
}

/* OWL */
#owl{
  font-size:65px;
  margin:10px;
  display:inline-block;
  transition:0.3s;
}

.owl-happy{ transform: scale(1.2) rotate(-8deg); }
.owl-sad{ transform: scale(0.9) rotate(8deg); }
.owl-win{ animation: bounce 0.6s ease; }

@keyframes bounce{
  0%{transform:translateY(0);}
  40%{transform:translateY(-10px);}
  70%{transform:translateY(0);}
  100%{transform:translateY(-5px);}
}

/* CARD */
.card{
  background:white;
  max-width:550px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* BUTTONS */
button{
  width:90%;
  padding:14px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.15s;
}

button:active{
  transform:scale(0.96);
}

/* STREAK */
#streak{
  font-weight:bold;
  color:#ff9800;
}

/* HEARTS */
#hearts{
  font-size:20px;
  margin:10px;
}

/* PROGRESS */
#progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
  margin:10px 0;
  overflow:hidden;
}

#bar{
  height:100%;
  width:0%;
  background:#4caf50;
  transition:0.4s ease;
}

/* XP POPUP */
#xpPopup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#58cc02;
  color:white;
  padding:10px 18px;
  border-radius:20px;
  font-weight:bold;
  opacity:0;
  transition:0.3s;
}

/* FEEDBACK EFFECTS */
.correctFlash{
  animation: greenFlash 0.4s ease;
}

.wrongShake{
  animation: shake 0.4s ease;
}

@keyframes greenFlash{
  0%{background:#f5f9ff;}
  50%{background:#4caf50;}
  100%{background:#f5f9ff;}
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  50%{transform:translateX(5px);}
  75%{transform:translateX(-5px);}
  100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div id="owl">🦉</div>
<div id="streak">🔥 Streak: 0</div>
<div id="hearts">❤️❤️❤️❤️❤️</div>

<div id="xpPopup">+10 XP</div>

<div class="card">

<h2 id="question"></h2>

<div id="progress">
  <div id="bar"></div>
</div>

<div id="options"></div>

</div>

<script src="vocab_a1.js"></script>

<script>

let params = new URLSearchParams(location.search);
let skillIndex = parseInt(params.get("s") || "0");

const skills = Object.keys(VOCAB_A1).filter(k => k !== "meta");
let skill = skills[skillIndex];
let pool = VOCAB_A1[skill];

let hearts = 5;
let xp = 0;
let current = 0;
let questions = [];

/* ---------------- OWL ---------------- */
function owl(state){
  let o = document.getElementById("owl");

  o.classList.remove("owl-happy","owl-sad","owl-win");

  if(state === "happy") o.classList.add("owl-happy");
  if(state === "sad") o.classList.add("owl-sad");
  if(state === "win") o.classList.add("owl-win");
}

/* ---------------- STREAK ---------------- */
function updateStreak(){
  let today = new Date().toDateString();
  let last = localStorage.getItem("lastDay");
  let streak = parseInt(localStorage.getItem("streak") || "0");

  if(last !== today){
    if(last){
      let diff = (new Date(today) - new Date(last)) / 86400000;
      streak = diff === 1 ? streak + 1 : 1;
    } else {
      streak = 1;
    }

    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDay", today);
  }

  document.getElementById("streak").innerText =
    "🔥 Streak: " + streak;
}

/* ---------------- XP POPUP ---------------- */
function showXP(){
  let el = document.getElementById("xpPopup");
  el.style.opacity = 1;
  setTimeout(()=> el.style.opacity = 0, 800);
}

/* ---------------- HEARTS ---------------- */
function renderHearts(){
  document.getElementById("hearts").innerText =
    "❤️".repeat(hearts) + "🖤".repeat(5-hearts);
}

/* ---------------- GENERATE ---------------- */
function generate(){
  for(let i=0;i<5;i++){
    let correct = pool[Math.floor(Math.random()*pool.length)];

    let options = [correct];

    while(options.length < 3){
      let r = pool[Math.floor(Math.random()*pool.length)];
      if(!options.includes(r)) options.push(r);
    }

    options.sort(()=>Math.random()-0.5);

    questions.push({correct, options});
  }
}

/* ---------------- LOAD ---------------- */
function load(){
  let q = questions[current];

  document.getElementById("question").innerText =
    "Select: " + q.correct.en;

  let html = "";

  q.options.forEach((opt,i)=>{
    html += `<button onclick="check(${i})">${opt.en}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  updateBar();
}

/* ---------------- BAR ---------------- */
function updateBar(){
  document.getElementById("bar").style.width =
    (current / questions.length) * 100 + "%";
}

/* ---------------- CHECK ---------------- */
function check(i){

  let q = questions[current];

  if(q.options[i] === q.correct){

    owl("happy");

    document.body.classList.add("correctFlash");
    setTimeout(()=>document.body.classList.remove("correctFlash"),400);

    xp += 10;
    current++;

    showXP();

    if(current < questions.length){
      load();
    } else {
      finish();
    }

  } else {

    owl("sad");

    hearts--;
    renderHearts();

    document.body.classList.add("wrongShake");
    setTimeout(()=>document.body.classList.remove("wrongShake"),400);

    if(hearts <= 0){
      alert("Game Over");
      location.reload();
    }
  }
}

/* ---------------- FINISH ---------------- */
function finish(){

  owl("win");

  localStorage.setItem("xp",
    parseInt(localStorage.getItem("xp")||0) + xp
  );

  updateStreak();

  setTimeout(()=>{
    window.location.href = "index.html";
  },1200);
}

/* ---------------- START ---------------- */
generate();
renderHearts();
updateStreak();
load();

</script>

</body>
</html>
