<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#58cc02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🐯 Pilingo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="pilingo-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="pilingo-icon-192.png">
<title>Kurmanji to English: Game One</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:
        radial-gradient(circle at top left, rgba(255,218,69,0.26), transparent 34%),
        linear-gradient(180deg, #e9f7ff 0%, #f7fbf2 48%, #fff7df 100%);
    text-align:center;
    margin:0;
    padding:22px;
    color:#253044;
    min-height:100vh;
}

.card{
    background:white;
    max-width:620px;
    margin:auto;
    padding:22px;
    border:2px solid #e5edf5;
    border-radius:8px;
    box-shadow:0 16px 34px rgba(37,48,68,0.14);
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0 0 auto;
    height:6px;
    background:linear-gradient(90deg, #58cc02, #1cb0f6, #ffb020);
}

#hearts{
    display:flex;
    justify-content:center;
    gap:3px;
    font-size:24px;
    margin:6px 0 12px;
}

#progress{
    width:100%;
    height:14px;
    background:#e7eef7;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:16px;
    box-shadow:inset 0 1px 3px rgba(37,48,68,0.12);
}

#bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, #58cc02, #89e219);
    transition:width 0.25s ease;
}

.lesson-top{
    display:flex;
    justify-content:flex-start;
    min-height:42px;
    margin-bottom:6px;
}

.menu-button{
    display:none;
    width:auto;
    margin:0;
    padding:9px 12px;
    background:#fff;
    color:#253044;
    border-color:#d6e3ef;
    box-shadow:0 3px 0 #d6e3ef;
    font-size:14px;
}

.menu-button:hover{
    background:#f7fbff;
}

#partLabel{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:#f0f8ff;
    color:#31556f;
    border:1px solid #d6ebfb;
    font-size:14px;
    font-weight:800;
    margin-bottom:8px;
    white-space:pre-line;
}

#instruction{
    color:#65748b;
    font-size:16px;
    min-height:24px;
    margin:4px 0 8px;
    font-weight:700;
}

#question{
    margin:14px auto 18px;
    max-width:92%;
    font-size:30px;
    line-height:1.2;
    letter-spacing:0;
    color:#1f2937;
}

#image{
    display:none;
    width:120px;
    height:120px;
    object-fit:contain;
    margin:12px auto;
}

#activity{
    width:100%;
}

button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px 16px;
    font-size:16px;
    border:2px solid #d6e3ef;
    border-radius:8px;
    background:white;
    color:#253044;
    cursor:pointer;
    font-weight:800;
    box-shadow:0 4px 0 #d6e3ef;
    transition:transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
}

button:hover{
    background:#f7fbff;
    border-color:#1cb0f6;
    transform:translateY(-1px);
}

button:active{
    transform:translateY(2px);
    box-shadow:0 2px 0 #d6e3ef;
}

button:disabled{
    opacity:0.7;
    cursor:default;
}

button.secondary{
    background:#fff;
    color:#253044;
    border-color:#d6e3ef;
}

button.selected{
    background:#58cc02;
    color:white;
    border-color:#46a302;
    box-shadow:0 4px 0 #46a302;
}

button.correct{
    background:#58cc02 !important;
    color:white !important;
    border-color:#46a302 !important;
    box-shadow:0 4px 0 #46a302 !important;
}

button.wrong{
    background:#ff4b4b !important;
    color:white !important;
    border-color:#d63636 !important;
    box-shadow:0 4px 0 #d63636 !important;
}

#activity > button:first-child:last-child,
.answer-bank + .word-bank + button,
.type-answer + button{
    background:#58cc02;
    border-color:#46a302;
    color:white;
    box-shadow:0 4px 0 #46a302;
}

#activity > button:first-child:last-child:hover,
.answer-bank + .word-bank + button:hover,
.type-answer + button:hover{
    background:#61d80a;
}

.part-menu{
    position:relative;
    width:min(100%, 520px);
    height:520px;
    margin:20px auto 8px;
    border-radius:46% 46% 50% 50% / 42% 42% 58% 58%;
    background:
        radial-gradient(circle at 34% 24%, rgba(255,255,255,0.9), rgba(255,255,255,0.18) 24%, transparent 28%),
        radial-gradient(circle at center, rgba(255,227,186,0.34) 0%, rgba(255,227,186,0.34) 24%, rgba(248,238,219,0.28) 25%, rgba(248,238,219,0.28) 48%, transparent 49%),
        radial-gradient(circle at center, rgba(37,48,68,0.05) 0%, transparent 68%),
        linear-gradient(180deg, #fffdf7 0%, #f8efdf 100%);
    box-shadow:
        inset 0 -12px 0 rgba(224,207,176,0.45),
        0 16px 28px rgba(122,83,0,0.1);
    border:3px solid rgba(255,255,255,0.9);
}

.part-menu-core{
    position:absolute;
    left:50%;
    top:50%;
    width:150px;
    height:150px;
    transform:translate(-50%, -50%);
    border-radius:50%;
    background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95), rgba(255,255,255,0.3) 36%, transparent 40%),
        linear-gradient(180deg, #7be41d 0%, #58cc02 58%, #4aad02 100%);
    box-shadow:0 10px 0 #46a302, 0 20px 32px rgba(70,163,2,0.24);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    border:4px solid rgba(255,255,255,0.92);
}

.part-menu-core strong{
    font-size:24px;
    line-height:1;
}

.part-menu-core span{
    margin-top:6px;
    font-size:13px;
    font-weight:900;
    letter-spacing:0.04em;
    text-transform:uppercase;
}

.part-choice{
    position:absolute;
    left:50%;
    top:50%;
    width:124px;
    min-height:124px;
    margin:0;
    transform:translate(calc(-50% + var(--orbit-x)), calc(-50% + var(--orbit-y)));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    background:transparent;
    border:none;
    box-shadow:none;
    padding:0;
    overflow:visible;
}

.part-choice:hover{
    transform:translate(calc(-50% + var(--orbit-x)), calc(-50% + var(--orbit-y) - 4px)) scale(1.03);
}

.part-badge{
    display:inline-flex;
    position:relative;
    width:94px;
    height:94px;
    align-items:center;
    justify-content:center;
    border-radius:46% 46% 52% 52% / 42% 42% 58% 58%;
    background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.98), rgba(255,255,255,0.3) 30%, transparent 34%),
        radial-gradient(circle at 50% 38%, #fffefb 0%, #f8efe0 60%, #efdfc3 100%);
    color:#6f5840;
    font-weight:900;
    font-size:50px;
    box-shadow:
        inset 0 -8px 0 rgba(175,145,104,0.16),
        0 8px 0 rgba(214,197,168,0.85),
        0 12px 18px rgba(122,83,0,0.14);
    border:3px solid rgba(255,255,255,0.92);
    text-shadow:0 2px 0 rgba(255,255,255,0.35);
    overflow:hidden;
}

.part-choice:hover .part-badge{
    box-shadow:
        inset 0 -8px 0 rgba(175,145,104,0.16),
        0 10px 0 rgba(214,197,168,0.85),
        0 18px 22px rgba(122,83,0,0.18);
}

.part-badge::before{
    content:"";
    position:absolute;
    inset:5px;
    border-radius:46% 46% 52% 52% / 42% 42% 58% 58%;
    background:radial-gradient(circle at 30% 25%, rgba(255,255,255,0.7), transparent 40%);
    pointer-events:none;
}

.part-animal{
    position:relative;
    z-index:1;
    display:inline-block;
    filter:drop-shadow(0 5px 5px rgba(122,83,0,0.18));
    transform-origin:center bottom;
    animation:animalBob 2.8s ease-in-out infinite;
}

.part-choice:hover .part-animal{
    animation-duration:1.4s;
}

.part-choice:nth-child(2n) .part-animal{
    animation-name:animalWiggle;
}

.part-choice:nth-child(3n) .part-animal{
    animation-name:animalHop;
}

@keyframes animalBob{
    0%, 100%{ transform:translateY(0) rotate(0deg) scale(1); }
    25%{ transform:translateY(-3px) rotate(-4deg) scale(1.03); }
    55%{ transform:translateY(-7px) rotate(4deg) scale(1.06); }
    78%{ transform:translateY(-2px) rotate(-2deg) scale(1.02); }
}

@keyframes animalWiggle{
    0%, 100%{ transform:translateY(0) rotate(0deg) scale(1); }
    20%{ transform:translateY(-2px) rotate(-6deg) scale(1.02); }
    45%{ transform:translateY(-6px) rotate(6deg) scale(1.06); }
    70%{ transform:translateY(-1px) rotate(-3deg) scale(1.03); }
}

@keyframes animalHop{
    0%, 100%{ transform:translateY(0) scale(1); }
    18%{ transform:translateY(-1px) scale(1.02); }
    45%{ transform:translateY(-8px) scale(1.08); }
    60%{ transform:translateY(-3px) scale(1.03); }
    78%{ transform:translateY(0) scale(0.99); }
}

.part-copy{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-top:8px;
    width:100%;
    padding:6px 2px 0;
}

.part-name{
    color:#253044;
    font-size:13px;
    font-weight:900;
    line-height:1.15;
}

.part-detail{
    color:#7f6d58;
    font-size:11px;
    font-weight:700;
    line-height:1.25;
}

.part-status{
    color:#58a700;
    font-size:11px;
    font-weight:900;
    margin-top:4px;
    padding:5px 10px;
    border-radius:999px;
    background:#fff;
    border:2px solid #e9dcc5;
    box-shadow:0 4px 0 #eadfca;
}

.part-complete-actions{
    display:grid;
    gap:10px;
    width:94%;
    margin:14px auto 0;
}

.part-complete-actions button{
    width:100%;
}

.part-complete-actions .primary-action{
    background:#58cc02;
    border-color:#46a302;
    color:white;
    box-shadow:0 4px 0 #46a302;
}

.part-complete-actions .primary-action:hover{
    background:#61d80a;
}

.part-complete-actions .secondary-action{
    background:#fff;
    border-color:#d6e3ef;
    color:#253044;
    box-shadow:0 4px 0 #d6e3ef;
}

.image-options{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:10px;
    width:92%;
    margin:8px auto;
}

.image-options button{
    width:100%;
    min-height:92px;
    font-size:20px;
}

.word-bank,
.answer-bank{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin:14px auto;
    width:92%;
}

.word-bank button,
.answer-bank button{
    display:inline-flex;
    width:auto;
    min-width:88px;
    margin:0;
    align-items:center;
    justify-content:center;
}

.match-grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:12px;
    width:92%;
    margin:14px auto;
}

.match-column{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.match-heading{
    margin:0 0 4px;
    color:#65748b;
    font-size:13px;
    font-weight:800;
    text-transform:uppercase;
}

.match-grid button{
    display:flex;
    width:100%;
    min-height:52px;
    margin:0;
    align-items:center;
    justify-content:center;
}

.answer-bank{
    min-height:58px;
    padding:10px;
    border:2px dashed #b9d9f2;
    border-radius:8px;
    background:#f8fbff;
}

.speaker{
    width:86px;
    height:86px;
    border-radius:50%;
    font-size:36px;
    background:#58cc02;
    color:white;
    border-color:#46a302;
    box-shadow:0 5px 0 #46a302;
}

.type-answer{
    display:block;
    width:86%;
    margin:14px auto;
    padding:15px;
    border:2px solid #d6e3ef;
    border-radius:8px;
    font-size:18px;
    color:#253044;
}

#feedback{
    min-height:30px;
    margin-top:10px;
    font-size:18px;
    font-weight:900;
}

@media (max-width:520px){
    body{padding:12px;}
    .card{padding:18px 14px;}
    #question{font-size:25px; max-width:100%;}
    button{width:96%;}
    .part-menu{
        display:grid;
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:14px;
        width:100%;
        height:auto;
    }
    .part-menu-core{
        position:relative;
        left:auto;
        top:auto;
        transform:none;
        width:100%;
        height:110px;
        grid-column:1 / -1;
        margin-bottom:4px;
    }
    .part-choice{
        position:relative;
        left:auto;
        top:auto;
        width:100%;
        min-height:0;
        transform:none !important;
    }
    .part-copy{
        padding:8px 4px 0;
    }
    .image-options{grid-template-columns:1fr;}
    .match-grid{gap:10px;}
}
</style>
</head>

<body>

<div class="card">
    <div id="hearts"></div>
    <div id="progress"><div id="bar"></div></div>
    <div class="lesson-top">
        <button id="menuButton" class="menu-button" onclick="showPartSelect()">← Parts</button>
    </div>
    <div id="partLabel"></div>
    <p id="instruction"></p>
    <h2 id="question">Loading...</h2>
    <img id="image" alt="">
    <div id="activity"></div>
    <div id="feedback"></div>
</div>

<script src="engine-core.js"></script>
<script src="pilingo-sounds.js"></script>
<script src="pwa.js"></script>

<script>
let hearts = Engine.getHearts();
let partIndex = 0;
let stepIndex = 0;
let selectedWords = [];
let matchedKeys = [];
let selectedMatch = null;
let completedParts = loadCompletedParts();

const emoji = {
    coffee:"☕",
    water:"💧",
    tea:"🍵",
    milk:"🥛",
    bread:"🍞",
    juice:"🧃"
};

const gameParts = [
    {
        title:"Game One; A",
        steps:[
            imageStep("şîr", [
                imgOpt("Coffee", "coffee"),
                imgOpt("Water", "water"),
                imgOpt("Tea", "tea"),
                imgOpt("Milk", "milk")
            ], "Milk"),
            choiceStep("Translate this sentence", "Silav", ["Hello", "Or", "Bye"], "Hello"),
            buildStep("Translate this sentence", "qehwe, ji kerema xwe!", ["coffee", "or", "welcome", "please", "!"], ["coffee", "please", "!"]),
            buildStep("Translate this sentence", "Şîr û Qehwe", ["and", "coffee", "or", "milk", "welcome"], ["milk", "and", "coffee"]),
            matchStep([
                ["Milk", "Şîr"],
                ["Coffee", "Qehwe"],
                ["Hello", "Silav"],
                ["And", "û"]
            ]),
            hearStep("Milk", ["Milk", "Silav", "Qehwe", "Şîr"], "Milk", "Tap what you hear | Li ser tiştê ku dibihîze bitikîne!"),
            choiceStep("Select the correct word", "Silav", ["Tea", "Coffee", "Hello"], "Hello"),
            hearStep("Coffee", ["Coffee", "Silav", "Qehwe", "Şîr"], "Coffee"),
            matchStep([
                ["Milk", "Şîr"],
                ["Coffee", "Qehwe"],
                ["Hello", "Silav"],
                ["And", "û"]
            ]),
            nextStep()
        ]
    },
    {
        title:"Game One; B",
        steps:[
            imageStep("AV", [
                imgOpt("Bread", "bread"),
                imgOpt("Milk", "milk"),
                imgOpt("Water", "water"),
                imgOpt("Tea", "tea")
            ], "Water"),
            imageStep("Şîr", [
                imgOpt("Water", "water"),
                imgOpt("Tea", "tea"),
                imgOpt("Milk", "milk"),
                imgOpt("Bread", "bread")
            ], "Milk"),
            imageStep("Nan", [
                imgOpt("Water", "water"),
                imgOpt("Coffee", "coffee"),
                imgOpt("Tea", "tea"),
                imgOpt("Bread", "bread")
            ], "Bread"),
            imageStep("Çay", [
                imgOpt("Water", "water"),
                imgOpt("Milk", "milk"),
                imgOpt("Tea", "tea"),
                imgOpt("Bread", "bread")
            ], "Tea"),
            buildStep("Translate this sentence", "Bi xêr hatî!", ["coffee", "please", "welcome"], ["welcome"]),
            matchStep([
                ["And", "û"],
                ["Coffee", "Qehwe"],
                ["Milk", "Şîr"],
                ["Water", "Av"],
                ["Welcome", "Bi xêr hatî!"]
            ]),
            buildStep("Translate this sentence", "Qehwe?", ["?", "welcome", "coffee", "milk", "tea"], ["coffee", "?"]),
            choiceStep("Select the correct translation", "Bi xêr hatî!", ["Coffee", "Milk", "Hi", "Welcome"], "Welcome"),
            hearStep("Bread", ["Milk", "Welcome", "Milk", "Bread"], "Bread"),
            choiceStep("Select the correct translation", "Çay", ["Coffee", "Water", "Tea", "Welcome"], "Tea"),
            hearStep("Tea", ["Welcome", "Tea", "Or", "And"], "Tea"),
            matchStep([
                ["And", "û"],
                ["Welcome", "Bi xêr hatî!"],
                ["Hello", "Silav!"],
                ["Milk", "Şîr"],
                ["Bread", "Nan"]
            ]),
            buildStep("Translate this sentence", "Nan û qehwe, ji kerema xwe!", ["and", "please!", "bread", "welcome", "coffee"], ["bread", "and", "coffee", "please!"]),
            imageStep("Şîr", [
                imgOpt("Bread", "bread"),
                imgOpt("Juice", "juice"),
                imgOpt("Milk", "milk"),
                imgOpt("Tea", "tea")
            ], "Milk"),
            choiceStep("Translate this sentence", "Bi xatirê te!", ["Water", "Hi", "Bye"], "Bye"),
            buildStep("Translate this sentence", "Erê an na?", ["coffee", "yes", "tea", "no?", "or"], ["yes", "or", "no?"]),
            matchStep([
                ["Milk", "Şîr"],
                ["Water", "Av"],
                ["Welcome", "Bi xêr hatî!"],
                ["Coffee", "Qehwe"],
                ["Tea", "Çay"]
            ]),
            hearBuildStep("Coffee, please!", ["tea", "or", "water", "please!", "coffee"], ["coffee", "please!"]),
            buildStep("Translate this sentence", "Qehwe an çay?", ["Welcome", "tea", "please", "coffee", "or", "?"], ["coffee", "or", "tea", "?"]),
            matchStep([
                ["Bye", "Bi xatirê te!"],
                ["And", "û"],
                ["Welcome", "Bi xêr hatî!"],
                ["Milk", "şîr"],
                ["Water", "av"],
                ["Bread", "nan"]
            ]),
            buildStep("Translate this sentence", "nan û qehwe", ["coffee", "please", "bread", "and"], ["bread", "and", "coffee"]),
            buildStep("Translate this sentence", "Nan û qehwe, ji kerema xwe!", ["bread", "welcome", "please!", "coffee", "and"], ["bread", "and", "coffee", "please!"]),
            imageStep("Çay", [
                imgOpt("Milk", "milk"),
                imgOpt("Coffee", "coffee"),
                imgOpt("Tea", "tea"),
                imgOpt("Bread", "bread")
            ], "Tea"),
            choiceStep("Translate this sentence", "Erê!", ["Yes", "Bye", "Coffee"], "Yes"),
            choiceStep("Translate this sentence", "Na!", ["Now", "Coffee", "No"], "No"),
            choiceStep("Translate this sentence", "Bi xatirê te!", ["Bye", "Milk", "Tea"], "Bye"),
            buildStep("Translate this sentence", "Erê yan na?", ["or", "yes", "bread", "bye", "no?"], ["yes", "or", "no?"]),
            matchStep([
                ["Tea", "çay"],
                ["Milk", "şîr"],
                ["No", "na"],
                ["Water", "av"],
                ["Welcome", "bi xêr hatî"]
            ]),
            choiceStep("Select the correct translation", "qehwe", ["Yes", "Or", "No", "Coffee"], "Coffee"),
            hearStep("coffee", ["nan", "av", "qehwe"], "qehwe"),
            choiceStep("Select the correct translation", "na", ["No", "Hello", "Yes"], "No"),
            matchStep([
                ["Milk", "şîr"],
                ["Yes", "erê"],
                ["Or", "an"],
                ["And", "û"],
                ["No", "Na"],
                ["Coffee", "Qehwe"],
                ["Tea", "Çay"],
                ["Bread", "Nan"]
            ]),
            buildStep("Translate this sentence", "Yes or no?", ["kûçik", "an", "na", "pisîk", "Erê"], ["Erê", "an", "na"]),
            buildStep("Translate this sentence", "Milk or water?", ["An", "av", "pisîk", "Na", "Şîr"], ["Şîr", "An", "av"]),
            buildStep("Translate this sentence", "Water or coffee?", ["Av", "çay", "an", "qehwe", "kûçik"], ["Av", "an", "qehwe"]),
            choiceStep("Select the correct translation", "Şîr", ["Hello", "Milk", "And"], "Milk"),
            choiceStep("Select the correct translation", "Av", ["Tea", "Milk", "Water", "Coffee"], "Water"),
            buildStep("Translate this sentence", "Çay an qehwe?", ["tea", "or", "coffee", "milk", "water"], ["tea", "or", "coffee"]),
            hearBuildStep("Tea and coffee", ["Û", "Nan", "Av", "Çay", "qehwe"], ["Çay", "Û", "qehwe"]),
            buildStep("Translate this sentence", "Qehwe û av, ji kerema xwe!", ["water", "and", "tea", "please", "coffee", "no"], ["coffee", "and", "water", "please"]),

            choiceStep("🎯 Fill in the Missing Word", "_____ = those cats", ["ev pisîke", "ew pisîkêthe", "pisîkan", "pisîkek"], "ew pisîkêthe"),
            choiceStep("🎯 Match the Meaning", "Se", ["dog", "a dog", "one dog", "this dog", "that dog", "these dogs", "those dogs"], "dog"),
            choiceStep("🎯 Match the Meaning", "Seyek", ["dog", "a dog", "one dog", "this dog", "that dog", "these dogs", "those dogs"], "a dog"),
            choiceStep("🎯 Match the Meaning", "Yek se", ["dog", "a dog", "one dog", "this dog", "that dog", "these dogs", "those dogs"], "one dog"),
            choiceStep("🎯 Match the Meaning", "Ev seye", ["dog", "a dog", "one dog", "this dog", "that dog", "these dogs", "those dogs"], ["this dog", "these dogs"]),
            choiceStep("🎯 Match the Meaning", "Ew se", ["dog", "a dog", "one dog", "this dog", "that dog", "these dogs", "those dogs"], "that dog"),
            choiceStep("🎯 Match the Meaning", "Ew seyêthe", ["this dog", "that dog", "these dogs", "those dogs", "dogs"], "those dogs"),
            choiceStep("🎯 Fill in the Missing Word", "_____ = dog", ["se", "seyek", "yek se", "ev seye"], "se"),
            choiceStep("🎯 Fill in the Missing Word", "_____ = a dog", ["se", "seyek", "yek se", "ev seye"], "seyek"),
            choiceStep("🎯 Fill in the Missing Word", "_____ = one dog", ["se", "seyek", "yek se", "ev seye"], "yek se"),
            choiceStep("🎯 Fill in the Missing Word", "_____ = this dog", ["se", "ev seye", "ew se", "seyek"], "ev seye"),
            choiceStep("🎯 Fill in the Missing Word", "_____ = that dog", ["ev seye", "ew se", "seyek", "yek se"], "ew se"),
            choiceStep("🎯 Fill in the Missing Word", "_____ = these dogs", ["ew seyêthe", "ev seye", "sean", "yek se"], "ev seye"),
            choiceStep("🎯 Fill in the Missing Word", "_____ = those dogs", ["ev seye", "ew seyêthe", "sean", "seyek"], "ew seyêthe")
        ]
    }
];

const partDescriptions = [
    "Basics: hello, milk, coffee, and",
    "Food, drinks, yes/no, and listening",
    "Sentences, audio matches, and apple meanings",
    "Book, ball, and house meanings",
    "👤 Person Lesson"
];

const partEmojis = ["🐈", "🐕", "🐇", "🦜", "🦆"];

function imgOpt(label, key){
    return { label:label, emoji:emoji[key] || "", value:label };
}

function imageStep(word, options, answer){
    return {
        type:"image",
        instruction:"Select the correct image | Wêneya rast hilbijêre",
        prompt:word,
        options:options,
        answer:answer
    };
}

function choiceStep(instruction, prompt, options, answer){
    let helper = "";
    if(instruction === "Translate this sentence") helper = " | vê hevokê wergerîne";
    if(instruction === "Select the correct translation") helper = " | Wergera rast hilbijêre!";
    if(instruction === "Select the correct word") helper = " | Peyva rast hilbijêre!";
    if(instruction === "🎯 Match the Meaning") helper = " | Wateya rast hilbijêre!";
    if(instruction === "🎯 Fill in the Missing Word") helper = " | Peyva winda temam bike!";

    return {
        type:"choice",
        instruction:instruction + helper,
        prompt:prompt,
        options:options,
        answer:answer
    };
}

function hearStep(spoken, options, answer, instruction, prompt){
    return {
        type:"hear",
        instruction:instruction || "Tap what you hear | Ya ku dibihîzî bitikîne!",
        prompt:prompt === undefined ? "🔊" : prompt,
        spoken:spoken,
        options:options,
        answer:answer
    };
}

function hearBuildStep(spoken, options, answer, prompt){
    return {
        type:"build",
        instruction:"Tap what you hear | Ya ku dibihîzî bitikîne!",
        prompt:prompt === undefined ? "🔊" : prompt,
        spoken:spoken,
        options:options,
        answer:answer
    };
}

function buildStep(instruction, prompt, options, answer){
    const helper = instruction === "Complete the sentence"
        ? " | Risteyê temam bike!"
        : " | vê hevokê wergerîne";

    return {
        type:"build",
        instruction:instruction + helper,
        prompt:prompt,
        options:options,
        answer:answer
    };
}

function matchStep(pairs, instruction){
    return {
        type:"match",
        instruction:instruction || "Tap the match pairs! | Li ser cotên wekhev bitikîne!",
        prompt:"",
        pairs:pairs
    };
}

function audioMatchStep(pairs){
    return {
        type:"audioMatch",
        instruction:"Tap the matching pairs with the same meaning",
        prompt:"",
        pairs:pairs
    };
}

function typeStep(instruction, prompt, answer){
    return {
        type:"type",
        instruction:instruction + " | vê hevokê binivîse",
        prompt:prompt,
        answer:answer
    };
}

function nextStep(prompt){
    return {
        type:"next",
        instruction:"",
        prompt:prompt || "Game One A complete",
        button:"Next"
    };
}

function renderHearts(){
    let html = "";
    for(let i = 0; i < hearts; i++) html += "❤️ ";
    for(let i = hearts; i < 5; i++) html += "🖤 ";
    document.getElementById("hearts").innerHTML = html;
}

function playSound(type){
    if(type === "correct"){
        PilingoAudio.playCorrect();
        return;
    }

    PilingoAudio.playWrong();
}

function speak(text){
    PilingoAudio.speak(text);
}

function escapeHtml(value){
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function currentStep(){
    return gameParts[partIndex].steps[stepIndex];
}

function totalSteps(){
    return gameParts[partIndex].steps.length;
}

function completedSteps(){
    return stepIndex;
}

function updateProgress(){
    document.getElementById("bar").style.width =
        (completedSteps() / totalSteps()) * 100 + "%";
}

function loadCompletedParts(){
    try {
        const saved = JSON.parse(localStorage.getItem("pilingo_game1_completed_parts") || "[]");
        return Array.isArray(saved) ? saved : [];
    } catch(error) {
        return [];
    }
}

function saveCompletedParts(){
    localStorage.setItem("pilingo_game1_completed_parts", JSON.stringify(completedParts));
}

function markPartComplete(index){
    if(!completedParts.includes(index)) {
        completedParts.push(index);
        saveCompletedParts();
    }
}

function nextOpenPart(){
    return gameParts.findIndex((part, index) => !completedParts.includes(index));
}

function allPartsComplete(){
    return completedParts.length >= gameParts.length;
}

function startPart(index){
    partIndex = index;
    stepIndex = 0;
    hearts = Engine.getHearts();
    PilingoAudio.playPartAnimal(index);
    load();
}

function showPartSelect(){
    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;

    renderHearts();
    document.getElementById("menuButton").style.display = "none";
    document.getElementById("bar").style.width = "0%";
    document.getElementById("partLabel").innerText = "Kurmanji to English";
    document.getElementById("instruction").innerText = "Choose a part to study";
    document.getElementById("question").innerText = "Game One";
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";
    document.getElementById("activity").innerHTML = `
        <div class="part-menu">
            <div class="part-menu-core">
                <strong>🐯</strong>
                <span>Game One</span>
            </div>
            ${gameParts.map((part, index) => `
                <button class="part-choice" style="${partOrbitStyle(index, gameParts.length)}" onclick="startPart(${index})">
                    <span class="part-badge" aria-hidden="true">
                        <span class="part-animal" style="animation-delay:${(index * 0.18).toFixed(2)}s">${partEmojis[index] || "🦉"}</span>
                    </span>
                    <span class="part-copy">
                        <span class="part-name">${escapeHtml(part.title)}</span>
                        <span class="part-detail">${escapeHtml(partDescriptions[index] || "Practice section")}</span>
                    </span>
                    <span class="part-status">${completedParts.includes(index) ? "✓ Done" : "Start"}</span>
                </button>
            `).join("")}
        </div>
    `;
}

function partOrbitStyle(index, total){
    const radius = 172;
    const startAngle = -90;
    const angle = ((360 / total) * index) + startAngle;
    const radians = angle * (Math.PI / 180);
    const x = Math.cos(radians) * radius;
    const y = Math.sin(radians) * radius;
    return `--orbit-x:${x.toFixed(1)}px; --orbit-y:${y.toFixed(1)}px;`;
}

function load(){
    const part = gameParts[partIndex];
    const step = currentStep();

    selectedWords = [];
    matchedKeys = [];
    selectedMatch = null;

    renderHearts();
    updateProgress();
    document.getElementById("menuButton").style.display = "block";
    document.getElementById("partLabel").innerText =
        "Kurmanji to English\nPart " + (partIndex + 1) + " of " + gameParts.length + " • " + part.title;
    document.getElementById("instruction").innerText = step.instruction || "";
    document.getElementById("question").innerText = step.prompt || "";
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "";

    if(step.type === "image") renderImageStep(step);
    if(step.type === "choice") renderChoiceStep(step);
    if(step.type === "hear") renderHearStep(step);
    if(step.type === "build") renderBuildStep(step);
    if(step.type === "match") renderMatchStep(step);
    if(step.type === "audioMatch") renderAudioMatchStep(step);
    if(step.type === "type") renderTypeStep(step);
    if(step.type === "next") renderNextStep(step);
}

function renderImageStep(step){
    document.getElementById("activity").innerHTML = `
        <div class="image-options">
            ${step.options.map((option) => `
                <button onclick="checkChoice('${escapeHtml(option.value)}', this)">
                    <span aria-hidden="true">${escapeHtml(option.emoji)}</span><br>
                    ${escapeHtml(option.label)}
                </button>
            `).join("")}
        </div>
    `;
}

function renderChoiceStep(step){
    const options = [...step.options];
    if(shouldShuffleChoiceStep(step)) {
        shuffleCards(options, "choice-" + step.instruction + "-" + step.prompt);
    }

    document.getElementById("activity").innerHTML =
        options.map(option => `
            <button onclick="checkChoice('${escapeHtml(option)}', this)">${escapeHtml(option)}</button>
        `).join("");
}

function shouldShuffleChoiceStep(step){
    return step.instruction.includes("🎯 Match the Meaning") ||
        step.instruction.includes("🎯 Fill in the Missing Word");
}

function emojiForCorrectChoice(step, option){
    const emoji = emojiForChoice(step);
    if(!emoji || !isCorrectChoice(step, option)) return "";

    return isPluralChoice(step, option) ? emoji.plural : emoji.singular;
}

function emojiForChoice(step){
    const text = [step.prompt, ...step.options, ...answersForStep(step)].join(" ").toLowerCase();

    if(text.includes("person") || text.includes("people") || text.includes("man") || text.includes("mirov")) {
        return { singular:"👨", plural:"👨👨" };
    }

    if(text.includes("apple") || text.includes("sêv")) {
        return { singular:"🍎", plural:"🍎🍎" };
    }

    if(text.includes("book") || text.includes("pirtûk")) {
        return { singular:"📘", plural:"📚" };
    }

    if(text.includes("ball") || text.includes("top")) {
        return { singular:"⚽", plural:"⚽⚽" };
    }

    return null;
}

function isPluralChoice(step, option){
    const text = normalize(option + " " + step.prompt);
    return /\b(these|those|apples|books|balls|people)\b/.test(text);
}

function renderHearStep(step){
    document.getElementById("activity").innerHTML = `
        <button class="speaker" onclick="speak('${escapeHtml(step.spoken)}')" aria-label="Play sound">🔊</button>
        ${step.options.map(option => `
            <button onclick="checkChoice('${escapeHtml(option)}', this)">${escapeHtml(option)}</button>
        `).join("")}
    `;
    setTimeout(() => speak(step.spoken), 250);
}

function renderBuildStep(step){
    document.getElementById("activity").innerHTML = `
        ${step.spoken ? `<button class="speaker" onclick="speak('${escapeHtml(step.spoken)}')" aria-label="Play sound">🔊</button>` : ""}
        <div class="answer-bank" id="answerBank"></div>
        <div class="word-bank" id="wordBank">
            ${step.options.map((word, index) => `
                <button class="secondary" id="word-${index}" onclick="selectWord(${index})">${escapeHtml(word)}</button>
            `).join("")}
        </div>
        <button onclick="checkBuild(this)">Check</button>
    `;

    if(step.spoken) setTimeout(() => speak(step.spoken), 250);
    renderSelectedWords();
}

function renderMatchStep(step){
    const kurmanjiCards = [];
    const englishCards = [];

    step.pairs.forEach((pair, index) => {
        englishCards.push({ text:pair[0], key:index, id:"en-" + index });
        kurmanjiCards.push({ text:pair[1], key:index, id:"ku-" + index });
    });

    shuffleCards(englishCards, "match-english");

    document.getElementById("activity").innerHTML = `
        <div class="match-grid">
            <div class="match-column">
                <div class="match-heading">Kurmanji</div>
                ${kurmanjiCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="selectMatch('${card.id}', ${card.key})">
                        ${escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
            <div class="match-column">
                <div class="match-heading">English</div>
                ${englishCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="selectMatch('${card.id}', ${card.key})">
                        ${escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
        </div>
    `;
}

function renderAudioMatchStep(step){
    const soundCards = [];
    const kurmanjiCards = [];

    step.pairs.forEach((pair, index) => {
        soundCards.push({ spoken:pair[0], key:index, id:"sound-" + index });
        kurmanjiCards.push({ text:pair[1], key:index, id:"ku-audio-" + index });
    });

    shuffleCards(soundCards, "audio-sound");
    shuffleCards(kurmanjiCards, "audio-kurmanji");

    document.getElementById("activity").innerHTML = `
        <div class="match-grid">
            <div class="match-column">
                <div class="match-heading">Hear</div>
                ${soundCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="selectAudioMatch('${card.id}', ${card.key}, '${escapeHtml(card.spoken)}')" aria-label="Hear word">
                        🔊
                    </button>
                `).join("")}
            </div>
            <div class="match-column">
                <div class="match-heading">Kurmanji</div>
                ${kurmanjiCards.map((card) => `
                    <button class="secondary" id="match-${card.id}" onclick="selectMatch('${card.id}', ${card.key})">
                        ${escapeHtml(card.text)}
                    </button>
                `).join("")}
            </div>
        </div>
    `;
}

function renderTypeStep(step){
    document.getElementById("activity").innerHTML = `
        <input class="type-answer" id="typedAnswer" type="text" autocomplete="off" autocapitalize="none" placeholder="Type in English">
        <button onclick="checkTyped(this)">Check</button>
    `;
}

function shuffleCards(cards, salt){
    if(cards.length < 2) return;

    let seed = 2166136261;
    const text = salt + "-" + partIndex + "-" + stepIndex + "-" + cards.length;

    for(let i = 0; i < text.length; i++) {
        seed ^= text.charCodeAt(i);
        seed = Math.imul(seed, 16777619);
    }

    for(let i = cards.length - 1; i > 0; i--) {
        seed = Math.imul(seed ^ (seed >>> 13), 1274126177);
        const swapIndex = Math.abs(seed) % (i + 1);
        [cards[i], cards[swapIndex]] = [cards[swapIndex], cards[i]];
    }
}

function selectAudioMatch(buttonIndex, key, spoken){
    speak(spoken);
    selectMatch(buttonIndex, key);
}

function renderNextStep(step){
    PilingoAudio.playLessonComplete();
    document.getElementById("activity").innerHTML =
        `<button onclick="completeStep()">${escapeHtml(step.button || "Next")}</button>`;
}

function showButtonResult(button, result){
    if(!button) return;
    button.classList.remove("correct", "wrong");
    button.classList.add(result);
}

function revealCorrectEmoji(button, step, value){
    if(!button || button.dataset.emojiRevealed === "true") return;

    const emoji = emojiForCorrectChoice(step, value);
    if(!emoji) return;

    button.textContent = emoji + " " + button.textContent.trim();
    button.dataset.emojiRevealed = "true";
}

function answersForStep(step){
    return Array.isArray(step.answer) ? step.answer : [step.answer];
}

function isCorrectChoice(step, value){
    return answersForStep(step).some(answer => normalize(value) === normalize(answer));
}

function checkChoice(value, button){
    const step = currentStep();
    if(isCorrectChoice(step, value)){
        revealCorrectEmoji(button, step, value);
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    showButtonResult(button, "wrong");
    markWrong();
}

function selectWord(index){
    const step = currentStep();
    const button = document.getElementById("word-" + index);
    if(!button || button.disabled) return;

    button.disabled = true;
    button.classList.add("selected");
    selectedWords.push({ index:index, text:step.options[index] });
    renderSelectedWords();
}

function renderSelectedWords(){
    const bank = document.getElementById("answerBank");
    if(!bank) return;

    if(selectedWords.length === 0) {
        bank.innerHTML = "";
        return;
    }

    bank.innerHTML = selectedWords.map((word, index) => `
        <button onclick="removeWord(${index})">${escapeHtml(word.text)}</button>
    `).join("");
}

function removeWord(index){
    const word = selectedWords[index];
    if(!word) return;

    selectedWords.splice(index, 1);
    const button = document.getElementById("word-" + word.index);
    if(button) {
        button.disabled = false;
        button.classList.remove("selected");
    }

    renderSelectedWords();
}

function checkBuild(button){
    const step = currentStep();
    const answer = selectedWords.map(word => normalize(word.text));
    const expected = step.answer.map(word => normalize(word));

    if(answer.join(" ") === expected.join(" ")){
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    showButtonResult(button, "wrong");
    markWrong();
}

function checkTyped(button){
    const step = currentStep();
    const input = document.getElementById("typedAnswer");
    const value = input ? input.value : "";

    if(normalize(value) === normalize(step.answer)){
        showButtonResult(button, "correct");
        markCorrect();
        return;
    }

    showButtonResult(button, "wrong");
    markWrong();
}

function selectMatch(buttonIndex, key){
    if(matchedKeys.includes(key)) return;

    const button = document.getElementById("match-" + buttonIndex);
    if(!button) return;

    button.classList.add("selected");

    if(!selectedMatch) {
        selectedMatch = { buttonIndex:buttonIndex, key:key };
        return;
    }

    if(selectedMatch.buttonIndex === buttonIndex) return;

    const firstButton = document.getElementById("match-" + selectedMatch.buttonIndex);

    if(selectedMatch.key === key) {
        matchedKeys.push(key);
        button.classList.add("correct");
        if(firstButton) firstButton.classList.add("correct");
        button.disabled = true;
        if(firstButton) firstButton.disabled = true;
        selectedMatch = null;

        if(matchedKeys.length === currentStep().pairs.length) {
            markCorrect();
        }
        return;
    }

    setTimeout(() => {
        button.classList.add("wrong");
        if(firstButton) firstButton.classList.add("wrong");
    }, 50);

    setTimeout(() => {
        button.classList.remove("selected");
        button.classList.remove("wrong");
        if(firstButton) firstButton.classList.remove("selected", "wrong");
        selectedMatch = null;
        markWrong();
    }, 650);
}

function normalize(value){
    return String(value)
        .toLowerCase()
        .replace(/[!?.،,]/g, "")
        .trim();
}

function markCorrect(){
    playSound("correct");
    document.getElementById("feedback").innerText = "✅ Correct";
    setTimeout(completeStep, 650);
}

function markWrong(){
    hearts = Engine.loseHeart();
    renderHearts();
    playSound("wrong");
    document.getElementById("feedback").innerText = "❌ Try again";

    if(hearts <= 0) gameOver();
}

function completeStep(){
    stepIndex++;

    if(stepIndex < gameParts[partIndex].steps.length) {
        load();
        return;
    }

    markPartComplete(partIndex);
    showPartComplete(partIndex);
}

function showPartComplete(completedIndex){
    PilingoAudio.playLessonComplete();

    const openPart = nextOpenPart();
    const isAllDone = allPartsComplete();

    renderHearts();
    document.getElementById("menuButton").style.display = "none";
    document.getElementById("bar").style.width = "100%";
    document.getElementById("partLabel").innerText = "Kurmanji to English";
    document.getElementById("instruction").innerText = "Part complete";
    document.getElementById("question").innerText = gameParts[completedIndex].title;
    document.getElementById("image").style.display = "none";
    document.getElementById("image").removeAttribute("src");
    document.getElementById("feedback").innerText = "✅ Great job!";
    document.getElementById("activity").innerHTML = `
        <div class="part-complete-actions">
            ${openPart >= 0 ? `<button class="primary-action" onclick="startPart(${openPart})">Start next part</button>` : ""}
            <button class="secondary-action" onclick="showPartSelect()">Choose another part</button>
            ${isAllDone ? `<button class="primary-action" onclick="finish()">Finish Game One</button>` : ""}
        </div>
    `;

    PilingoAudio.speak("Great job! You finished this part.");
}

function finish(){
    PilingoAudio.playLessonComplete();
  showLessonComplete();
  PilingoAudio.speak("Great job! You finished this lesson.");

    if (typeof Engine.completeSkill === "function") {
        Engine.completeSkill(0, 10);
    } else {
        Engine.addXP(10);
        Engine.unlockLevel(1);
        Engine.resetHearts();
    }

    document.getElementById("bar").style.width = "100%";

    setTimeout(() => {
        window.location.href = "engine.html";
    }, 2200);
}

function showLessonComplete(){
  const card = document.querySelector(".card");
  if(!card) return;
  card.innerHTML = `
<h1>🐯</h1>
<h2>Great job!</h2>
<p>You finished this lesson.</p>
`;
}

function gameOver(){
    document.body.innerHTML = `
    <div class="card">
        <h1>💔</h1>
        <h2>Out of hearts</h2>
        <button onclick="location.reload()">Try again</button>
    </div>`;
}

showPartSelect();
</script>
