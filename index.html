<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owl-Lingo</title>

<style>

/* =========================
   🧠 APP BASE
========================= */

body{
  margin:0;
  font-family: Arial;
  background:#f5f9ff;
}

/* =========================
   HEADER
========================= */

.header{
  padding:20px;
  text-align:center;
  background:linear-gradient(135deg,#58cc02,#4caf50);
  color:white;
}

.header h1{
  margin:0;
  font-size:24px;
}

/* =========================
   DASHBOARD CARD
========================= */

.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* XP + STREAK */
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-weight:bold;
}

/* CONTINUE BUTTON */
.cta{
  background:#58cc02;
  color:white;
  padding:14px;
  border:none;
  border-radius:12px;
  width:100%;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

/* =========================
   DAILY GOAL BAR
========================= */

.goal-bar{
  height:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.goal-fill{
  height:100%;
  width:0%;
  background:#58cc02;
  transition:0.4s;
}

/* =========================
   BOTTOM NAV (DUOLINGO STYLE)
========================= */

.nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  font-size:14px;
  cursor:pointer;
}

/* ACTIVE TAB */
.nav button.active{
  color:#58cc02;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>🦉 Owl-Lingo</h1>
  <div id="sub">Learn daily. Build streaks. Stay consistent.</div>
</div>

<!-- DASHBOARD -->
<div class="card">

  <h2>📊 Your Progress</h2>

  <div class="stats">
    <div>XP: <span id="xp">0</span></div>
    <div>🔥 Streak: <span id="streak">0</span></div>
  </div>

  <div class="goal-bar">
    <div class="goal-fill" id="goal"></div>
  </div>

  <button class="cta" onclick="continueLesson()">
    ▶ Continue Learning
  </button>

</div>

<!-- REVIEW CARD -->
<div class="card">

  <h2>🔁 Review Weak Words</h2>
  <p>Practice words you struggled with.</p>

  <button class="cta" style="background:#ff9800" onclick="review()">
    Start Review
  </button>

</div>

<!-- NAV -->
<div class="nav">

  <button class="active" onclick="go('home')">🏠 Home</button>
  <button onclick="go('learn')">📚 Learn</button>
  <button onclick="go('review')">🔁 Review</button>
  <button onclick="go('profile')">👤 Profile</button>

</div>

<script src="engine-core.js"></script>

<script>

/* =========================
   LOAD DATA
========================= */

let xp = Engine.getXP();
let streak = Engine.updateStreak();

/* =========================
   UPDATE UI
========================= */

document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

/* =========================
   DAILY GOAL (FAKE 50 XP GOAL)
========================= */

let goal = Math.min((xp % 50) / 50 * 100, 100);
document.getElementById("goal").style.width = goal + "%";

/* =========================
   CONTINUE LESSON
========================= */

function continueLesson(){
  window.location.href = "engine.html";
}

/* =========================
   REVIEW MODE
========================= */

function review(){
  alert("Review mode coming in Step 15 (we will auto-pull weak words)");
}

/* =========================
   NAV SYSTEM (SHELL)
========================= */

function go(tab){

  document.querySelectorAll(".nav button")
    .forEach(b=>b.classList.remove("active"));

  event.target.classList.add("active");

  if(tab === "learn"){
    window.location.href = "engine.html";
  }

  if(tab === "review"){
    review();
  }

  if(tab === "profile"){
    alert("Profile system coming in Step 15");
  }
}

</script>

</body>
</html>
